<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | মাস্টার প্যানেল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Hind Siliguri', sans-serif; } 
        .section-tab { cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; }
        .section-tab.active { border-color: #1e3a8a; color: #1e3a8a; font-weight: 900; }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 pb-20">

    <div class="max-w-2xl mx-auto p-4">
        <header class="bg-black text-white p-8 rounded-[3rem] shadow-2xl mb-8 flex justify-between items-center border-b-4 border-blue-600">
            <div>
                <h1 class="text-3xl font-black italic">MASTER PANEL</h1>
                <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Global Control</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] uppercase font-bold opacity-60">Total Admin Due</p>
                <h2 id="totalDueCollect" class="text-2xl font-black text-green-400 font-mono">৳০.০০</h2>
            </div>
        </header>

        <div class="flex justify-around bg-white p-4 rounded-3xl shadow-sm mb-8 font-bold text-xs text-gray-400 overflow-x-auto no-scrollbar">
            <div onclick="switchSection('orders')" id="tab-orders" class="section-tab active px-4 py-2 whitespace-nowrap">অর্ডারস</div>
            <div onclick="switchSection('partners')" id="tab-partners" class="section-tab px-4 py-2 whitespace-nowrap">পার্টনারস</div>
            <div onclick="switchSection('settings')" id="tab-settings" class="section-tab px-4 py-2 whitespace-nowrap">কুপন ও টিম</div>
        </div>

        <div id="section-orders">
             <div id="orderContainer" class="space-y-6"></div>
        </div>

        <div id="section-partners" class="hidden">
            <div class="bg-blue-900 p-6 rounded-[2.5rem] shadow-xl mb-8 border-b-4 border-blue-400">
                <h3 class="text-sm font-black text-white uppercase italic mb-4 text-center">➕ নতুন পার্টনার যোগ করুন</h3>
                
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input type="text" id="pName" placeholder="নাম" class="p-4 rounded-xl bg-white/10 text-white border border-white/20 text-xs font-bold outline-none placeholder:text-white/40">
                    <input type="tel" id="pPhone" placeholder="মোবাইল" class="p-4 rounded-xl bg-white/10 text-white border border-white/20 text-xs font-bold outline-none placeholder:text-white/40">
                </div>

                <div class="bg-white/5 p-4 rounded-2xl mb-4 border border-white/10">
                    <p class="text-[9px] font-black text-blue-300 uppercase mb-3 tracking-widest">Service Access & Commission %</p>
                    <div class="grid grid-cols-1 gap-3">
                        <div class="flex items-center gap-3 bg-white/5 p-2 rounded-xl">
                            <input type="checkbox" id="srv_bajar" class="w-4 h-4 rounded accent-blue-500">
                            <span class="text-white text-[10px] font-bold flex-1">বাজার (Shopping)</span>
                            <input type="number" id="comm_bajar" placeholder="%" class="w-16 p-2 rounded-lg bg-black/20 text-white text-[10px] border border-white/10 text-center">
                        </div>
                        <div class="flex items-center gap-3 bg-white/5 p-2 rounded-xl">
                            <input type="checkbox" id="srv_car" class="w-4 h-4 rounded accent-blue-500">
                            <span class="text-white text-[10px] font-bold flex-1">কার রেন্টাল (Car)</span>
                            <input type="number" id="comm_car" placeholder="%" class="w-16 p-2 rounded-lg bg-black/20 text-white text-[10px] border border-white/10 text-center">
                        </div>
                        <div class="flex items-center gap-3 bg-white/5 p-2 rounded-xl">
                            <input type="checkbox" id="srv_delivery" class="w-4 h-4 rounded accent-blue-500">
                            <span class="text-white text-[10px] font-bold flex-1">ডেলিভারি (Delivery)</span>
                            <input type="number" id="comm_delivery" placeholder="%" class="w-16 p-2 rounded-lg bg-black/20 text-white text-[10px] border border-white/10 text-center">
                        </div>
                        <div class="flex items-center gap-3 bg-white/5 p-2 rounded-xl">
                            <input type="checkbox" id="srv_home" class="w-4 h-4 rounded accent-blue-500">
                            <span class="text-white text-[10px] font-bold flex-1">হোম সার্ভিস</span>
                            <input type="number" id="comm_home" placeholder="%" class="w-16 p-2 rounded-lg bg-black/20 text-white text-[10px] border border-white/10 text-center">
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="flex gap-2">
                        <input type="text" id="partnerAddress" placeholder="ঠিকানা (যেমন: মিরপুর ২, ঢাকা)" 
                               class="flex-1 p-4 rounded-xl bg-white/10 text-white border border-white/20 text-[10px] font-bold outline-none placeholder:text-white/40">
                        <button onclick="getCoordinates()" type="button" class="bg-blue-500 text-white px-4 rounded-xl font-black text-[10px] uppercase shadow-lg">খুঁজুন</button>
                    </div>
                    <p id="geoStatus" class="text-[9px] mt-1 italic px-2"></p>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input type="number" step="any" id="pLat" placeholder="Latitude" class="p-4 rounded-xl bg-white/20 text-white border border-white/20 text-xs font-bold outline-none" readonly>
                    <input type="number" step="any" id="pLng" placeholder="Longitude" class="p-4 rounded-xl bg-white/20 text-white border border-white/20 text-xs font-bold outline-none" readonly>
                </div>

                <button onclick="addNewPartner()" class="w-full bg-white text-blue-900 py-4 rounded-2xl text-xs font-black uppercase shadow-lg active:scale-95 transition-all">পার্টনার সেভ করুন</button>
            </div>
            <div id="partnerList" class="space-y-4"></div>
        </div>

        <div id="section-settings" class="hidden">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-lg mb-8 border-2 border-dashed border-blue-200">
                <h3 class="text-sm font-black text-blue-900 uppercase italic mb-4">🎫 কুপন কোড সেটিংস</h3>
                <div class="space-y-3">
                    <input type="text" id="couponCode" placeholder="যেমন: RAMADAN26" class="w-full p-4 rounded-2xl bg-slate-50 border text-xs font-bold outline-none">
                    <input type="number" id="couponDiscount" placeholder="ডিসকাউন্ট পরিমাণ (৳)" class="w-full p-4 rounded-2xl bg-slate-50 border text-xs font-bold outline-none">
                    <button onclick="saveCoupon()" class="w-full bg-blue-900 text-white py-4 rounded-2xl text-xs font-black uppercase shadow-lg">কুপন আপডেট করুন</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, setDoc, orderBy, query, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
        authDomain: "gkhidmah-8636b.firebaseapp.com",
        projectId: "gkhidmah-8636b",
        storageBucket: "gkhidmah-8636b.firebasestorage.app",
        messagingSenderId: "780745438049",
        appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- Geocoding ---
    window.getCoordinates = async () => {
        const address = document.getElementById('partnerAddress').value;
        const status = document.getElementById('geoStatus');
        if (!address) return alert("ঠিকানা লিখুন!");
        status.innerText = "লোকেশন খোঁজা হচ্ছে...";
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`);
            const data = await res.json();
            if (data.length > 0) {
                document.getElementById('pLat').value = data[0].lat;
                document.getElementById('pLng').value = data[0].lon;
                status.innerText = "✅ লোকেশন পাওয়া গেছে!";
                status.className = "text-[9px] text-green-400 font-bold px-2";
            } else {
                status.innerText = "❌ ঠিকানাটি পাওয়া যায়নি।";
            }
        } catch (e) { status.innerText = "⚠️ এরর হয়েছে!"; }
    };

    // --- Tab Switcher ---
    window.switchSection = (id) => {
        ['orders', 'partners', 'settings'].forEach(s => {
            document.getElementById(`section-${s}`).classList.add('hidden');
            document.getElementById(`tab-${s}`).classList.remove('active');
        });
        document.getElementById(`section-${id}`).classList.remove('hidden');
        document.getElementById(`tab-${id}`).classList.add('active');
    };

    // --- Add Partner with Multi-Service ---
    window.addNewPartner = async () => {
        const name = document.getElementById('pName').value.trim();
        const phone = document.getElementById('pPhone').value.trim();
        const lat = parseFloat(document.getElementById('pLat').value);
        const lng = parseFloat(document.getElementById('pLng').value);

        const services = {
            shopping: { 
                access: document.getElementById('srv_bajar').checked, 
                commission: parseFloat(document.getElementById('comm_bajar').value) || 0 
            },
            car_rental: { 
                access: document.getElementById('srv_car').checked, 
                commission: parseFloat(document.getElementById('comm_car').value) || 0 
            },
            delivery: { 
                access: document.getElementById('srv_delivery').checked, 
                commission: parseFloat(document.getElementById('comm_delivery').value) || 0 
            },
            home_service: { 
                access: document.getElementById('srv_home').checked, 
                commission: parseFloat(document.getElementById('comm_home').value) || 0 
            }
        };

        if(!name || !phone || isNaN(lat)) return alert("সব তথ্য পূরণ করুন!");

        try {
            await setDoc(doc(db, "partners", phone), {
                name, phone, services, lat, lng,
                isActive: true,
                wallet: { totalEarning: 0, adminDue: 0 },
                createdAt: new Date()
            });
            alert("পার্টনার সফলভাবে যোগ হয়েছে!");
            location.reload();
        } catch (e) { alert("সেভ করা যায়নি!"); }
    };

    // --- Partners List Rendering ---
    onSnapshot(collection(db, "partners"), (snap) => {
        const container = document.getElementById('partnerList');
        container.innerHTML = "";
        let totalDue = 0;
        snap.forEach(d => {
            const p = d.data();
            totalDue += (p.wallet?.adminDue || 0);
            
            // অনুমোদিত সার্ভিসগুলো বের করা
            let allowedSrv = "";
            if(p.services) {
                Object.entries(p.services).forEach(([k, v]) => {
                    if(v.access) allowedSrv += `<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[8px] font-bold mr-1 uppercase">${k.split('_')[0]} (${v.commission}%)</span>`;
                });
            }

            const card = document.createElement('div');
            card.className = `p-5 rounded-[2rem] bg-white shadow-lg border-l-8 ${p.isActive ? 'border-green-500' : 'border-red-500'} mb-4`;
            card.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <h4 class="font-black text-gray-800 text-sm">${p.name}</h4>
                        <div class="flex flex-wrap mt-1">${allowedSrv || '<span class="text-red-400 text-[8px]">No Access</span>'}</div>
                    </div>
                    <span class="text-[8px] font-black ${p.isActive ? 'text-green-600' : 'text-red-600'}">${p.isActive ? 'ACTIVE' : 'BLOCKED'}</span>
                </div>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div class="bg-slate-50 p-2 rounded-xl text-center">
                        <p class="text-[7px] font-bold text-gray-400 uppercase">Admin Due</p>
                        <h5 class="text-xs font-black text-red-600">৳${(p.wallet?.adminDue || 0).toFixed(2)}</h5>
                    </div>
                    <div class="bg-slate-50 p-2 rounded-xl text-center">
                        <p class="text-[7px] font-bold text-gray-400 uppercase">Total Earn</p>
                        <h5 class="text-xs font-black text-blue-900">৳${(p.wallet?.totalEarning || 0).toFixed(2)}</h5>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="clearDue('${d.id}')" class="flex-1 bg-green-600 text-white py-2 rounded-xl text-[9px] font-bold shadow-md">Clear Due</button>
                    <button onclick="toggleP('${d.id}', ${p.isActive})" class="flex-1 ${p.isActive ? 'bg-red-600' : 'bg-blue-900'} text-white py-2 rounded-xl text-[9px] font-bold shadow-md">${p.isActive ? 'Block' : 'Unblock'}</button>
                </div>
            `;
            container.appendChild(card);
        });
        document.getElementById('totalDueCollect').innerText = `৳${totalDue.toFixed(2)}`;
    });
async function togglePartnerStatus(phone, currentStatus) {
    const newStatus = currentStatus === 'active' ? 'blocked' : 'active';
    await updateDoc(doc(db, "partners", phone), {
        status: newStatus
    });
    alert(`পার্টনার এখন ${newStatus}`);
}
    // --- Helpers ---
    window.clearDue = async (id) => { if(confirm("পেমেন্ট কি পেয়েছেন?")) await updateDoc(doc(db, "partners", id), { "wallet.adminDue": 0 }); };
    window.toggleP = async (id, s) => { await updateDoc(doc(db, "partners", id), { isActive: !s }); };
    window.saveCoupon = async () => {
        const code = document.getElementById('couponCode').value.toUpperCase();
        const disc = parseFloat(document.getElementById('couponDiscount').value);
        await setDoc(doc(db, "settings", "coupons"), { code, discount: disc });
        alert("কুপন সেভ হয়েছে!");
    };

    // --- Orders Rendering ---
    onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), (snap) => {
        const container = document.getElementById('orderContainer');
        container.innerHTML = "";
        snap.forEach(d => {
            const order = d.data();
            container.innerHTML += `
                <div class="bg-white p-5 rounded-[2rem] shadow-md border-l-4 border-blue-900 mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[8px] font-bold bg-blue-50 text-blue-900 px-2 py-1 rounded-full uppercase">${order.serviceType || 'service'}</span>
                        <span class="text-[8px] text-gray-300 font-mono">#${d.id.slice(-5)}</span>
                    </div>
                    <h3 class="text-sm font-black text-gray-800">${order.customerName}</h3>
                    <p class="text-[9px] text-gray-400 mb-3">${order.customerAddress}</p>
                    <div class="flex gap-2">
                        <button onclick="updateStatus('${d.id}', 'completed')" class="bg-green-600 text-white px-4 py-2 rounded-xl text-[8px] font-black uppercase shadow-sm">Complete</button>
                        <button onclick="deleteOrder('${d.id}')" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl text-[8px] font-black uppercase">Delete</button>
                    </div>
                </div>
            `;
        });
    });

    window.updateStatus = async (id, s) => { await updateDoc(doc(db, "orders", id), { status: s }); };
    window.deleteOrder = async (id) => { if(confirm("অর্ডারটি মুছে ফেলতে চান?")) await deleteDoc(doc(db, "orders", id)); };

</script>
</body>
</html>
