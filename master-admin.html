<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | মাস্টার প্যানেল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Hind Siliguri', sans-serif; } 
        .section-tab { cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; }
        .section-tab.active { border-color: #1e3a8a; color: #1e3a8a; font-weight: 900; }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 pb-20">

    <div class="max-w-2xl mx-auto p-4">
        <header class="bg-black text-white p-8 rounded-[3rem] shadow-2xl mb-8 flex justify-between items-center border-b-4 border-blue-600">
            <div>
                <h1 class="text-3xl font-black italic">MASTER PANEL</h1>
                <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Global Control</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] uppercase font-bold opacity-60">Total Admin Due</p>
                <h2 id="totalDueCollect" class="text-2xl font-black text-green-400 font-mono">৳০.০০</h2>
            </div>
        </header>

        <div class="flex justify-around bg-white p-4 rounded-3xl shadow-sm mb-8 font-bold text-xs text-gray-400 overflow-x-auto no-scrollbar">
            <div onclick="switchSection('orders')" id="tab-orders" class="section-tab active px-4 py-2 whitespace-nowrap">অর্ডারস</div>
            <div onclick="switchSection('partners')" id="tab-partners" class="section-tab px-4 py-2 whitespace-nowrap">পার্টনারস</div>
            <div onclick="switchSection('settings')" id="tab-settings" class="section-tab px-4 py-2 whitespace-nowrap">কুপন ও টিম</div>
        </div>

        <div id="section-orders">
             <div id="orderContainer" class="space-y-6"></div>
        </div>

        <div id="section-partners" class="hidden">
            <div class="bg-blue-900 p-6 rounded-[2.5rem] shadow-xl mb-8 border-b-4 border-blue-400">
                <h3 class="text-sm font-black text-white uppercase italic mb-4 text-center">➕ নতুন পার্টনার যোগ করুন</h3>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input type="text" id="pName" placeholder="নাম" class="p-4 rounded-xl bg-white/10 text-white border border-white/20 text-xs font-bold outline-none">
                    <input type="tel" id="pPhone" placeholder="মোবাইল" class="p-4 rounded-xl bg-white/10 text-white border border-white/20 text-xs font-bold outline-none">
                </div>
                <div class="mb-3">
                    <input type="number" id="partnerPin" placeholder="পার্টনার সিক্রেট পিন" class="w-full p-4 rounded-xl bg-white/10 text-white border border-white/20 text-xs font-bold outline-none">
                </div>
                <div class="bg-white/5 p-4 rounded-2xl mb-4 border border-white/10 text-white">
                    <p class="text-[9px] font-black text-blue-300 uppercase mb-3 tracking-widest">Service Access & Commission %</p>
                    <div class="grid grid-cols-1 gap-3">
                        <div class="flex items-center gap-3 bg-white/5 p-2 rounded-xl">
                            <input type="checkbox" id="srv_bajar" class="w-4 h-4 rounded accent-blue-500">
                            <span class="text-[10px] font-bold flex-1">বাজার (Shopping)</span>
                            <input type="number" id="comm_bajar" placeholder="%" class="w-16 p-2 rounded-lg bg-black/20 text-white text-[10px] border border-white/10 text-center">
                        </div>
                        <div class="flex items-center gap-3 bg-white/5 p-2 rounded-xl">
                            <input type="checkbox" id="srv_car" class="w-4 h-4 rounded accent-blue-500">
                            <span class="text-[10px] font-bold flex-1">কার রেন্টাল (Car)</span>
                            <input type="number" id="comm_car" placeholder="%" class="w-16 p-2 rounded-lg bg-black/20 text-white text-[10px] border border-white/10 text-center">
                        </div>
                    </div>
                </div>
                <div class="mb-3 flex gap-2">
                    <input type="text" id="partnerAddress" placeholder="ঠিকানা" class="flex-1 p-4 rounded-xl bg-white/10 text-white border border-white/20 text-[10px] font-bold outline-none">
                    <button onclick="getCoordinates()" class="bg-blue-500 text-white px-4 rounded-xl font-black text-[10px]">খুঁজুন</button>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input type="number" step="any" id="pLat" placeholder="Lat" class="p-4 rounded-xl bg-white/20 text-white border border-white/20 text-xs font-bold outline-none" readonly>
                    <input type="number" step="any" id="pLng" placeholder="Lng" class="p-4 rounded-xl bg-white/20 text-white border border-white/20 text-xs font-bold outline-none" readonly>
                </div>
                <button onclick="addNewPartner()" class="w-full bg-white text-blue-900 py-4 rounded-2xl text-xs font-black uppercase shadow-lg">পার্টনার সেভ করুন</button>
            </div>
            <div id="partnerList" class="space-y-4"></div>
        </div>

        <div id="section-settings" class="hidden">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-lg mb-8">
                <h3 class="text-sm font-black text-blue-900 uppercase italic mb-4 text-center">🎫 কুপন কোড সেটিংস</h3>
                <div class="space-y-3">
                    <input type="text" id="couponCode" placeholder="RAMADAN26" class="w-full p-4 rounded-2xl bg-slate-50 border text-xs font-bold outline-none uppercase">
                    <input type="number" id="couponDiscount" placeholder="ডিসকাউন্ট পরিমাণ (৳)" class="w-full p-4 rounded-2xl bg-slate-50 border text-xs font-bold outline-none">
                    <select id="couponServiceType" class="w-full p-4 rounded-2xl bg-slate-50 border text-xs font-bold outline-none">
                        <option value="all">সব সার্ভিসের জন্য</option>
                        <option value="shopping">বাজার সদাই (Shopping)</option>
                        <option value="car_rental">কার রেন্টাল (Car)</option>
                        <option value="delivery">পার্সেল ডেলিভারি (Delivery)</option>
                        <option value="home_service">হোম সার্ভিস</option>
                    </select>
                    <button onclick="saveCoupon()" class="w-full bg-blue-900 text-white py-4 rounded-2xl text-xs font-black uppercase shadow-lg">কুপন আপডেট করুন</button>
                </div>
            </div>
            <div id="activeCouponsList" class="space-y-3"></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, setDoc, orderBy, query, deleteDoc, serverTimestamp, getDoc, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
        authDomain: "gkhidmah-8636b.firebaseapp.com",
        projectId: "gkhidmah-8636b",
        storageBucket: "gkhidmah-8636b.firebasestorage.app",
        messagingSenderId: "780745438049",
        appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- একত্রিত উইন্ডো লোড (সব ইনিশিয়াল কল এখানে থাকবে) ---
    window.onload = () => {
        console.log("G-KHIDMAH Master Panel Connected!");
        showLiveOffers(); 
    };

    // --- Tab Switcher ---
    window.switchSection = (id) => {
        ['orders', 'partners', 'settings'].forEach(s => {
            const sec = document.getElementById(`section-${s}`);
            const tab = document.getElementById(`tab-${s}`);
            if(sec) sec.classList.add('hidden');
            if(tab) tab.classList.remove('active');
        });
        document.getElementById(`section-${id}`).classList.remove('hidden');
        document.getElementById(`tab-${id}`).classList.add('active');
    };

    // --- ১. একটিভ কুপন ব্যানার আপডেট ---
    async function showLiveOffers() {
        try {
            const q = query(collection(db, "coupons"), where("isActive", "==", true));
            const querySnapshot = await getDocs(q);
            const banner = document.getElementById('offerBanner');
            const title = document.getElementById('promoTitle');

            if (banner && !querySnapshot.empty) {
                const firstCoupon = querySnapshot.docs[0].data();
                if(title) title.innerText = firstCoupon.code;
                const discountBadge = banner.querySelector('div.bg-white\\/20');
                if(discountBadge) discountBadge.innerText = `৳${firstCoupon.discount} ছাড়!`;
                banner.classList.remove('hidden');
            } else if(banner) {
                banner.classList.add('hidden');
            }
        } catch (e) { console.error("Offer fetch error:", e); }
    }

    // --- ২. অর্ডার লিস্ট (রিয়েল-টাইম) ---
    onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), (snap) => {
        const container = document.getElementById('orderContainer');
        if(!container) return;
        container.innerHTML = "";
        snap.forEach(d => {
            const order = d.data();
            const total = ( (order.subTotal || 0) + (order.deliveryCharge || 0) + (order.platformFee || 0) ) - (order.discount || 0);

            container.innerHTML += `
                <div class="bg-white p-5 rounded-[2rem] shadow-md border-l-4 border-blue-900 mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[8px] font-bold bg-blue-50 text-blue-900 px-2 py-1 rounded-full uppercase">${order.serviceType || 'service'}</span>
                        <span class="text-[8px] text-gray-300 font-mono">#${d.id.slice(-5)}</span>
                    </div>
                    <h3 class="text-sm font-black text-gray-800">${order.customerName}</h3>
                    <p class="text-[9px] text-gray-400 mb-2">${order.customerAddress || 'No Address'}</p>
                    <div class="bg-slate-50 p-3 rounded-2xl text-[9px] font-bold text-gray-600 mb-3">
                        <p class="text-black font-black mt-1 text-xs">মোট বিল: ৳${total}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="updateStatus('${d.id}', 'completed')" class="bg-green-600 text-white px-4 py-2 rounded-xl text-[8px] font-black uppercase">Complete</button>
                        <button onclick="deleteOrder('${d.id}')" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl text-[8px] font-black uppercase">Delete</button>
                    </div>
                </div>`;
        });
    });

    // --- ৩. পার্টনার লিস্ট (রিয়েল-টাইম) ---
    onSnapshot(collection(db, "partners"), (snap) => {
        const container = document.getElementById('partnerList');
        if(!container) return;
        container.innerHTML = '<h4 class="text-[10px] font-black text-gray-400 uppercase mb-3 px-4">রেজিস্টার্ড পার্টনারস</h4>';
        let totalAdminDue = 0;

        snap.forEach(d => {
            const p = d.data();
            const due = p.wallet?.adminDue || 0;
            totalAdminDue += due;

            let allowedSrv = "";
            if(p.services) {
                Object.entries(p.services).forEach(([key, val]) => {
                    if(val.access) allowedSrv += `<span class="bg-blue-50 text-blue-700 px-2 py-0.5 rounded text-[7px] font-black mr-1 uppercase">${key.split('_')[0]}</span>`;
                });
            }

            const card = document.createElement('div');
            card.className = `p-5 rounded-[2.5rem] bg-white shadow-lg border-l-8 ${p.isActive ? 'border-emerald-500' : 'border-red-500'} mb-4`;
            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <h4 class="font-black text-gray-800 text-sm">${p.name}</h4>
                        <p class="text-[9px] text-gray-400 font-bold">${p.phone}</p>
                        <div class="flex flex-wrap mt-2">${allowedSrv || '<span class="text-[7px] text-red-400 uppercase">No Access</span>'}</div>
                    </div>
                    <span class="text-[8px] font-black px-2 py-1 rounded-full ${p.isActive ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}">${p.isActive ? 'ACTIVE' : 'BLOCKED'}</span>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-slate-50 p-3 rounded-2xl text-center">
                        <p class="text-[7px] font-bold text-gray-400 uppercase">Admin Due</p>
                        <h5 class="text-xs font-black text-red-600 font-mono">৳${due.toFixed(2)}</h5>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-2xl text-center">
                        <p class="text-[7px] font-bold text-gray-400 uppercase">PIN</p>
                        <h5 class="text-xs font-black text-blue-900">${p.pin || 'N/A'}</h5>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="clearPartnerDue('${d.id}')" class="flex-1 bg-emerald-600 text-white py-3 rounded-2xl text-[9px] font-black uppercase">Clear Due</button>
                    <button onclick="togglePartnerStatus('${d.id}', ${p.isActive})" class="flex-1 ${p.isActive ? 'bg-red-600' : 'bg-blue-900'} text-white py-3 rounded-2xl text-[9px] font-black uppercase">${p.isActive ? 'Block' : 'Unblock'}</button>
                </div>`;
            container.appendChild(card);
        });
        document.getElementById('totalDueCollect').innerText = `৳${totalAdminDue.toFixed(2)}`;
    });

    // --- ৪. হেল্পার ফাংশনস (Global Access) ---
    window.updateStatus = async (id, s) => { await updateDoc(doc(db, "orders", id), { status: s }); };
    window.deleteOrder = async (id) => { if(confirm("মুছে ফেলবেন?")) await deleteDoc(doc(db, "orders", id)); };
    
    window.clearPartnerDue = async (id) => {
        if(confirm("পেমেন্ট কি বুঝে পেয়েছেন?")) await updateDoc(doc(db, "partners", id), { "wallet.adminDue": 0 });
    };

    window.togglePartnerStatus = async (id, currentStatus) => {
        await updateDoc(doc(db, "partners", id), { isActive: !currentStatus });
    };

    window.saveCoupon = async () => {
        const code = document.getElementById('couponCode').value.trim().toUpperCase();
        const disc = parseFloat(document.getElementById('couponDiscount').value);
        if(!code || isNaN(disc)) return alert("সঠিক তথ্য দিন");
        await setDoc(doc(db, "coupons", code), { 
            code, discount: disc, serviceType: document.getElementById('couponServiceType').value,
            isActive: true, createdAt: serverTimestamp() 
        });
        alert("কুপন সেভ হয়েছে!");
    };

    window.deleteCoupon = async (id) => { if(confirm("মুছে ফেলতে চান?")) await deleteDoc(doc(db, "coupons", id)); };

    window.addNewPartner = async () => {
        const name = document.getElementById('pName').value.trim();
        const phone = document.getElementById('pPhone').value.trim();
        const pin = document.getElementById('partnerPin').value.trim();
        const lat = parseFloat(document.getElementById('pLat').value) || 0;
        const lng = parseFloat(document.getElementById('pLng').value) || 0;

        if(!name || !phone || !pin) return alert("সব তথ্য দিন!");

        await setDoc(doc(db, "partners", phone), {
            name, phone, pin, lat, lng, isActive: true,
            services: {
                shopping: { access: document.getElementById('srv_bajar').checked, commission: parseFloat(document.getElementById('comm_bajar').value) || 0 },
                car_rental: { access: document.getElementById('srv_car').checked, commission: parseFloat(document.getElementById('comm_car').value) || 0 }
            },
            wallet: { totalEarning: 0, adminDue: 0 },
            createdAt: serverTimestamp()
        });
        alert("✅ পার্টনার সফলভাবে রেজিস্টার্ড!");
    };
</script>
</body>
</html>
