<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | মাস্টার অ্যাডমিন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Hind Siliguri', sans-serif; } 
        .tab-active { background-color: #1e3a8a; color: white; transform: scale(1.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .section-tab { cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; }
        .section-tab.active { border-color: #1e3a8a; color: #1e3a8a; font-weight: 900; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-100 pb-20">

    <div class="max-w-2xl mx-auto p-4">
        <header class="bg-black text-white p-8 rounded-[3rem] shadow-2xl mb-8 flex justify-between items-center border-b-4 border-blue-600">
            <div>
                <h1 class="text-3xl font-black italic">MASTER PANEL</h1>
                <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Global Control Center</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] uppercase font-bold opacity-60">Admin Due Collection</p>
                <h2 id="totalDueCollect" class="text-2xl font-black text-green-400 font-mono">৳০.০০</h2>
            </div>
        </header>

        <div class="flex justify-around bg-white p-4 rounded-3xl shadow-sm mb-8 font-bold text-sm text-gray-400">
            <div onclick="switchSection('orders')" id="tab-orders" class="section-tab active px-4 py-2">অর্ডারস</div>
            <div onclick="switchSection('partners')" id="tab-partners" class="section-tab px-4 py-2">পার্টনারস</div>
            <div onclick="switchSection('settings')" id="tab-settings" class="section-tab px-4 py-2">সেটিংস</div>
        </div>

        <div id="section-orders">
            <div class="flex gap-2 overflow-x-auto no-scrollbar mb-6 pb-2">
                <button id="btn-all" onclick="filterBy('all')" class="tab-active px-6 py-3 rounded-2xl text-xs font-bold whitespace-nowrap">সব অর্ডার</button>
                <button id="btn-shopping" onclick="filterBy('shopping')" class="bg-white px-6 py-3 rounded-2xl text-xs font-bold whitespace-nowrap text-gray-600">🛒 বাজার</button>
                <button id="btn-home_service" onclick="filterBy('home_service')" class="bg-white px-6 py-3 rounded-2xl text-xs font-bold whitespace-nowrap text-gray-600">🛠️ সার্ভিস</button>
            </div>
            <div id="orderContainer" class="space-y-6"></div>
        </div>

        <div id="section-partners" class="hidden">
            <div class="bg-blue-900 p-6 rounded-[2.5rem] shadow-xl mb-8 border-b-4 border-blue-400">
                <h3 class="text-sm font-black text-white uppercase italic mb-4 flex items-center gap-2">
                    <span>➕ নতুন পার্টনার যোগ করুন</span>
                </h3>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input type="text" id="pName" placeholder="পার্টনারের নাম" class="p-3 rounded-xl bg-white/10 text-white placeholder-white/50 border border-white/20 text-xs font-bold outline-none">
                    <input type="tel" id="pPhone" placeholder="মোবাইল নম্বর" class="p-3 rounded-xl bg-white/10 text-white placeholder-white/50 border border-white/20 text-xs font-bold outline-none">
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <select id="pService" class="p-3 rounded-xl bg-white/10 text-white border border-white/20 text-xs font-bold outline-none">
                        <option class="text-black" value="shopping">বাজার (Shopping)</option>
                        <option class="text-black" value="home_service">সার্ভিস (Home Service)</option>
                        <option class="text-black" value="parcel">পার্সেল (Parcel)</option>
                    </select>
                    <input type="number" id="pComm" placeholder="কমিশন %" class="p-3 rounded-xl bg-white/10 text-white placeholder-white/50 border border-white/20 text-xs font-bold outline-none">
                </div>
                <button onclick="addNewPartner()" class="w-full bg-white text-blue-900 py-4 rounded-2xl text-xs font-black uppercase shadow-lg active:scale-95 transition-all">পার্টনার হিসেবে সেভ করুন</button>
            </div>

            <h3 class="text-lg font-black text-gray-800 mb-4 italic px-2">👥 পার্টনার লিস্ট ও পেমেন্ট</h3>
            <div id="partnerList" class="space-y-6"></div>
        </div>

        <div id="section-settings" class="hidden">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-lg mb-8 border-2 border-dashed border-blue-200 text-center">
                <p class="text-gray-500 font-bold">এখানে আপনার কুপন ও টিম সেটিংস রয়েছে।</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, setDoc, getDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- সেকশন সুইচ ---
        window.switchSection = (id) => {
            ['orders', 'partners', 'settings'].forEach(s => {
                document.getElementById(`section-${s}`).classList.add('hidden');
                document.getElementById(`tab-${s}`).classList.remove('active');
            });
            document.getElementById(`section-${id}`).classList.remove('hidden');
            document.getElementById(`tab-${id}`).classList.add('active');
        };

        // --- নতুন পার্টনার অ্যাড করার ফাংশন ---
        window.addNewPartner = async () => {
            const name = document.getElementById('pName').value.trim();
            const phone = document.getElementById('pPhone').value.trim();
            const service = document.getElementById('pService').value;
            const comm = parseFloat(document.getElementById('pComm').value) || 10;

            if(!name || !phone) return alert("নাম এবং নম্বর অবশ্যই দিতে হবে!");

            try {
                await setDoc(doc(db, "partners", phone), {
                    name: name,
                    phone: phone,
                    serviceType: service,
                    commission: comm,
                    isActive: true,
                    isApproved: true,
                    wallet: { totalEarning: 0, adminDue: 0 },
                    createdAt: new Date().toISOString()
                });
                alert("সফল! পার্টনার এখন লগইন করতে পারবে।");
                document.getElementById('pName').value = "";
                document.getElementById('pPhone').value = "";
            } catch (e) { alert(e.message); }
        };

        // --- পার্টনার লিস্ট রেন্ডারিং ---
        onSnapshot(collection(db, "partners"), (snap) => {
            const container = document.getElementById('partnerList');
            container.innerHTML = "";
            let totalDue = 0;

            snap.forEach(d => {
                const p = d.data();
                const id = d.id;
                totalDue += (p.wallet?.adminDue || 0);

                const card = document.createElement('div');
                card.className = `p-6 rounded-[2.5rem] shadow-xl border-t-8 bg-white mb-4 ${p.isActive ? 'border-blue-900' : 'border-red-500'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="font-black text-gray-800 uppercase text-sm">${p.name}</h4>
                            <p class="text-[10px] font-bold text-gray-400 font-mono">${p.phone} | ${p.serviceType}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-[8px] font-black ${p.isActive ? 'bg-blue-100 text-blue-900' : 'bg-red-100 text-red-700'} uppercase">
                            ${p.isActive ? 'ACTIVE' : 'BLOCKED'}
                        </span>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div class="bg-red-50 p-3 rounded-2xl text-center">
                            <p class="text-[8px] font-bold text-red-400">ADMIN DUE</p>
                            <h5 class="text-lg font-black text-red-600 font-mono">৳${(p.wallet?.adminDue || 0).toFixed(2)}</h5>
                        </div>
                        <div class="bg-blue-50 p-3 rounded-2xl text-center">
                            <p class="text-[8px] font-bold text-blue-400">PARTNER EARN</p>
                            <h5 class="text-lg font-black text-blue-900 font-mono">৳${(p.wallet?.totalEarning || 0).toFixed(2)}</h5>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="clearDue('${id}')" class="flex-1 bg-green-600 text-white py-3 rounded-xl text-[9px] font-black uppercase shadow-md">Clear Due</button>
                        <button onclick="toggleP('${id}', ${p.isActive})" class="flex-1 ${p.isActive ? 'bg-red-600' : 'bg-blue-600'} text-white py-3 rounded-xl text-[9px] font-black uppercase shadow-md">
                            ${p.isActive ? 'Block' : 'Unblock'}
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
            document.getElementById('totalDueCollect').innerText = `৳${totalDue.toFixed(2)}`;
        });

        window.clearDue = async (id) => {
            if(confirm("আপনি কি পার্টনারের কাছ থেকে পেমেন্ট বুঝে পেয়েছেন?")) {
                await updateDoc(doc(db, "partners", id), { "wallet.adminDue": 0 });
                alert("পেমেন্ট ক্লিয়ার করা হয়েছে।");
            }
        };

        window.toggleP = async (id, stat) => {
            await updateDoc(doc(db, "partners", id), { isActive: !stat });
        };

        // --- অর্ডার ও অন্যান্য লজিক আগের মতোই কাজ করবে ---
        // আপনি আপনার আগের কোড থেকে Order Rendering এবং Filter লজিক এখানে যুক্ত করে দিন।
    </script>
</body>
</html>
