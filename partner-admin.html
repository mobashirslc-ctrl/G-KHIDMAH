<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | পার্টনার প্যানেল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Hind Siliguri', sans-serif; } 
        .card-animate { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tab-active { background-color: #1e3a8a; color: white; }
    </style>
</head>
<body class="bg-slate-100 pb-24">

    <audio id="newOrderSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div id="loginSection" class="fixed inset-0 bg-blue-900 z-50 flex items-center justify-center p-6 hidden">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-sm shadow-2xl text-center">
            <h1 class="text-2xl font-black italic text-blue-900 mb-2">G-KHIDMAH</h1>
            <p class="text-[10px] font-bold text-gray-400 mb-6 uppercase">পার্টনার অথেন্টিকেশন</p>
            <input type="tel" id="loginPhone" placeholder="মোবাইল নম্বর" class="w-full p-4 rounded-2xl bg-slate-50 border mb-3 outline-none font-bold text-center">
            <input type="password" id="loginPin" placeholder="সিক্রেট পিন" class="w-full p-4 rounded-2xl bg-slate-50 border mb-6 outline-none font-bold text-center">
            <button onclick="handleLogin()" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-black shadow-lg">লগইন করুন</button>
        </div>
    </div>

    <div id="mainDashboard" class="max-w-2xl mx-auto p-4 hidden">
        <header class="bg-blue-900 text-white p-6 rounded-3xl shadow-xl mb-6 flex justify-between items-center">
            <div>
                <h1 id="pName" class="text-xl font-black italic uppercase">লোড হচ্ছে...</h1>
                <p id="pType" class="text-[10px] uppercase tracking-widest opacity-70 font-bold">অ্যাসাইনড পার্টনার</p>
            </div>
            <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded-2xl text-[10px] font-black shadow-lg">লগআউট</button>
        </header>

        <div class="bg-white p-5 rounded-[2.5rem] shadow-lg mb-8 border-2 border-dashed border-blue-200">
            <div class="grid grid-cols-1 gap-3">
                <div class="flex gap-2">
                    <input type="text" id="locInput" placeholder="আপনার বর্তমান লোকেশন..." class="flex-1 p-3 rounded-xl bg-slate-50 border text-xs font-bold outline-none">
                    <button onclick="updateLoc()" class="bg-blue-900 text-white px-4 rounded-xl text-[10px] font-bold">আপডেট</button>
                </div>
                <div class="flex gap-2 border-t pt-3">
                    <input type="password" id="pinInput" placeholder="পিন পরিবর্তন করুন" class="flex-1 p-3 rounded-xl bg-slate-50 border text-xs font-bold outline-none">
                    <button onclick="updatePin()" class="bg-slate-700 text-white px-4 rounded-xl text-[10px] font-bold">সেভ পিন</button>
                </div>
            </div>
        </div>

        <h3 class="text-xs font-black text-slate-500 uppercase mb-4 px-2">আপনার কাজগুলো:</h3>
        <div id="orderContainer" class="space-y-6"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, onSnapshot, query, where, arrayRemove, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentPartner = JSON.parse(localStorage.getItem('gPartnerAuth')) || null;
        let knownOrderIds = new Set();

        const configs = {
            shopping: { title: "বাজার সদাই", color: "border-green-600", steps: ["pending", "received", "invoice_ready", "confirmed", "on_the_way", "market_reached", "shopping", "packing", "delivery", "completed"] },
            home_service: { title: "হোম সার্ভিস", color: "border-orange-500", steps: ["expert_finding", "expert_assigned", "work_in_progress", "payment_pending", "completed"] },
            car_rental: { title: "কার রেন্টাল", color: "border-blue-500", steps: ["request_received", "driver_assigned", "car_on_way", "trip_started", "completed"] },
            delivery: { title: "পার্সেল ডেলিভারি", color: "border-purple-600", steps: ["pickup_pending", "rider_assigned", "picked_up", "on_the_way", "delivered", "completed"] }
        };

        // --- Auth System ---
        const checkAuth = () => {
            if (!currentPartner) {
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('mainDashboard').classList.add('hidden');
            } else {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                document.getElementById('pName').innerText = currentPartner.name;
                document.getElementById('pType').innerText = currentPartner.type;
                startPartnerListener();
            }
        };

        window.handleLogin = async () => {
            const phone = document.getElementById('loginPhone').value;
            const pin = document.getElementById('loginPin').value;
            const docSnap = await getDoc(doc(db, "team", phone));

            if (docSnap.exists() && docSnap.data().secretCode === pin) {
                currentPartner = { id: docSnap.id, ...docSnap.data() };
                localStorage.setItem('gPartnerAuth', JSON.stringify(currentPartner));
                checkAuth();
            } else { alert("ভুল নম্বর বা পিন!"); }
        };

        window.logout = () => { localStorage.removeItem('gPartnerAuth'); location.reload(); };

        // --- Profile Update ---
        window.updateLoc = async () => {
            const loc = document.getElementById('locInput').value;
            await updateDoc(doc(db, "team", currentPartner.id), { currentLocation: loc, lastActive: Date.now() });
            alert("লোকেশন আপডেট হয়েছে!");
        };

        window.updatePin = async () => {
            const pin = document.getElementById('pinInput').value;
            await updateDoc(doc(db, "team", currentPartner.id), { secretCode: pin });
            alert("পিন আপডেট হয়েছে!");
        };

        // --- Order Listener with Notification Sound ---
        function startPartnerListener() {
            const q = query(collection(db, "orders"), where("assignedPerson.id", "==", currentPartner.id), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snap) => {
                const container = document.getElementById('orderContainer');
                container.innerHTML = "";
                
                snap.forEach(d => {
                    const order = { id: d.id, ...d.data() };
                    
                    // নতুন অর্ডারের জন্য সাউন্ড
                    if (knownOrderIds.size > 0 && !knownOrderIds.has(order.id)) {
                        document.getElementById('newOrderSound').play().catch(e => console.log("Sound enabled after touch"));
                    }
                    knownOrderIds.add(order.id);

                    const type = order.serviceType || 'shopping';
                    const config = configs[type] || configs.shopping;

                    const card = document.createElement('div');
                    card.className = `card-animate bg-white p-6 rounded-[2.5rem] shadow-xl border-l-[12px] ${config.color} mb-6`;
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <span class="bg-slate-100 text-slate-800 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">${config.title}</span>
                            <span class="text-[9px] font-bold text-gray-300">#${order.id.slice(-5)}</span>
                        </div>
                        <div class="mb-4">
                            <h3 class="text-sm font-black text-gray-800">${order.customerName}</h3>
                            <p class="text-[11px] text-blue-600 font-bold">${order.customerPhone}</p>
                            <p class="text-[10px] text-gray-400 mt-1">${order.customerAddress}</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-3xl mb-4 border border-slate-100">
                            ${renderSpecifics(order)}
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            ${config.steps.map((s, i) => `
                                <button onclick="updateStatus('${order.id}', '${s}')" class="py-2.5 px-1 rounded-xl text-[8px] font-black uppercase transition-all ${order.status === s ? 'bg-blue-900 text-white shadow-lg scale-105' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'}">
                                    ${i+1}. ${s.replace(/_/g, ' ')}
                                </button>
                            `).join('')}
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        // --- Invoice & Product Management Logic ---
        function renderSpecifics(order) {
            const type = order.serviceType || 'shopping';
            if(type === 'shopping') {
                return `
                    <div class="space-y-2">
                        ${order.items.map(item => `
                            <div class="flex items-center gap-2 bg-white p-2 rounded-xl shadow-sm border border-slate-50">
                                <button onclick="removeItem('${order.id}', '${item}')" class="text-red-400 font-bold px-2">×</button>
                                <span class="text-[10px] flex-1 font-bold text-slate-700">${item}</span>
                                <input type="number" data-id="${order.id}" data-item="${item}" value="${order.itemPrices?.[item] || ''}" class="w-16 p-1.5 bg-blue-50 rounded-lg text-[10px] text-center font-bold outline-none" placeholder="৳">
                            </div>
                        `).join('')}
                        <div class="pt-2 flex flex-col gap-2">
                            <div class="flex gap-2">
                                <input type="number" id="del-${order.id}" value="${order.deliveryCharge || 70}" class="w-1/2 p-2 rounded-lg border text-[10px] font-bold outline-none" placeholder="ডেলিভারি">
                                <input type="number" id="plat-${order.id}" value="${order.platformFee || 20}" class="w-1/2 p-2 rounded-lg border text-[10px] font-bold outline-none" placeholder="ফি">
                            </div>
                            <button onclick="saveShoppingBill('${order.id}')" class="w-full bg-green-600 text-white py-2.5 rounded-xl text-[10px] font-black uppercase shadow-md active:scale-95 transition-all">ইনভয়েস সেভ করুন</button>
                        </div>
                    </div>`;
            } else {
                return `
                    <div class="space-y-3 text-center">
                        <p class="text-[10px] font-bold text-blue-900 uppercase">সার্ভিস রিকোয়েস্ট: ${order.items.join(', ')}</p>
                        <div class="flex gap-2">
                            <input type="number" id="bill-${order.id}" value="${order.subTotal || ''}" placeholder="মোট বিল (৳)" class="flex-1 p-3 rounded-xl border text-xs font-bold outline-none bg-white">
                            <button onclick="saveServiceBill('${order.id}')" class="bg-blue-900 text-white px-4 rounded-xl text-[10px] font-bold uppercase">সেভ</button>
                        </div>
                    </div>`;
            }
        }

        window.updateStatus = async (id, s) => { await updateDoc(doc(db, "orders", id), { status: s }); };

        window.saveShoppingBill = async (id) => {
            const prices = {}; let sub = 0;
            document.querySelectorAll(`input[data-id="${id}"]`).forEach(inp => {
                const p = parseFloat(inp.value) || 0;
                prices[inp.dataset.item] = p; sub += p;
            });
            const del = parseFloat(document.getElementById(`del-${id}`).value) || 0;
            const plat = parseFloat(document.getElementById(`plat-${id}`).value) || 0;

            await updateDoc(doc(db, "orders", id), { 
                itemPrices: prices, subTotal: sub, deliveryCharge: del, platformFee: plat, status: "invoice_ready" 
            });
            alert("শপিং বিল আপডেট হয়েছে!");
        };

        window.saveServiceBill = async (id) => {
            const val = parseFloat(document.getElementById(`bill-${id}`).value) || 0;
            await updateDoc(doc(db, "orders", id), { subTotal: val, status: "payment_pending" });
            alert("সার্ভিস বিল সেভ হয়েছে!");
        };

        // আইটেম রিমুভ করার সময় ইউজারকে নোটিফিকেশন মেসেজ পাঠানো
        window.removeItem = async (id, item) => {
            if(confirm(`"${item}" তালিকা থেকে বাদ দিবেন? ইউজার নোটিফিকেশন পাবেন।`)) {
                await updateDoc(doc(db, "orders", id), { 
                    items: arrayRemove(item),
                    alertMessage: `দুঃখিত, আপনার লিস্টের "${item}" এই মুহূর্তে পাওয়া যায়নি।`,
                    alertTime: Date.now()
                });
            }
        };

        checkAuth();
    </script>
</body>
</html>
