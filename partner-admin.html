<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | পার্টনার প্যানেল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Hind Siliguri', sans-serif; } 
        .card-animate { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-100 pb-24">

    <audio id="newOrderSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div id="loginSection" class="min-h-screen bg-blue-900 flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-md shadow-2xl">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-black italic text-blue-900 tracking-tighter uppercase">G-KHIDMAH</h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">পার্টনার অথেন্টিকেশন</p>
            </div>
            <div class="space-y-4">
                <input type="tel" id="loginPhone" placeholder="মোবাইল নম্বর" class="w-full p-5 rounded-[1.5rem] bg-slate-50 border border-slate-100 outline-none font-bold text-center text-lg focus:ring-2 focus:ring-blue-500">
                <input type="password" id="loginPin" placeholder="সিক্রেট পিন" class="w-full p-5 rounded-[1.5rem] bg-slate-50 border border-slate-100 outline-none font-bold text-center text-lg tracking-[0.5em] focus:ring-2 focus:ring-blue-500">
                <button onclick="handleLogin()" class="w-full bg-blue-900 text-white py-5 rounded-[1.5rem] font-black shadow-xl active:scale-95 transition-all uppercase mt-4">লগইন করুন</button>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="max-w-md mx-auto p-4 hidden">
        <header class="bg-gradient-to-br from-blue-900 to-indigo-950 text-white p-8 rounded-[3rem] shadow-2xl mb-8 relative overflow-hidden">
            <div class="relative z-10 flex justify-between items-start mb-6">
                <div>
                    <h1 class="text-[10px] uppercase tracking-[0.3em] font-bold opacity-60 mb-1 text-blue-200">G-Khidmah Partner</h1>
                    <h2 id="pName" class="text-2xl font-black italic tracking-tight uppercase text-white">লোড হচ্ছে...</h2>
                </div>
                <button onclick="handleLogout()" class="bg-white/10 p-3 rounded-2xl backdrop-blur-md text-[9px] font-black uppercase border border-white/20">Log out</button>
            </div>
            <div class="flex gap-2">
                <span id="pLocationStatus" class="bg-emerald-500/30 text-emerald-300 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest border border-white/10">অ্যাক্টিভ পার্টনার ✅</span>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-b-8 border-blue-500/20 text-center">
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">মোট আয়</span>
                <h3 class="text-xl font-black text-blue-900 mt-1">৳ <span id="totalEarn">0.00</span></h3>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-b-8 border-red-500/20 text-center">
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">অ্যাডমিন ডিউ</span>
                <h3 class="text-xl font-black text-red-600 mt-1">৳ <span id="adminDue">0.00</span></h3>
            </div>
        </div>

        <div id="teamSection" class="bg-white p-6 rounded-[2.5rem] shadow-xl mb-8 border border-slate-100">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">👥 টিম মেম্বার অ্যাড করুন</h3>
            <div class="grid grid-cols-2 gap-3 mb-3">
                <input type="text" id="tmName" placeholder="নাম" class="p-3 bg-slate-50 border rounded-xl text-xs font-bold outline-none">
                <input type="tel" id="tmPhone" placeholder="মোবাইল" class="p-3 bg-slate-50 border rounded-xl text-xs font-bold outline-none">
            </div>
            <div class="grid grid-cols-2 gap-3 mb-3">
                <select id="tmRole" class="p-3 bg-slate-50 border rounded-xl text-[10px] font-bold outline-none">
                    <option value="rider">ডেলিভারি ম্যান (Rider)</option>
                    <option value="plumber">প্লাম্বার</option>
                    <option value="electrician">ইলেকট্রিশিয়ান</option>
                    <option value="driver">ড্রাইভার</option>
                </select>
                <input type="text" id="tmNid" placeholder="NID নাম্বার" class="p-3 bg-slate-50 border rounded-xl text-xs font-bold outline-none">
            </div>
            <button onclick="addTeamMember()" class="w-full bg-emerald-600 text-white py-3 rounded-xl text-[10px] font-black uppercase shadow-lg">টিম মেম্বার সেভ করুন</button>
        </div>

        <h3 class="text-xs font-black text-slate-500 uppercase mb-4 ml-4">চলমান অর্ডারসমূহ</h3>
        <div id="orderContainer" class="space-y-6"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, onSnapshot, query, where, arrayRemove, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const COLLECTION_NAME = "partners"; 
        let currentPartnerId = "";
        let knownOrderIds = new Set();

        // মাল্টি-সার্ভিস ১০ স্টেপ ট্র্যাকিং
        const multiServiceStatus = {
            shopping: ["pending", "received", "invoice_ready", "confirmed", "on_the_way", "market_reached", "shopping", "packing", "delivery", "completed"],
            parcel: ["pending", "received", "invoice_ready", "confirmed", "rider_assigned", "at_pickup", "picked", "in_transit", "near_delivery", "completed"],
            home_service: ["pending", "confirmed", "expert_assigned", "on_the_way", "reached", "working", "parts_needed", "invoice_ready", "payment_done", "completed"]
        };

        // Auth Logic (আপনার অরিজিনাল লজিক)
        window.handleLogin = async () => {
            const phone = document.getElementById('loginPhone').value.trim();
            const pinInput = document.getElementById('loginPin').value.trim();
            if(!phone || !pinInput) return alert("নম্বর এবং পিন দিন");
            try {
                const docSnap = await getDoc(doc(db, COLLECTION_NAME, phone));
                if (docSnap.exists() && docSnap.data().pin?.toString() === pinInput) {
                    localStorage.setItem('gPartnerAuth', JSON.stringify({ id: docSnap.id }));
                    location.reload();
                } else { alert("ভুল তথ্য!"); }
            } catch (e) { alert("এরর: " + e.message); }
        };

        window.handleLogout = () => {
            localStorage.removeItem('gPartnerAuth');
            location.reload();
        };

        // টিম মেম্বার অ্যাড
        window.addTeamMember = async () => {
            const name = document.getElementById('tmName').value;
            const phone = document.getElementById('tmPhone').value;
            const role = document.getElementById('tmRole').value;
            const nid = document.getElementById('tmNid').value;
            if(!name || !phone) return alert("তথ্য পূরণ করুন");

            try {
                await addDoc(collection(db, "partners", currentPartnerId, "team"), {
                    name, phone, role, nid, createdAt: new Date()
                });
                alert("মেম্বার যুক্ত হয়েছে!");
                location.reload();
            } catch (e) { console.error(e); }
        };

        // ডাটা লোডিং
        const authStore = localStorage.getItem('gPartnerAuth');
        if(authStore) {
            currentPartnerId = JSON.parse(authStore).id;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');

            // পার্টনার প্রোফাইল ও ওয়ালেট
            onSnapshot(doc(db, COLLECTION_NAME, currentPartnerId), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    document.getElementById('pName').innerText = d.name || "Partner";
                    document.getElementById('totalEarn').innerText = d.wallet?.totalEarning || "0.00";
                    document.getElementById('adminDue').innerText = d.wallet?.adminDue || "0.00";
                }
            });

            // অর্ডার ট্র্যাকিং ও সাউন্ড
            const q = query(collection(db, "orders"), where("assignedPerson.id", "==", currentPartnerId), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                const container = document.getElementById('orderContainer');
                container.innerHTML = "";
                if(snap.empty) container.innerHTML = `<p class="text-center text-gray-400 text-[10px] mt-10">কোন অর্ডার নেই</p>`;
                
                snap.forEach(d => {
                    const order = { id: d.id, ...d.data() };
                    if (knownOrderIds.size > 0 && !knownOrderIds.has(order.id)) {
                        document.getElementById('newOrderSound')?.play().catch(()=>{});
                    }
                    knownOrderIds.add(order.id);
                    renderOrderCard(order, container);
                });
            });
        }

        async function renderOrderCard(order, container) {
            const card = document.createElement('div');
            card.className = "card-animate bg-white p-6 rounded-[2.5rem] shadow-xl border-t-8 border-blue-900 mb-6";
            
            const steps = multiServiceStatus[order.serviceType] || multiServiceStatus.shopping;
            
            // টিম লোড করা
            const teamSnap = await getDocs(collection(db, "partners", currentPartnerId, "team"));
            let options = `<option value="">টিম মেম্বার সিলেক্ট করুন</option>`;
            teamSnap.forEach(m => {
                options += `<option value='${JSON.stringify(m.data())}'>${m.data().name} (${m.data().role})</option>`;
            });

            // শপিং লিস্ট থাকলে দেখাবে (আপনার আগের কোড অনুযায়ী)
            let itemsHtml = "";
            if(order.serviceType === 'shopping' && order.items) {
                itemsHtml = `
                    <div class="bg-slate-50 p-4 rounded-3xl my-4 border">
                        <p class="text-[9px] font-black text-gray-400 uppercase mb-2">Shopping List</p>
                        ${order.items.map(item => `<div class="flex justify-between text-[11px] font-bold mb-1 border-b pb-1 text-slate-600"><span>${item}</span> <span>৳ ${order.itemPrices?.[item] || 0}</span></div>`).join('')}
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-[9px] font-black uppercase">${order.serviceType || 'Service'}</span>
                    <span class="text-[9px] font-bold text-gray-300">#${order.id.slice(-5)}</span>
                </div>
                <div class="mb-4">
                    <h3 class="text-sm font-black text-gray-800">${order.customerName}</h3>
                    <p class="text-[10px] text-gray-400">${order.customerAddress}</p>
                </div>

                ${itemsHtml}

                <div class="bg-blue-50 p-4 rounded-3xl mb-4">
                    <p class="text-[9px] font-black text-blue-400 uppercase mb-3">Invoice & Assignment</p>
                    <div class="flex gap-2 mb-3">
                        <input type="number" id="charge-${order.id}" value="${order.deliveryCharge || ''}" placeholder="বিল এমাউন্ট" class="w-1/2 p-2 rounded-xl text-xs font-bold border-none outline-none">
                        <button onclick="sendInvoice('${order.id}')" class="w-1/2 bg-blue-900 text-white rounded-xl text-[9px] font-black uppercase">বিল পাঠান</button>
                    </div>
                    <select onchange='assignMember("${order.id}", this.value)' class="w-full p-2 rounded-xl text-[10px] font-bold outline-none border-none">
                        ${options}
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    ${steps.map((s, i) => {
                        const isLocked = !order.invoiceConfirmed && i > 2; // ইউজার কনফার্ম না করলে ৩ নম্বর ধাপের পর লক
                        return `
                        <button onclick="updateStatus('${order.id}', '${s}')" ${isLocked ? 'disabled' : ''} 
                            class="py-2.5 rounded-xl text-[8px] font-black uppercase transition-all 
                            ${order.status === s ? 'bg-blue-900 text-white shadow-lg' : isLocked ? 'bg-gray-50 text-gray-200' : 'bg-gray-100 text-gray-400'}">
                            ${i+1}. ${s.replace(/_/g, ' ')} ${isLocked ? '🔒' : ''}
                        </button>`;
                    }).join('')}
                </div>
            `;
            container.appendChild(card);
        }

        window.sendInvoice = async (id) => {
            const val = document.getElementById(`charge-${id}`).value;
            await updateDoc(doc(db, "orders", id), { deliveryCharge: parseFloat(val), status: "invoice_ready" });
            alert("ইনভয়েস পাঠানো হয়েছে। ইউজার কনফার্ম করলে বাকি বাটন আনলক হবে।");
        };

        window.assignMember = async (id, mJson) => {
            if(!mJson) return;
            const m = JSON.parse(mJson);
            await updateDoc(doc(db, "orders", id), {
                riderName: m.name, riderPhone: m.phone, riderNid: m.nid, status: (m.role === 'rider' ? 'rider_assigned' : 'expert_assigned')
            });
            alert(m.name + " কে এসাইন করা হয়েছে।");
        };

        window.updateStatus = async (id, s) => {
            await updateDoc(doc(db, "orders", id), { status: s });
        };

    </script>
</body>
</html>
