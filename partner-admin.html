<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | পার্টনার প্যানেল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Hind Siliguri', sans-serif; } 
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-100 pb-20">

    <div id="authSection" class="max-w-md mx-auto mt-20 p-8 bg-white rounded-[2.5rem] shadow-2xl border mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-blue-900 italic uppercase">G-KHIDMAH</h1>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Partner Login</p>
        </div>
        <div class="space-y-4">
            <input type="tel" id="loginPhone" placeholder="রেজিস্টার্ড মোবাইল নম্বর" class="w-full p-4 rounded-2xl bg-slate-50 border-2 outline-none font-bold focus:border-blue-900">
            <button onclick="loginPartner()" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all">লগইন করুন</button>
        </div>
    </div>

    <div id="dashboardSection" class="hidden max-w-2xl mx-auto p-4">
        <header class="bg-blue-900 text-white p-6 rounded-[2rem] shadow-xl mb-6">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 id="pNameDisplay" class="text-xl font-black italic">লোড হচ্ছে...</h1>
                    <p id="pServiceType" class="text-[10px] font-bold opacity-60"></p>
                </div>
                <button onclick="location.reload()" class="bg-red-500 text-white text-[10px] px-4 py-2 rounded-xl font-bold">লগআউট</button>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/10 p-4 rounded-2xl border border-white/10 text-center">
                    <p class="text-[9px] uppercase font-bold opacity-70">আমার আয় (Net)</p>
                    <h2 id="walletBalance" class="text-xl font-black text-green-400 font-mono">৳০.০০</h2>
                </div>
                <div class="bg-white/10 p-4 rounded-2xl border border-white/10 text-center">
                    <p class="text-[9px] uppercase font-bold opacity-70 text-red-300">অ্যাডমিন ডিউ (Admin)</p>
                    <h2 id="adminDue" class="text-xl font-black text-red-400 font-mono">৳০.০০</h2>
                </div>
            </div>
        </header>

        <div id="orderContainer" class="space-y-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentPartner = null;

        window.loginPartner = async () => {
            const phone = document.getElementById('loginPhone').value.trim();
            const docSnap = await getDoc(doc(db, "partners", phone));

            if (docSnap.exists()) {
                const data = docSnap.data();
                
                // --- অটো ব্লক লজিক (১২ AM এর চেক) ---
                const now = new Date();
                const due = data.wallet?.adminDue || 0;
                
                // যদি ডিউ ০ এর বেশি থাকে এবং অ্যাডমিন তাকে একটিভ না রাখে
                if(!data.isActive || (due > 0 && now.getHours() >= 0 && data.lastDueUpdate !== now.toLocaleDateString())) {
                   alert("আপনার ডিউ পেমেন্ট পেন্ডিং থাকায় অ্যাকাউন্টটি সাময়িকভাবে ব্লক করা হয়েছে। দয়া করে অ্যাডমিনের সাথে যোগাযোগ করুন।");
                   return;
                }

                currentPartner = { id: docSnap.id, ...data };
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                document.getElementById('pNameDisplay').innerText = data.name;
                document.getElementById('pServiceType').innerText = `বিভাগ: ${data.serviceType}`;
                initDashboard();
            } else {
                alert("ভুল নম্বর!");
            }
        };

        function initDashboard() {
            onSnapshot(doc(db, "partners", currentPartner.id), (snap) => {
                const d = snap.data();
                document.getElementById('walletBalance').innerText = `৳${(d.wallet?.totalEarning || 0).toFixed(2)}`;
                document.getElementById('adminDue').innerText = `৳${(d.wallet?.adminDue || 0).toFixed(2)}`;
                currentPartner.wallet = d.wallet;
                currentPartner.commission = d.commission;
            });

            onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), (snap) => {
                const container = document.getElementById('orderContainer');
                container.innerHTML = "";
                snap.forEach(d => {
                    const o = d.data();
                    if(o.serviceType === currentPartner.serviceType && o.status !== "completed") {
                        const card = document.createElement('div');
                        card.className = "bg-white p-5 rounded-[2rem] shadow-lg mb-4 border-l-8 border-blue-900";
                        card.innerHTML = `
                            <h3 class="text-sm font-black">${o.customerName}</h3>
                            <p class="text-[10px] text-gray-400 mb-4">${o.customerAddress}</p>
                            <div class="flex gap-2">
                                <input type="number" id="bill-${d.id}" value="${o.subTotal || ''}" placeholder="মোট বিল" class="flex-1 p-2 rounded-xl bg-slate-50 text-xs font-bold outline-none border">
                                <button onclick="completeOrder('${d.id}')" class="bg-green-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase">Complete</button>
                            </div>
                        `;
                        container.appendChild(card);
                    }
                });
            });
        }

        window.completeOrder = async (orderId) => {
            const bill = parseFloat(document.getElementById(`bill-${orderId}`).value) || 0;
            if(bill <= 0) return alert("সঠিক বিল দিন!");

            const adminComm = (bill * (currentPartner.commission || 10)) / 100;
            const partnerEarn = bill - adminComm;

            await updateDoc(doc(db, "orders", orderId), { status: "completed", subTotal: bill });
            const pRef = doc(db, "partners", currentPartner.id);
            await updateDoc(pRef, {
                "wallet.totalEarning": (currentPartner.wallet?.totalEarning || 0) + partnerEarn,
                "wallet.adminDue": (currentPartner.wallet?.adminDue || 0) + adminComm
            });
            alert("কাজ সম্পন্ন হয়েছে!");
        };
    </script>
</body>
</html>
