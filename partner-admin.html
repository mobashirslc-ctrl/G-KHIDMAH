<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | পার্টনার কন্ট্রোল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Hind Siliguri', sans-serif; } </style>
</head>
<body class="bg-slate-100 pb-20">

    <div id="mainContent" class="max-w-2xl mx-auto p-4">
        <header class="bg-blue-900 text-white p-6 rounded-3xl shadow-xl mb-6">
            <h1 class="text-xl font-black italic uppercase">G-KHIDMAH PARTNER</h1>
            <div id="locationStatus" class="mt-2 text-[10px] bg-blue-800 p-2 rounded-lg font-bold">
                লোকেশন সেট করা নেই ⚠️
            </div>
            <button onclick="updatePartnerLocation()" class="mt-3 w-full bg-green-500 py-2 rounded-xl text-xs font-bold uppercase shadow-lg">📍 আমার বর্তমান লোকেশন সেট করুন</button>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-4 rounded-3xl shadow-sm border-b-4 border-blue-500 text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase">মোট আয়</p>
                <h2 id="pEarning" class="text-xl font-black italic text-blue-900">৳ 0</h2>
            </div>
            <div class="bg-white p-4 rounded-3xl shadow-sm border-b-4 border-red-500 text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase">অ্যাডমিন ডিউ</p>
                <h2 id="pDue" class="text-xl font-black italic text-red-600">৳ 0</h2>
            </div>
        </div>

        <div id="orderContainer" class="space-y-4">
            <p class="text-center text-gray-400 text-xs font-bold py-10 uppercase tracking-widest">অর্ডার লোড হচ্ছে...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, query, where, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { /* আপনার কনফিগ দিন */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ডেমো পার্টনার আইডি (লগইন করার পর যা পাবেন)
        const partnerPhone = "017XXXXXXXX"; 

        // ১. লোকেশন আপডেট ফাংশন
        window.updatePartnerLocation = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    await updateDoc(doc(db, "partners", partnerPhone), {
                        lat: lat,
                        lng: lng,
                        locationSet: true
                    });
                    alert("লোকেশন আপডেট হয়েছে! এখন আপনার রেডিয়াসের অর্ডারগুলো পাবেন।");
                });
            } else {
                alert("আপনার ব্রাউজার লোকেশন সাপোর্ট করে না।");
            }
        };

        // ২. পার্টনার প্রোফাইল ও অর্ডার রিয়েলটাইম লোড
        onSnapshot(doc(db, "partners", partnerPhone), (snap) => {
            if(snap.exists()){
                const data = snap.data();
                document.getElementById('pEarning').innerText = `৳ ${data.earning || 0}`;
                document.getElementById('pDue').innerText = `৳ ${data.adminDue || 0}`;
                if(data.locationSet) {
                    document.getElementById('locationStatus').innerText = "লোকেশন সেট করা আছে ✅";
                    document.getElementById('locationStatus').classList.replace('bg-blue-800', 'bg-green-700');
                }
            }
        });

        // ৩. এই পার্টনারের জন্য আসা অর্ডারগুলো দেখানো
        onSnapshot(query(collection(db, "orders"), where("partnerId", "==", partnerPhone), orderBy("createdAt", "desc")), (snap) => {
            const container = document.getElementById('orderContainer');
            container.innerHTML = "";
            snap.forEach(doc => {
                const order = doc.data();
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-[2rem] shadow-md border-l-8 border-blue-900">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-black text-sm text-gray-800">${order.customerName}</h3>
                            <span class="text-[8px] bg-blue-100 text-blue-900 px-2 py-1 rounded-full font-bold uppercase">${order.status}</span>
                        </div>
                        <p class="text-[10px] text-gray-500 font-bold mb-3">${order.customerAddress}</p>
                        <button onclick="updateStatus('${doc.id}', 'confirmed')" class="w-full bg-blue-900 text-white py-2 rounded-xl text-[10px] font-black uppercase">অর্ডার কনফার্ম করুন</button>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
