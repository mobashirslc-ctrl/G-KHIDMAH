<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | পার্টনার প্রো</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Hind Siliguri', sans-serif; } </style>
</head>
<body class="bg-slate-100 pb-20">

    <div id="loginOverlay" class="fixed inset-0 bg-blue-900 z-50 flex items-center justify-center p-6 hidden">
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black text-blue-900 mb-2 uppercase italic">Partner Access</h2>
            <p class="text-xs text-gray-400 mb-6 font-bold">আপনার ফোন নম্বর এবং সিক্রেট পিন দিন</p>
            <input type="tel" id="loginPhone" placeholder="Phone Number (017...)" class="w-full p-4 rounded-2xl bg-slate-100 mb-3 text-center font-bold outline-none border-2 border-transparent focus:border-blue-500 transition-all">
            <input type="password" id="masterPin" placeholder="Secret PIN" class="w-full p-4 rounded-2xl bg-slate-100 mb-6 text-center font-bold outline-none border-2 border-transparent focus:border-blue-500 transition-all">
            <button onclick="handlePinLogin()" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all">প্রবেশ করুন 🚀</button>
        </div>
    </div>

    <div id="mainContent" class="max-w-2xl mx-auto p-4 hidden">
        <header class="bg-blue-900 text-white p-6 rounded-3xl shadow-xl mb-6 relative">
            <div class="flex justify-between items-start mb-4">
                <h1 class="text-xl font-black italic uppercase tracking-tighter">G-KHIDMAH PARTNER</h1>
                <div class="space-x-2">
                    <button onclick="updateMyPin()" class="bg-white/10 hover:bg-white/20 px-3 py-1 rounded-xl text-[10px] font-bold uppercase transition-all border border-white/20">🔑 Pin</button>
                    <button onclick="handleLogout()" class="bg-red-500/20 hover:bg-red-500 text-red-200 hover:text-white px-3 py-1 rounded-xl text-[10px] font-black uppercase transition-all border border-red-500/30">Logout 🔒</button>
                </div>
            </div>
            <div id="locationStatus" class="mt-2 text-[10px] bg-blue-800 p-2 rounded-lg font-bold inline-block text-white">লোকেশন লোড হচ্ছে...</div>
            <button onclick="updatePartnerLocation()" class="mt-4 w-full bg-green-500 hover:bg-green-600 py-3 rounded-2xl text-xs font-black uppercase shadow-lg transition-all active:scale-95">📍 লোকেশন আপডেট করুন</button>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-4 rounded-3xl shadow-sm border-b-4 border-blue-500 text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase">মোট আয়</p>
                <h2 id="pEarning" class="text-xl font-black italic text-blue-900">৳ ০.০০</h2>
            </div>
            <div class="bg-white p-4 rounded-3xl shadow-sm border-b-4 border-red-500 text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase">অ্যাডমিন ডিউ</p>
                <h2 id="pDue" class="text-xl font-black italic text-red-600">৳ ০.০০</h2>
            </div>
        </div>

        <h3 class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest px-2 text-center">চলমান অর্ডারসমূহ</h3>
        <div id="orderContainer" class="space-y-4 mb-10">
            <p class="text-center text-gray-400 text-[10px] py-10 uppercase">অর্ডার লোড হচ্ছে...</p>
        </div>

        <h3 class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest px-2 text-center">পেমেন্ট হিস্ট্রি</h3>
        <div id="historyContainer" class="bg-white rounded-3xl p-4 shadow-sm space-y-3">
            <p class="text-center text-gray-300 text-[10px]">কোন হিস্ট্রি নেই</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, query, where, orderBy, getDoc, increment, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentPartnerPhone = "";
        let unsubs = [];

        // ১. অটো-লগইন চেক
        window.onload = () => {
            const savedPartner = localStorage.getItem('partnerPhone');
            if (savedPartner) {
                showDashboard(savedPartner);
            } else {
                document.getElementById('loginOverlay').classList.remove('hidden');
            }
        };

        // ২. পিন দিয়ে লগইন
        window.handlePinLogin = async () => {
            const phone = document.getElementById('loginPhone').value.trim();
            const pin = document.getElementById('masterPin').value.trim();

            if (phone.length < 11) return alert("সঠিক ফোন নম্বর দিন");

            try {
                const partnerDoc = await getDoc(doc(db, "partners", phone));
                if (partnerDoc.exists()) {
                    const data = partnerDoc.data();
                    
                    // ব্লক চেক
                    if (data.status === 'blocked') {
                        return alert("আপনার একাউন্টটি সাময়িকভাবে স্থগিত করা হয়েছে।");
                    }

                    // পিন চেক
                    if (data.pin && data.pin.toString() === pin) {
                        localStorage.setItem('partnerPhone', phone);
                        showDashboard(phone);
                    } else {
                        alert("ভুল সিক্রেট পিন!");
                    }
                } else {
                    alert("নম্বরটি নিবন্ধিত নয়।");
                }
            } catch (e) { alert("Error: " + e.message); }
        };

        // ৩. ড্যাশবোর্ড ডেটা লোড
        function showDashboard(phone) {
            currentPartnerPhone = phone;
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            loadDashboardData(phone);
        }

        function loadDashboardData(phone) {
            // প্রোফাইল লিসেনার
            const u1 = onSnapshot(doc(db, "partners", phone), (snap) => {
                if(snap.exists()){
                    const data = snap.data();
                    document.getElementById('pEarning').innerText = `৳ ${(data.wallet?.totalEarning || 0).toFixed(2)}`;
                    document.getElementById('pDue').innerText = `৳ ${(data.wallet?.adminDue || 0).toFixed(2)}`;
                    const st = document.getElementById('locationStatus');
                    st.innerText = data.locationSet ? "লোকেশন সেট করা আছে ✅" : "লোকেশন সেট করা নেই ⚠️";
                    st.className = data.locationSet ? "mt-2 text-[10px] bg-green-700 p-2 rounded-lg font-bold inline-block text-white" : "mt-2 text-[10px] bg-red-600 p-2 rounded-lg font-bold inline-block text-white";
                }
            });

            // পেন্ডিং অর্ডার লিসেনার
            const qOrders = query(collection(db, "orders"), where("partnerId", "==", phone), where("status", "==", "pending"), orderBy("createdAt", "desc"));
            const u2 = onSnapshot(qOrders, (snap) => {
                const container = document.getElementById('orderContainer');
                container.innerHTML = snap.empty ? `<p class="text-center text-gray-400 text-[10px] py-10">কোন অর্ডার নেই</p>` : "";
                snap.forEach(d => {
                    const order = d.data();
                    const date = order.createdAt ? order.createdAt.toDate().toLocaleString('bn-BD') : "এখনই";
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-[2.5rem] shadow-md border-l-8 border-blue-900";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-1">
                            <div><span class="text-[8px] bg-blue-50 text-blue-900 px-2 py-1 rounded-full font-black uppercase inline-block">${order.serviceType}</span>
                            <h3 class="font-black text-sm text-gray-800">${order.customerName}</h3></div>
                            <span class="text-[7px] font-bold text-gray-300 uppercase">${date}</span>
                        </div>
                        <p class="text-[10px] text-gray-400 mb-4 italic">${order.customerAddress}</p>
                        <div class="grid grid-cols-2 gap-3">
                            <a href="tel:${order.customerPhone || ''}" class="flex items-center justify-center bg-blue-100 text-blue-900 py-3 rounded-2xl text-[10px] font-black uppercase active:scale-95">📞 কল দিন</a>
                            <button onclick="completeOrder('${d.id}', '${order.serviceType}')" class="bg-green-600 text-white py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg active:scale-95">অর্ডার কমপ্লিট</button>
                        </div>`;
                    container.appendChild(card);
                });
            });

            // হিস্ট্রি লিসেনার
            const qHistory = query(collection(db, "orders"), where("partnerId", "==", phone), where("status", "==", "completed"), orderBy("createdAt", "desc"), limit(5));
            const u3 = onSnapshot(qHistory, (snap) => {
                const hContainer = document.getElementById('historyContainer');
                hContainer.innerHTML = snap.empty ? `<p class="text-center text-gray-300 text-[10px]">কোন রেকর্ড নেই</p>` : "";
                snap.forEach(d => {
                    const data = d.data();
                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center border-b border-slate-50 pb-2 last:border-0";
                    div.innerHTML = `<div><p class="text-[10px] font-bold text-gray-700">${data.customerName}</p><p class="text-[8px] text-gray-400">${data.serviceType}</p></div>
                        <div class="text-right"><p class="text-[10px] font-black text-green-600">+৳${(data.billAmount - data.adminCommission).toFixed(0)}</p><p class="text-[7px] text-gray-300 uppercase">Paid</p></div>`;
                    hContainer.appendChild(div);
                });
            });
            unsubs.push(u1, u2, u3);
        }

        // ৪. পিন আপডেট
        window.updateMyPin = async () => {
            const newPin = prompt("নতুন ৪ বা ৬ ডিজিটের পিন দিন:");
            if (newPin && newPin.length >= 4) {
                try {
                    await updateDoc(doc(db, "partners", currentPartnerPhone), { pin: newPin });
                    alert("পিন সফলভাবে পরিবর্তন হয়েছে!");
                } catch (e) { alert("Error: " + e.message); }
            } else if(newPin) { alert("পিন কমপক্ষে ৪ ডিজিটের হতে হবে।"); }
        };

        // ৫. লোকেশন ও অর্ডার কমপ্লিট
        window.updatePartnerLocation = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    await updateDoc(doc(db, "partners", currentPartnerPhone), { lat: pos.coords.latitude, lng: pos.coords.longitude, locationSet: true });
                    alert("লোকেশন আপডেট হয়েছে!");
                });
            }
        };

        window.completeOrder = async (orderId, serviceType) => {
    const bill = prompt("মোট বিল কত?");
    if (!bill || isNaN(bill)) return;
    const totalBill = parseFloat(bill);

    try {
        const pSnap = await getDoc(doc(db, "partners", currentPartnerPhone));
        const pData = pSnap.data();
        const commRate = pData.services?.[serviceType]?.commission || 10;
        const adminDue = (totalBill * commRate) / 100;
        const pEarn = totalBill - adminDue;

        // আপডেট করার সময় serverTimestamp() ব্যবহার করুন
        await updateDoc(doc(db, "orders", orderId), { 
            status: 'completed', 
            billAmount: totalBill, 
            adminCommission: adminDue, 
            completedAt: serverTimestamp() // <--- এখানে পরিবর্তন করুন
        });

        await updateDoc(doc(db, "partners", currentPartnerPhone), { 
            "wallet.adminDue": increment(adminDue), 
            "wallet.totalEarning": increment(pEarn) 
        });

        alert("অর্ডার কমপ্লিট হয়েছে!");
    } catch (e) { 
        alert("Error: " + e.message); 
    }
};

        window.handleLogout = () => {
            if (confirm("লগআউট করতে চান?")) {
                unsubs.forEach(fn => fn());
                localStorage.removeItem('partnerPhone');
                location.reload();
            }
        };
    </script>
</body>
</html>
