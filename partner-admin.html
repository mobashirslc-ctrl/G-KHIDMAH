<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | পার্টনার প্যানেল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Hind Siliguri', sans-serif; } 
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-100 pb-20">

    <div id="authSection" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-[2.5rem] shadow-2xl border">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-blue-900 italic uppercase">G-KHIDMAH</h1>
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Partner Portal</p>
        </div>
        <div id="loginBox">
            <input type="tel" id="loginPhone" placeholder="রেজিস্টার্ড মোবাইল নম্বর" class="w-full p-4 mb-3 rounded-2xl bg-slate-50 border outline-none font-bold">
            <button id="loginBtn" onclick="loginPartner()" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-bold shadow-lg">লগইন করুন</button>
        </div>
    </div>

    <div id="dashboardSection" class="hidden max-w-2xl mx-auto p-4">
        <header class="bg-blue-900 text-white p-6 rounded-3xl shadow-xl mb-6">
            <div class="flex justify-between items-center mb-4">
                <h1 id="pNameDisplay" class="text-xl font-black italic italic">Loading...</h1>
                <button onclick="location.reload()" class="text-[10px] bg-red-500 px-3 py-1 rounded-full font-bold">লগআউট</button>
            </div>
            
            <div class="grid grid-cols-2 gap-4 bg-white/10 p-4 rounded-2xl backdrop-blur-md text-center">
                <div>
                    <p class="text-[10px] uppercase font-bold opacity-70">আমার আয়</p>
                    <h2 id="walletBalance" class="text-xl font-black text-green-400">৳০.০০</h2>
                </div>
                <div class="border-l border-white/20 pl-4">
                    <p class="text-[10px] uppercase font-bold opacity-70 text-red-300">অ্যাডমিন বকেয়া</p>
                    <h2 id="adminDue" class="text-xl font-black text-red-400">৳০.০০</h2>
                </div>
            </div>
        </header>

        <div id="orderContainer" class="space-y-6">
            <p class="text-center text-gray-400 font-bold py-10">অর্ডার লোড হচ্ছে...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, orderBy, query, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentPartner = null;

        window.loginPartner = async () => {
            const phone = document.getElementById('loginPhone').value.trim();
            if(!phone) return alert("নম্বর দিন!");
            
            const btn = document.getElementById('loginBtn');
            btn.innerText = "যাচাই করা হচ্ছে...";
            btn.disabled = true;

            try {
                const docRef = doc(db, "partners", phone);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if(!data.isActive) {
                        alert("অ্যাকাউন্ট ব্লকড!");
                        location.reload();
                        return;
                    }
                    
                    currentPartner = { id: docSnap.id, ...data };
                    document.getElementById('authSection').classList.add('hidden');
                    document.getElementById('dashboardSection').classList.remove('hidden');
                    document.getElementById('pNameDisplay').innerText = data.name;
                    
                    initDashboard();
                } else {
                    alert("পার্টনার পাওয়া যায়নি! মাস্টার অ্যাডমিন থেকে অ্যাড করুন।");
                    btn.innerText = "লগইন করুন";
                    btn.disabled = false;
                }
            } catch (e) {
                console.error(e);
                alert("এরর: " + e.message);
            }
        };

        function initDashboard() {
            // রিয়েলটাইম ওয়ালেট আপডেট
            onSnapshot(doc(db, "partners", currentPartner.id), (snap) => {
                if(snap.exists()){
                    const data = snap.data();
                    document.getElementById('walletBalance').innerText = `৳${(data.wallet?.totalEarning || 0).toFixed(2)}`;
                    document.getElementById('adminDue').innerText = `৳${(data.wallet?.adminDue || 0).toFixed(2)}`;
                    currentPartner.wallet = data.wallet; // আপডেট ওয়ালেট ডাটা
                }
            });

            // অর্ডার লোড (ইনডেক্স এরর এড়াতে সিম্পল কুয়েরি ও ক্লায়েন্ট সাইড ফিল্টার)
            const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                const orders = snap.docs
                    .map(d => ({id: d.id, ...d.data()}))
                    .filter(o => o.serviceType === currentPartner.serviceType); // ক্লায়েন্ট সাইড ফিল্টার
                
                renderOrders(orders);
            });
        }

        function renderOrders(orders) {
            const container = document.getElementById('orderContainer');
            if(orders.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-10 font-bold">কোনো অর্ডার নেই</p>`;
                return;
            }

            container.innerHTML = "";
            orders.forEach(order => {
                const card = document.createElement('div');
                card.className = `bg-white p-6 rounded-[2.5rem] shadow-xl border-l-8 border-blue-900 mb-6`;
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <span class="bg-blue-100 text-blue-900 px-3 py-1 rounded-full text-[9px] font-black uppercase">${order.status || 'Pending'}</span>
                        <span class="text-[9px] font-bold text-gray-300">#${order.id.slice(-5)}</span>
                    </div>
                    <h3 class="text-sm font-black text-gray-800">${order.customerName}</h3>
                    <p class="text-[10px] text-gray-400 mt-1">${order.customerAddress}</p>

                    <div class="bg-slate-50 p-4 rounded-3xl my-4 border border-slate-100">
                        <p class="text-[10px] font-bold text-blue-900">আইটেম: ${Array.isArray(order.items) ? order.items.join(', ') : 'N/A'}</p>
                        <div class="flex gap-2 mt-2">
                             <input type="number" id="bill-${order.id}" value="${order.subTotal || ''}" placeholder="বিল (৳)" class="w-full p-2 rounded-xl border text-xs font-bold outline-none">
                             <button onclick="saveBill('${order.id}')" class="bg-blue-900 text-white px-4 rounded-xl text-[10px] font-bold">সেভ</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="updateStatus('${order.id}', 'confirmed')" class="py-2.5 rounded-xl text-[8px] font-black uppercase bg-gray-100 text-gray-500">Confirm</button>
                        <button onclick="completeOrder('${order.id}', ${order.subTotal || 0})" class="py-2.5 rounded-xl text-[8px] font-black uppercase bg-green-600 text-white">Complete & Earn</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.completeOrder = async (orderId, subTotal) => {
            if(!subTotal || subTotal <= 0) return alert("আগে বিল সেট করে সেভ করুন!");
            
            const commissionPercent = currentPartner.commission || 10;
            const adminDueAmount = (subTotal * commissionPercent) / 100;
            const partnerEarnAmount = subTotal - adminDueAmount;

            try {
                await updateDoc(doc(db, "orders", orderId), { status: "completed" });
                
                const pRef = doc(db, "partners", currentPartner.id);
                await updateDoc(pRef, {
                    "wallet.totalEarning": (currentPartner.wallet?.totalEarning || 0) + partnerEarnAmount,
                    "wallet.adminDue": (currentPartner.wallet?.adminDue || 0) + adminDueAmount
                });

                alert(`অর্ডার সম্পন্ন! আপনি পেয়েছেন ৳${partnerEarnAmount.toFixed(2)}`);
            } catch (e) {
                alert("এরর: " + e.message);
            }
        };

        window.saveBill = async (id) => {
            const val = parseFloat(document.getElementById(`bill-${id}`).value) || 0;
            if(val <= 0) return alert("সঠিক বিল লিখুন");
            await updateDoc(doc(db, "orders", id), { subTotal: val });
            alert("বিল সেভ হয়েছে!");
        };

        window.updateStatus = async (id, s) => { 
            await updateDoc(doc(db, "orders", id), { status: s }); 
            alert("স্ট্যাটাস আপডেট হয়েছে");
        };
    </script>
</body>
</html>
