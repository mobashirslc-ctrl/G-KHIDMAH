<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | পার্টনার প্যানেল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Hind Siliguri', sans-serif; } 
        .tab-active { background-color: #1e3a8a; color: white; transform: scale(1.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-100 pb-20">

    <div id="authSection" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-[2.5rem] shadow-2xl border">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-blue-900 italic uppercase">G-KHIDMAH</h1>
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Partner Portal</p>
        </div>
        <div id="loginBox">
            <input type="tel" id="loginPhone" placeholder="রেজিস্টার্ড মোবাইল নম্বর" class="w-full p-4 mb-3 rounded-2xl bg-slate-50 border outline-none font-bold">
            <button onclick="loginPartner()" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-bold shadow-lg">লগইন করুন</button>
            <p class="text-center mt-4 text-xs font-bold text-gray-500">পার্টনার হতে চান? <span class="text-blue-600">অ্যাডমিনের সাথে যোগাযোগ করুন</span></p>
        </div>
    </div>

    <div id="dashboardSection" class="hidden max-w-2xl mx-auto p-4">
        <header class="bg-blue-900 text-white p-6 rounded-3xl shadow-xl mb-6">
            <div class="flex justify-between items-center mb-4">
                <h1 id="pNameDisplay" class="text-xl font-black italic">Loading...</h1>
                <button onclick="location.reload()" class="text-[10px] bg-red-500 px-3 py-1 rounded-full font-bold">লগআউট</button>
            </div>
            
            <div class="grid grid-cols-2 gap-4 bg-white/10 p-4 rounded-2xl backdrop-blur-md">
                <div>
                    <p class="text-[10px] uppercase font-bold opacity-70">আমার আয়</p>
                    <h2 id="walletBalance" class="text-2xl font-black text-green-400">৳০.০০</h2>
                </div>
                <div class="text-right border-l border-white/20 pl-4">
                    <p class="text-[10px] uppercase font-bold opacity-70 text-red-300">অ্যাডমিন বকেয়া (Due)</p>
                    <h2 id="adminDue" class="text-2xl font-black text-red-400">৳০.০০</h2>
                </div>
            </div>
        </header>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-lg mb-8 border-2 border-dashed border-blue-200">
            <h3 class="text-sm font-black text-blue-900 uppercase italic mb-4">👷 টিম মেম্বার ম্যানেজমেন্ট</h3>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <input type="text" id="mName" placeholder="নাম" class="p-3 rounded-xl bg-slate-50 border text-xs font-bold">
                <input type="tel" id="mPhone" placeholder="মোবাইল নম্বর" class="p-3 rounded-xl bg-slate-50 border text-xs font-bold">
            </div>
            <button onclick="addMember()" class="w-full bg-blue-900 text-white py-3 rounded-xl text-xs font-bold uppercase shadow-lg">নতুন মেম্বার যুক্ত করুন</button>
        </div>

        <div id="orderContainer" class="space-y-6"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, orderBy, query, setDoc, getDocs, getDoc, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentPartner = null;
        let members = [];

        // ১. পার্টনার লগইন
        window.loginPartner = async () => {
            const phone = document.getElementById('loginPhone').value;
            const docRef = doc(db, "partners", phone);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                if(!data.isActive) return alert("আপনার অ্যাকাউন্ট ব্লকড! পেমেন্ট ক্লিয়ার করুন।");
                
                currentPartner = { id: docSnap.id, ...data };
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                document.getElementById('pNameDisplay').innerText = data.name;
                
                initDashboard();
            } else { alert("ভুল নম্বর!"); }
        };

        function initDashboard() {
            // রিয়েলটাইম ওয়ালেট আপডেট
            onSnapshot(doc(db, "partners", currentPartner.id), (snap) => {
                const data = snap.data();
                document.getElementById('walletBalance').innerText = `৳${data.wallet.totalEarning.toFixed(2)}`;
                document.getElementById('adminDue').innerText = `৳${data.wallet.adminDue.toFixed(2)}`;
                if(!data.isActive) location.reload(); // ব্লক হলে অটো লগআউট
            });

            // টিম লোড
            onSnapshot(collection(db, "team"), (snap) => {
                members = snap.docs.map(d => ({id: d.id, ...d.data()}));
                loadOrders();
            });
        }

        // ২. শুধুমাত্র পার্টনারের ক্যাটাগরির অর্ডার লোড
        function loadOrders() {
            const q = query(collection(db, "orders"), 
                where("serviceType", "==", currentPartner.serviceType), 
                orderBy("createdAt", "desc"));

            onSnapshot(q, (snap) => {
                const orders = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderOrders(orders);
            });
        }

        function renderOrders(orders) {
            const container = document.getElementById('orderContainer');
            container.innerHTML = "";

            orders.forEach(order => {
                const card = document.createElement('div');
                card.className = `bg-white p-6 rounded-[2.5rem] shadow-xl border-l-8 border-blue-900 mb-6`;
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <span class="bg-blue-100 text-blue-900 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">${order.status}</span>
                        <span class="text-[9px] font-bold text-gray-300">#${order.id.slice(-5)}</span>
                    </div>
                    <h3 class="text-sm font-black text-gray-800">${order.customerName}</h3>
                    <p class="text-[10px] text-gray-400 mt-1">${order.customerAddress}</p>

                    <div class="bg-slate-50 p-4 rounded-3xl my-4 border border-slate-100">
                        <p class="text-[10px] font-bold text-blue-900">আইটেম: ${order.items.join(', ')}</p>
                        <div class="flex gap-2 mt-2">
                             <input type="number" id="bill-${order.id}" value="${order.subTotal || ''}" placeholder="বিল (৳)" class="w-full p-2 rounded-xl border text-xs font-bold outline-none">
                             <button onclick="saveBill('${order.id}')" class="bg-blue-900 text-white px-4 rounded-xl text-[10px] font-bold">সেভ</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="updateStatus('${order.id}', 'confirmed')" class="py-2.5 rounded-xl text-[8px] font-black uppercase bg-gray-100 text-gray-500">Confirmed</button>
                        <button onclick="completeOrder('${order.id}', ${order.subTotal || 0})" class="py-2.5 rounded-xl text-[8px] font-black uppercase bg-green-600 text-white">Complete & Earn</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ৩. ওয়ালেট ও ইনকাম লজিক
        window.completeOrder = async (orderId, subTotal) => {
            if(!subTotal || subTotal <= 0) return alert("আগে বিল সেট করুন!");
            
            const commission = currentPartner.commission || 10;
            const adminDue = (subTotal * commission) / 100;
            const myEarn = subTotal - adminDue;

            // অর্ডার সম্পন্ন
            await updateDoc(doc(db, "orders", orderId), { status: "completed" });

            // পার্টনার ওয়ালেট আপডেট
            const pRef = doc(db, "partners", currentPartner.id);
            await updateDoc(pRef, {
                "wallet.totalEarning": currentPartner.wallet.totalEarning + myEarn,
                "wallet.adminDue": currentPartner.wallet.adminDue + adminDue
            });

            alert(`অর্ডার শেষ! আপনার ওয়ালেটে ৳${myEarn} যোগ হয়েছে।`);
        };

        window.saveBill = async (id) => {
            const val = parseFloat(document.getElementById(`bill-${id}`).value) || 0;
            await updateDoc(doc(db, "orders", id), { subTotal: val });
            alert("বিল আপডেট হয়েছে!");
        };

        window.updateStatus = async (id, s) => { await updateDoc(doc(db, "orders", id), { status: s }); };
    </script>
</body>
</html>
