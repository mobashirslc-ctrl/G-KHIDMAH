<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G KHIDMAH | Partner Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-slate-100 min-h-screen pb-10">

    <header class="bg-blue-800 text-white p-5 sticky top-0 z-50 shadow-lg flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black italic">G KHIDMAH PARTNER</h1>
            <p id="partnerNameDisplay" class="text-[10px] font-bold text-blue-200 uppercase tracking-widest">Loading Point...</p>
        </div>
        <div class="bg-white/20 px-3 py-1 rounded-full text-xs" id="orderCount">Orders: 0</div>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-4">
        
        <div id="loginSection" class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center mt-10">
            <h2 class="text-lg font-bold mb-4">পার্টনার লগইন</h2>
            <input type="text" id="partnerInputId" placeholder="আপনার পার্টনার আইডি দিন" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-blue-200 outline-none font-bold text-center mb-4">
            <button onclick="loginPartner()" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg">ড্যাশবোর্ড প্রবেশ করুন</button>
            <p class="text-[10px] text-gray-400 mt-4 uppercase">ID না থাকলে এডমিনের সাথে যোগাযোগ করুন</p>
        </div>

        <div id="orderListSection" class="hidden space-y-4">
            <h3 class="font-black text-gray-500 text-xs uppercase ml-2 italic">আপনার এলাকার নতুন অর্ডারসমূহ:</h3>
            <div id="partnerOrders" class="space-y-4">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.loginPartner = () => {
            const id = document.getElementById('partnerInputId').value.trim();
            if(!id) return alert("আইডি দিন");
            localStorage.setItem('loggedInPartnerId', id);
            location.reload();
        };

        const pId = localStorage.getItem('loggedInPartnerId');
        if(pId) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('orderListSection').classList.remove('hidden');
            document.getElementById('partnerNameDisplay').innerText = `Point: ${pId.toUpperCase()}`;
            loadPartnerOrders(pId);
        }

        function loadPartnerOrders(partnerId) {
            const q = query(
                collection(db, "orders"), 
                where("partnerId", "==", partnerId),
                orderBy("createdAt", "desc")
            );

            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('partnerOrders');
                list.innerHTML = "";
                document.getElementById('orderCount').innerText = `Orders: ${snapshot.size}`;

                snapshot.forEach(docSnap => {
                    const order = docSnap.data();
                    const id = docSnap.id;
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-[2rem] shadow-sm border-l-4 border-blue-600";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <p class="text-[9px] font-black text-blue-500 uppercase">${order.orderType}</p>
                                <h4 class="font-bold text-gray-800">${order.customerName}</h4>
                                <p class="text-xs font-bold text-gray-400">${order.customerPhone}</p>
                            </div>
                            <span class="text-[10px] bg-orange-50 text-orange-600 px-2 py-1 rounded font-bold uppercase">${order.status}</span>
                        </div>
                        <div class="text-[11px] text-gray-500 mt-2 border-t pt-2">
                            <p>📍 ${order.pickupLocation || order.customerAddress}</p>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-4">
                            <button onclick="updateStatus('${id}', 'on_way')" class="bg-blue-50 text-blue-700 py-2 rounded-xl text-[10px] font-black uppercase">On Way</button>
                            <button onclick="updateStatus('${id}', 'completed')" class="bg-green-600 text-white py-2 rounded-xl text-[10px] font-black uppercase">Complete</button>
                        </div>
                    `;
                    list.appendChild(card);
                });
            });
        }

        window.updateStatus = async (orderId, newStatus) => {
            await updateDoc(doc(db, "orders", orderId), { status: newStatus });
            alert("Status Updated!");
        };
    </script>
</body>
</html>
