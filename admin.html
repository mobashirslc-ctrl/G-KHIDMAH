<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | কন্ট্রোল প্যানেল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Hind Siliguri', sans-serif; } </style>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-2xl mx-auto">
        <header class="bg-blue-800 text-white p-5 rounded-2xl shadow-lg mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">G-KHIDMAH অ্যাডমিন</h1>
                <p class="text-xs opacity-70">খিদমত পরিচালনা করুন</p>
            </div>
            <div id="orderCount" class="bg-blue-600 px-3 py-1 rounded-full text-sm font-bold">০টি অর্ডার</div>
        </header>

        <div id="adminOrders" class="space-y-6">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // রিয়েল-টাইম অর্ডার লিসেনার
        const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('adminOrders');
            document.getElementById('orderCount').innerText = `${snapshot.size}টি অর্ডার`;
            container.innerHTML = "";

            snapshot.forEach((orderDoc) => {
                const order = orderDoc.data();
                const id = orderDoc.id;

                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-3xl shadow-md border-l-8 " + 
                                 (order.status === 'pending' ? 'border-yellow-400' : 'border-green-500');
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-bold text-gray-800 italic">অর্ডার আইডি: ...${id.slice(-5)}</h3>
                            <p class="text-xs text-gray-400 font-medium">${order.createdAt?.toDate().toLocaleString() || 'এখনই'}</p>
                        </div>
                        <span class="bg-blue-50 px-3 py-1 rounded-full text-blue-600 text-[10px] font-bold uppercase tracking-wider">${order.status}</span>
                    </div>

                    <div class="bg-slate-50 p-4 rounded-xl mb-4 text-sm text-gray-700">
                        ${order.items.join('<br>')}
                    </div>

                    <div class="grid grid-cols-2 gap-2 mt-4">
                        <button onclick="updateStatus('${id}', 'invoice_ready')" class="bg-blue-100 text-blue-700 py-2 rounded-lg text-xs font-bold hover:bg-blue-200">১. ইনভয়েস রেডি</button>
                        <button onclick="updateStatus('${id}', 'shopping')" class="bg-purple-100 text-purple-700 py-2 rounded-lg text-xs font-bold hover:bg-purple-200">২. বাজারে আছি</button>
                        <button onclick="updateStatus('${id}', 'delivery')" class="bg-orange-100 text-orange-700 py-2 rounded-lg text-xs font-bold hover:bg-orange-200">৩. পথে আসছি</button>
                        <button onclick="updateStatus('${id}', 'at_location')" class="bg-teal-100 text-teal-700 py-2 rounded-lg text-xs font-bold hover:bg-teal-200">৪. বাসার নিচে</button>
                    </div>

                    <button onclick="updateStatus('${id}', 'completed')" class="w-full mt-4 bg-green-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-green-100">খিদমত সম্পন্ন</button>
                `;
                container.appendChild(card);
            });
        });

        // স্ট্যাটাস আপডেট করার ফাংশন
        window.updateStatus = async (id, newStatus) => {
            try {
                const orderRef = doc(db, "orders", id);
                await updateDoc(orderRef, { status: newStatus });
                console.log("Status Updated:", newStatus);
            } catch (e) {
                alert("ভুল হয়েছে: " + e.message);
            }
        };
    </script>
</body>
</html>
