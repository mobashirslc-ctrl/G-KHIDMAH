<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | মাস্টার অ্যাডমিন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Hind Siliguri', sans-serif; } </style>
</head>
<body class="bg-slate-100 p-4 pb-10">
    <div class="max-w-2xl mx-auto">
        <header class="bg-blue-900 text-white p-6 rounded-3xl shadow-xl mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic uppercase">G-KHIDMAH</h1>
                <p class="text-[10px] uppercase tracking-widest opacity-70 font-bold">মাস্টার অ্যাডমিন কন্ট্রোল</p>
            </div>
            <div id="activeCount" class="bg-blue-700 px-4 py-2 rounded-2xl text-xs font-bold italic text-white tracking-tighter">অর্ডার চেক করা হচ্ছে...</div>
        </header>

        <div class="space-y-4 mb-8">
            <input type="text" id="adminSearch" placeholder="নাম বা মোবাইল নম্বর দিয়ে খুঁজুন..." class="w-full p-4 rounded-2xl border-0 shadow-lg outline-none focus:ring-2 focus:ring-blue-400 font-bold text-sm">
            <div class="flex gap-2 overflow-x-auto pb-2 hide-scroll text-[10px] font-bold uppercase italic">
                <button onclick="filterType('all')" class="bg-blue-900 text-white px-4 py-2 rounded-full whitespace-nowrap">সব অর্ডার</button>
                <button onclick="filterType('shopping')" class="bg-white text-gray-600 px-4 py-2 rounded-full shadow-sm border whitespace-nowrap">🛒 বাজার</button>
                <button onclick="filterType('parcel')" class="bg-white text-gray-600 px-4 py-2 rounded-full shadow-sm border whitespace-nowrap">📦 পার্সেল</button>
                <button onclick="filterType('car_rent')" class="bg-white text-gray-600 px-4 py-2 rounded-full shadow-sm border whitespace-nowrap">🚗 গাড়ি</button>
                <button onclick="filterType('blood')" class="bg-red-50 text-red-600 px-4 py-2 rounded-full shadow-sm border whitespace-nowrap">🩸 ব্লাড</button>
            </div>
        </div>

        <div id="adminOrders" class="space-y-8"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allOrders = [];
        let currentFilter = 'all';

        onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), (snapshot) => {
            allOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderOrders(allOrders);
        });

        window.filterType = (type) => {
            currentFilter = type;
            renderOrders(allOrders);
        };

        function renderOrders(orders) {
            const container = document.getElementById('adminOrders');
            const filtered = currentFilter === 'all' ? orders : orders.filter(o => o.orderType === currentFilter);
            document.getElementById('activeCount').innerText = `${filtered.length}টি অর্ডার`;
            container.innerHTML = "";

            filtered.forEach((order) => {
                const id = order.id;
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-[2.5rem] shadow-xl border-l-[10px] mb-8 " + getBorderColor(order.orderType);

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4 text-[9px] font-black uppercase italic text-gray-400">
                        <span>SERVICE: ${order.orderType}</span>
                        <span class="bg-green-500 text-white px-3 py-1 rounded-full">${order.status}</span>
                    </div>

                    <div class="mb-6 p-4 bg-slate-50 rounded-3xl border border-gray-100">
                        <h3 class="text-sm font-black text-gray-800">👤 ${order.customerName}</h3>
                        <p class="text-[11px] font-bold text-blue-600">${order.customerPhone}</p>
                        <p class="text-[10px] text-gray-400 italic">📍 ${order.customerAddress || order.pickupLocation}</p>
                    </div>

                    <div class="space-y-3 mb-6">${getContentBody(order)}</div>

                    <div class="bg-gray-50 p-4 rounded-3xl mb-6 border border-dashed border-gray-200">
                        ${getInvoiceInputs(order)}
                        <button onclick="saveInvoice('${id}', '${order.orderType}')" class="w-full bg-blue-700 text-white py-3 rounded-2xl font-bold text-xs mt-3 shadow-lg">সেভ ইনভয়েস</button>
                    </div>

                    <div class="grid grid-cols-2 gap-2 uppercase tracking-tighter italic">
                        ${getStatusButtons(order)}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function getBorderColor(type) {
            const colors = { shopping: 'border-green-600', parcel: 'border-orange-500', car_rent: 'border-blue-600', blood: 'border-red-600' };
            return colors[type] || 'border-purple-600';
        }

        function getContentBody(order) {
            if(order.orderType === 'shopping') {
                return order.items.map(item => `
                    <div class="flex gap-2 items-center bg-white p-2 rounded-xl shadow-sm border">
                        <span class="text-[10px] flex-1 font-bold italic">📦 ${item}</span>
                        <input type="number" class="item-price w-16 p-1 bg-blue-50 rounded text-xs text-center font-bold" placeholder="৳" data-item="${item}" value="${order.itemPrices?.[item] || ''}">
                    </div>
                `).join('');
            }
            if(order.orderType === 'car_rent') return `<p class="text-xs font-bold text-blue-600 bg-blue-50 p-3 rounded-xl italic">🚗 গাড়ি: ${order.carType}<br>রুট: ${order.pickupLocation} > ${order.dropLocation}</p>`;
            if(order.orderType === 'parcel') return `<p class="text-xs font-bold text-orange-600 bg-orange-50 p-3 rounded-xl italic">📦 পার্সেল: ${order.parcelType}<br>বিবরণ: ${order.items[0]}<br>🔒 OTP: ${order.otp}</p>`;
            return `<p class="text-xs font-bold text-gray-600 bg-gray-50 p-3 rounded-xl italic">তথ্য: ${order.items ? order.items[0] : 'নেই'}</p>`;
        }

        function getInvoiceInputs(order) {
            const id = order.id;
            if(order.orderType === 'shopping') {
                return `<div class="grid grid-cols-3 gap-2 text-center">
                    <div><label class="text-[8px] font-bold block uppercase italic text-gray-400">ডেলিভারি</label><input type="number" id="del-${id}" class="w-full text-xs font-black text-center bg-transparent" value="${order.deliveryCharge || 70}"></div>
                    <div><label class="text-[8px] font-bold block uppercase italic text-gray-400">প্ল্যাটফর্ম</label><input type="number" id="plat-${id}" class="w-full text-xs font-black text-center bg-transparent" value="${order.platformFee || 20}"></div>
                    <div><label class="text-[8px] font-bold block uppercase italic text-gray-400">আইটেম</label><input type="number" id="sub-${id}" class="w-full text-xs font-black text-center bg-transparent text-blue-700" value="${order.subTotal || 0}"></div>
                </div>`;
            }
            if(order.orderType === 'car_rent') {
                return `<input type="text" id="driver-${id}" class="w-full p-2 rounded-xl text-[10px] bg-white border mb-2" placeholder="ড্রাইভারের নাম ও নাম্বার" value="${order.riderName || ''}">
                <div class="grid grid-cols-2 gap-2 text-center">
                    <div><label class="text-[8px] font-bold block">গাড়ি ভাড়া</label><input type="number" id="sub-${id}" class="w-full text-xs font-black text-center" value="${order.subTotal || ''}"></div>
                    <div><label class="text-[8px] font-bold block">সার্ভিস চার্জ</label><input type="number" id="del-${id}" class="w-full text-xs font-black text-center" value="${order.deliveryCharge || 100}"></div>
                </div>`;
            }
            if(order.orderType === 'parcel') {
                return `<input type="text" id="rider-${id}" class="w-full p-2 rounded-xl text-[10px] bg-white border mb-2" placeholder="রাইডারের নাম ও ফোন" value="${order.riderName || ''}">
                <div class="grid grid-cols-2 gap-2 text-center">
                    <div><label class="text-[8px] font-bold block">ডেলিভারি চার্জ</label><input type="number" id="del-${id}" class="w-full text-xs font-black text-center" value="${order.deliveryCharge || 60}"></div>
                    <div><label class="text-[8px] font-bold block">অন্যান্য</label><input type="number" id="plat-${id}" class="w-full text-xs font-black text-center" value="${order.platformFee || 10}"></div>
                </div>`;
            }
            return `<input type="number" id="sub-${id}" class="w-full p-3 rounded-2xl text-xs font-black bg-white border" placeholder="মোট বিল/ভিজিট ফি" value="${order.subTotal || ''}">`;
        }

        function getStatusButtons(order) {
            const id = order.id;
            const b = (s, txt, cls) => `<button onclick="updateStatus('${id}', '${s}')" class="p-2 rounded-xl font-bold text-[9px] ${cls}">${txt}</button>`;
            
            if(order.orderType === 'shopping') {
                return `
                    ${b('verifying', '১. যাচাই', 'bg-slate-200')} ${b('invoice_ready', '২. ইনভয়েস', 'bg-blue-100')}
                    ${b('finding_assistant', '৩. সহকারী', 'bg-indigo-100')} ${b('assistant_assigned', '৪. সহকারী রেডি', 'bg-purple-100')}
                    ${b('at_store', '৫. দোকানে', 'bg-yellow-100')} ${b('shopping', '৬. কেনাকাটা', 'bg-amber-100')}
                    ${b('packing', '৭. প্যাকিং', 'bg-pink-100')} ${b('delivery_started', '৮. রওয়ানা', 'bg-orange-100')}
                    ${b('at_location', '৯. লোকেশন', 'bg-teal-100')} ${b('completed', '১০. সম্পন্ন', 'bg-green-600 text-white col-span-2 py-3 mt-2')}
                `;
            }
            if(order.orderType === 'parcel') {
                return `
                    ${b('rider_assigned', '১. রাইডার রেডি', 'bg-blue-100')} ${b('picked', '২. পার্সেল পিক', 'bg-orange-100')}
                    ${b('in_transit', '৩. পথে আছে', 'bg-amber-100')} <button onclick="verifyOtp('${id}', ${order.otp})" class="bg-green-600 text-white p-2 rounded-xl text-[9px] font-bold shadow-lg">৪. ডেলিভারি (OTP)</button>
                `;
            }
            if(order.orderType === 'car_rent') {
                return `${b('car_assigned', '১. গাড়ি রেডি', 'bg-blue-100')} ${b('on_way', '২. পথে আছে', 'bg-orange-100')} ${b('completed', '৩. ট্রিপ শেষ', 'bg-green-600 text-white col-span-2 py-3 mt-2')}`;
            }
            if(order.orderType === 'blood') {
                return `${b('finding_donor', '১. ডোনার খুঁজছি', 'bg-red-50 text-red-700')} ${b('completed', '২. রক্তদান সফল', 'bg-red-600 text-white')}`;
            }
            return b('completed', 'খিদমত সম্পন্ন', 'bg-green-600 text-white col-span-2 py-3');
        }

        window.saveInvoice = async (id, type) => {
            const updateData = { status: "invoice_ready" };
            if(type === 'shopping') {
                const prices = {}; let sub = 0;
                document.querySelectorAll(`[data-item]`).forEach(inp => {
                    const p = parseFloat(inp.value) || 0;
                    prices[inp.dataset.item] = p; sub += p;
                });
                updateData.itemPrices = prices; updateData.subTotal = sub;
                updateData.deliveryCharge = parseFloat(document.getElementById(`del-${id}`).value) || 0;
                updateData.platformFee = parseFloat(document.getElementById(`plat-${id}`).value) || 0;
            } else if(type === 'car_rent') {
                updateData.riderName = document.getElementById(`driver-${id}`).value;
                updateData.subTotal = parseFloat(document.getElementById(`sub-${id}`).value) || 0;
                updateData.deliveryCharge = parseFloat(document.getElementById(`del-${id}`).value) || 0;
            } else if(type === 'parcel') {
                updateData.riderName = document.getElementById(`rider-${id}`).value;
                updateData.deliveryCharge = parseFloat(document.getElementById(`del-${id}`).value) || 0;
                updateData.platformFee = parseFloat(document.getElementById(`plat-${id}`).value) || 0;
            } else {
                updateData.subTotal = parseFloat(document.getElementById(`sub-${id}`).value) || 0;
            }
            await updateDoc(doc(db, "orders", id), updateData);
            alert("ইনভয়েস সেভ হয়েছে!");
        };

        window.updateStatus = async (id, s) => { await updateDoc(doc(db, "orders", id), { status: s }); };

        window.verifyOtp = async (id, otp) => {
            const input = prompt("কাস্টমারের OTP কোডটি দিন:");
            if(input == otp) { await updateDoc(doc(db, "orders", id), { status: "completed" }); alert("সফল!"); }
            else alert("ভুল OTP!");
        };
    </script>
</body>
</html>
