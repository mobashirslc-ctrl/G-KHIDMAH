<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | মাস্টার অ্যাডমিন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Hind Siliguri', sans-serif; } .hide-scroll::-webkit-scrollbar { display: none; } </style>
</head>
<body class="bg-slate-100 p-4 pb-20">
    <div class="max-w-2xl mx-auto">
        <header class="bg-blue-900 text-white p-6 rounded-3xl shadow-xl mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic uppercase">G-KHIDMAH</h1>
                <p class="text-[10px] uppercase tracking-widest opacity-70 font-bold">মাস্টার অ্যাডমিন কন্ট্রোল</p>
            </div>
            <div id="activeCount" class="bg-blue-700 px-4 py-2 rounded-2xl text-xs font-bold italic text-white tracking-tighter">অর্ডার চেক করা হচ্ছে...</div>
        </header>

        <div class="bg-white p-6 rounded-[2rem] shadow-lg mb-8 border-2 border-dashed border-blue-200">
            <h3 class="text-sm font-black text-blue-900 uppercase italic mb-4">🎫 কুপন সেটআপ (অফার)</h3>
            <div class="flex gap-2">
                <input type="text" id="newCouponCode" placeholder="কোড (যেমন: SAVE50)" class="flex-1 p-3 rounded-xl bg-slate-50 border outline-none text-xs font-bold uppercase">
                <input type="number" id="newCouponAmt" placeholder="টাকা" class="w-20 p-3 rounded-xl bg-slate-50 border outline-none text-xs font-bold">
                <button onclick="createCoupon()" class="bg-blue-900 text-white px-6 rounded-xl text-xs font-bold">সেভ</button>
            </div>
        </div>

        <div id="adminOrders" class="space-y-8"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, orderBy, query, arrayRemove, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ১. কুপন তৈরি করার ফাংশন
        window.createCoupon = async () => {
            const code = document.getElementById('newCouponCode').value.trim().toUpperCase();
            const amt = parseFloat(document.getElementById('newCouponAmt').value);
            if(!code || !amt) return alert("কোড এবং টাকা উভয়ই দিন");
            
            await setDoc(doc(db, "coupons", code), { amount: amt });
            alert("কুপন কোড এখন লাইভ!");
            document.getElementById('newCouponCode').value = '';
            document.getElementById('newCouponAmt').value = '';
        };

        // ২. অর্ডার রেন্ডারিং
        onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), (snapshot) => {
            const container = document.getElementById('adminOrders');
            const orders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            document.getElementById('activeCount').innerText = `${orders.length}টি অর্ডার`;
            container.innerHTML = "";

            orders.forEach((order) => {
                const id = order.id;
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-[2.5rem] shadow-xl border-l-[10px] mb-8 border-green-600";

                const confirmTag = order.invoiceConfirmed ? 
                    `<span class="bg-green-600 text-white px-2 py-1 rounded text-[8px] animate-pulse">CONFIRMED ✅</span>` : 
                    `<span class="bg-gray-100 text-gray-400 px-2 py-1 rounded text-[8px]">PENDING ⏳</span>`;

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[9px] font-black text-gray-400 uppercase italic">ID: #${id.slice(-5)}</span>
                        ${order.orderType === 'shopping' ? confirmTag : ''}
                    </div>

                    <div class="mb-4 bg-slate-50 p-4 rounded-3xl border border-gray-100">
                        <h3 class="text-sm font-black text-gray-800">${order.customerName}</h3>
                        <p class="text-[10px] text-blue-600 font-bold">${order.customerPhone}</p>
                    </div>

                    <div class="space-y-2 mb-6" id="items-${id}">
                        ${order.items.map(item => `
                            <div class="flex gap-2 items-center bg-white p-2 rounded-xl shadow-sm border border-gray-100">
                                <button onclick="removeItem('${id}', '${item}')" class="text-red-500 bg-red-50 w-7 h-7 rounded-lg font-black text-lg">×</button>
                                <span class="text-[10px] flex-1 font-bold italic">${item}</span>
                                <input type="number" class="item-price w-20 p-1 bg-blue-50 rounded-lg text-xs text-center font-bold" placeholder="৳" data-id="${id}" data-item="${item}" value="${order.itemPrices?.[item] || ''}">
                            </div>
                        `).join('')}
                    </div>

                    <div class="bg-gray-50 p-4 rounded-3xl mb-6 grid grid-cols-3 gap-2 text-center">
                        <div><label class="text-[8px] font-bold block opacity-50">ডেলিভারি</label><input type="number" id="del-${id}" class="w-full text-xs font-black text-center bg-transparent" value="${order.deliveryCharge || 70}"></div>
                        <div><label class="text-[8px] font-bold block opacity-50">প্ল্যাটফর্ম</label><input type="number" id="plat-${id}" class="w-full text-xs font-black text-center bg-transparent" value="${order.platformFee || 20}"></div>
                        <button onclick="saveInvoice('${id}')" class="bg-blue-900 text-white text-[9px] font-bold rounded-xl py-2">সেভ বিল</button>
                    </div>

                    <div class="grid grid-cols-2 gap-2 uppercase italic font-bold text-[8px]">
    <button onclick="updateStatus('${id}', 'pending')" class="p-2 rounded-xl bg-slate-100">১. অনুরোধ</button>
    <button onclick="updateStatus('${id}', 'received')" class="p-2 rounded-xl bg-blue-50 text-blue-600">২. যাচাই (গৃহীত)</button>
    <button onclick="updateStatus('${id}', 'invoice_ready')" class="p-2 rounded-xl bg-indigo-50 text-indigo-600">৩. ইনভয়েস</button>
    <button onclick="updateStatus('${id}', 'confirmed')" class="p-2 rounded-xl bg-purple-50 text-purple-600">৪. কনফার্ম</button>
    <button onclick="updateStatus('${id}', 'on_the_way')" class="p-2 rounded-xl bg-pink-50 text-pink-600">৫. সহকারী পথে</button>
    <button onclick="updateStatus('${id}', 'market_reached')" class="p-2 rounded-xl bg-yellow-50 text-yellow-600">৬. বাজারে</button>
    <button onclick="updateStatus('${id}', 'shopping')" class="p-2 rounded-xl bg-amber-50 text-amber-600">৭. কেনাকাটা</button>
    <button onclick="updateStatus('${id}', 'packing')" class="p-2 rounded-xl bg-orange-50 text-orange-600">৮. প্যাকিং</button>
    <button onclick="updateStatus('${id}', 'delivery')" class="p-2 rounded-xl bg-teal-50 text-teal-600">৯. ডেলিভারি</button>
    <button onclick="updateStatus('${id}', 'completed')" class="p-2 rounded-xl bg-green-600 text-white col-span-2 py-3 mt-2 shadow-lg shadow-green-100">১০. খিদমত সম্পন্ন</button>
</div>

                `;
                container.appendChild(card);
            });
        });

        // ৩. প্রোডাক্ট বাদ দেওয়ার সাথে ওয়ার্নিং নোটিফিকেশন লজিক
        window.removeItem = async (orderId, itemName) => {
            if(confirm(`"${itemName}" কি তালিকা থেকে বাদ দিবেন?`)) {
                const orderRef = doc(db, "orders", orderId);
                await updateDoc(orderRef, {
                    items: arrayRemove(itemName),
                    alertMessage: `দুঃখিত, "${itemName}" স্টকে নেই।`, // ইউজার প্যানেলে সাউন্ড ট্রিগার করবে
                    alertTime: Date.now() 
                });
            }
        };

        window.saveInvoice = async (id) => {
            const prices = {}; let sub = 0;
            document.querySelectorAll(`[data-id="${id}"]`).forEach(inp => {
                const p = parseFloat(inp.value) || 0;
                prices[inp.dataset.item] = p; sub += p;
            });
            await updateDoc(doc(db, "orders", id), {
                itemPrices: prices,
                subTotal: sub,
                deliveryCharge: parseFloat(document.getElementById(`del-${id}`).value) || 70,
                platformFee: parseFloat(document.getElementById(`plat-${id}`).value) || 20,
                status: "invoice_ready"
            });
            alert("রশিদ পাঠানো হয়েছে!");
        };

        window.updateStatus = async (id, s) => { await updateDoc(doc(db, "orders", id), { status: s }); };
    </script>
</body>
</html>
