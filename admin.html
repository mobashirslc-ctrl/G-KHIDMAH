<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | মাস্টার অ্যাডমিন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> 
        body { font-family: 'Hind Siliguri', sans-serif; } 
        .active-tab { background-color: #1e3a8a; color: white; border-radius: 1rem; }
    </style>
</head>
<body class="bg-slate-100 pb-20">
    <audio id="newOrderSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div class="max-w-2xl mx-auto p-4">
        <header class="bg-blue-900 text-white p-6 rounded-3xl shadow-xl mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic uppercase">G-KHIDMAH</h1>
                <p class="text-[10px] uppercase tracking-widest opacity-70 font-bold">মাস্টার অ্যাডমিন কন্ট্রোল</p>
            </div>
            <div id="activeCount" class="bg-blue-700 px-4 py-2 rounded-2xl text-xs font-bold italic">০টি অর্ডার</div>
        </header>

        <nav class="flex gap-2 overflow-x-auto pb-4 no-scrollbar mb-4">
            <button onclick="filterOrders('all')" id="tab-all" class="active-tab px-4 py-2 text-xs font-bold whitespace-nowrap">সব অর্ডার</button>
            <button onclick="filterOrders('shopping')" id="tab-shopping" class="bg-white px-4 py-2 text-xs font-bold rounded-2xl whitespace-nowrap shadow-sm">🛒 বাজার</button>
            <button onclick="filterOrders('car_rental')" id="tab-car_rental" class="bg-white px-4 py-2 text-xs font-bold rounded-2xl whitespace-nowrap shadow-sm">🚗 কার রেন্টাল</button>
            <button onclick="filterOrders('home_service')" id="tab-home_service" class="bg-white px-4 py-2 text-xs font-bold rounded-2xl whitespace-nowrap shadow-sm">🛠️ হোম সার্ভিস</button>
        </nav>

        <div class="bg-white p-6 rounded-[2rem] shadow-lg mb-8 border-2 border-dashed border-blue-200">
            <h3 class="text-sm font-black text-blue-900 uppercase italic mb-4">👷 নতুন মেম্বার অ্যাড (Driver/Rider/Expert)</h3>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <input type="text" id="mName" placeholder="নাম" class="p-3 rounded-xl bg-slate-50 border outline-none text-xs font-bold">
                <input type="tel" id="mPhone" placeholder="মোবাইল" class="p-3 rounded-xl bg-slate-50 border outline-none text-xs font-bold">
                <select id="mType" class="p-3 rounded-xl bg-slate-50 border outline-none text-xs font-bold">
                    <option value="rider">Rider (বাজার)</option>
                    <option value="driver">Driver (কার)</option>
                    <option value="expert">Expert (হোম)</option>
                </select>
                <input type="text" id="mPhoto" placeholder="ছবির লিঙ্ক (URL)" class="p-3 rounded-xl bg-slate-50 border outline-none text-xs font-bold">
            </div>
            <button onclick="addMember()" class="w-full bg-blue-900 text-white py-3 rounded-xl text-xs font-bold uppercase">নতুন মেম্বার যুক্ত করুন</button>
        </div>

        <div id="adminOrders" class="space-y-6"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, orderBy, query, setDoc, getDocs, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentFilter = 'all';
        let membersList = [];
        let orderCount = 0;

        // ১. নতুন মেম্বার (Driver/Rider/Expert) যুক্ত করা
        window.addMember = async () => {
            const name = document.getElementById('mName').value;
            const phone = document.getElementById('mPhone').value;
            const type = document.getElementById('mType').value;
            const photo = document.getElementById('mPhoto').value || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

            if(!name || !phone) return alert("তথ্য দিন!");
            const memberId = Date.now().toString();
            await setDoc(doc(db, "team", memberId), { name, phone, type, photo });
            alert("সফলভাবে যুক্ত হয়েছে!");
            location.reload();
        };

        // টিম মেম্বারদের লোড করা
        const loadTeam = async () => {
            const snap = await getDocs(collection(db, "team"));
            membersList = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
        };
        loadTeam();

        // ২. ফিল্টার ফাংশন
        window.filterOrders = (category) => {
            currentFilter = category;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab', 'bg-white'));
            document.getElementById('tab-'+category).classList.add('active-tab');
            renderOrders();
        };

        // ৩. অর্ডার রেন্ডারিং
        let allOrders = [];
        onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), (snapshot) => {
            allOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            // রিংটোন লজিক (যদি নতুন অর্ডার আসে)
            if (allOrders.length > orderCount && orderCount !== 0) {
                document.getElementById('newOrderSound').play().catch(e => console.log("Sound Error"));
            }
            orderCount = allOrders.length;
            
            renderOrders();
        });

        function renderOrders() {
            const container = document.getElementById('adminOrders');
            container.innerHTML = "";
            
            const filtered = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.serviceType === currentFilter);
            document.getElementById('activeCount').innerText = `${filtered.length}টি অর্ডার`;

            filtered.forEach(order => {
                const id = order.id;
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-[2rem] shadow-lg border-l-8 mb-4 border-blue-900";
                
                // ডাইনামিক স্ট্যাটাস বাটন (বাজারের জন্য এক রকম, গাড়ির জন্য অন্য রকম)
                let statusButtons = "";
                if(order.serviceType === 'car_rental') {
                    statusButtons = `
                        <button onclick="updateStatus('${id}', 'request_received')" class="p-2 text-[9px] bg-slate-100 rounded-lg font-bold">রিকোয়েস্ট</button>
                        <button onclick="updateStatus('${id}', 'driver_assigned')" class="p-2 text-[9px] bg-blue-100 text-blue-700 rounded-lg font-bold">ড্রাইভার সেট</button>
                        <button onclick="updateStatus('${id}', 'trip_started')" class="p-2 text-[9px] bg-green-100 text-green-700 rounded-lg font-bold">ট্রিপ শুরু</button>
                        <button onclick="updateStatus('${id}', 'completed')" class="p-2 text-[9px] bg-green-900 text-white rounded-lg font-bold">শেষ</button>
                    `;
                } else {
                    statusButtons = `
                        <button onclick="updateStatus('${id}', 'pending')" class="p-2 text-[8px] bg-slate-100 rounded-lg font-bold">পেন্ডিং</button>
                        <button onclick="updateStatus('${id}', 'on_the_way')" class="p-2 text-[8px] bg-blue-50 text-blue-600 rounded-lg font-bold">পথে</button>
                        <button onclick="updateStatus('${id}', 'completed')" class="p-2 text-[8px] bg-green-600 text-white rounded-lg font-bold">সম্পন্ন</button>
                    `;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="bg-blue-900 text-white text-[8px] px-3 py-1 rounded-full uppercase font-black tracking-widest">${order.serviceType || 'Shopping'}</div>
                        <span class="text-[9px] font-bold text-gray-400">#${id.slice(-5)}</span>
                    </div>

                    <div class="mb-4">
                        <h3 class="text-sm font-black text-gray-800">${order.customerName}</h3>
                        <p class="text-[10px] text-blue-600 font-bold">${order.customerPhone}</p>
                        <p class="text-[10px] text-gray-500 italic mt-1 leading-tight">${order.customerAddress}</p>
                    </div>

                    <div class="bg-slate-50 p-3 rounded-2xl mb-4">
                        <label class="text-[9px] font-black uppercase text-gray-400 block mb-2">অ্যাসাইন করুন (Rider/Driver/Expert)</label>
                        <div class="flex gap-2">
                            <select id="assign-${id}" class="flex-1 bg-white border text-xs p-2 rounded-xl outline-none font-bold">
                                <option value="">মেম্বার সিলেক্ট করুন</option>
                                ${membersList.map(m => `<option value="${m.id}" ${order.assignedPerson?.id === m.id ? 'selected' : ''}>${m.name} (${m.type})</option>`).join('')}
                            </select>
                            <button onclick="assignPerson('${id}')" class="bg-blue-900 text-white px-4 rounded-xl text-[9px] font-bold">অ্যাসাইন</button>
                        </div>
                        ${order.assignedPerson ? `<p class="text-[9px] text-green-600 mt-2 font-bold">অ্যাসাইনড: ${order.assignedPerson.name}</p>` : ''}
                    </div>

                    <div class="grid grid-cols-3 gap-2 mt-4">${statusButtons}</div>
                `;
                container.appendChild(card);
            });
        }

        // ৪. অ্যাসাইন লজিক
        window.assignPerson = async (orderId) => {
            const memberId = document.getElementById(`assign-${orderId}`).value;
            if(!memberId) return alert("মেম্বার সিলেক্ট করুন!");
            
            const member = membersList.find(m => m.id === memberId);
            await updateDoc(doc(db, "orders", orderId), {
                assignedPerson: member,
                alertMessage: `${member.name} আপনার অর্ডারের জন্য দায়িত্ব নিয়েছেন।`,
                alertTime: Date.now()
            });
            alert("অ্যাসাইন সম্পন্ন!");
        };

        window.updateStatus = async (id, s) => { 
            await updateDoc(doc(db, "orders", id), { status: s }); 
            alert("স্ট্যাটাস আপডেট হয়েছে!");
        };

    </script>
</body>
</html>
