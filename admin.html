<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | অ্যাডমিন কন্ট্রোল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Hind Siliguri', sans-serif; } </style>
</head>
<body class="bg-slate-100 p-4 pb-10">
    <div class="max-w-2xl mx-auto">
        <header class="bg-blue-900 text-white p-6 rounded-3xl shadow-xl mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic">G-KHIDMAH</h1>
                <p class="text-[10px] uppercase tracking-widest opacity-70">অ্যাডমিন ড্যাশবোর্ড</p>
            </div>
            <div id="activeCount" class="bg-blue-700 px-4 py-2 rounded-2xl text-xs font-bold italic text-white tracking-tighter">অর্ডার চেক করা হচ্ছে...</div>
        </header>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-gray-100 mb-8">
            <h3 class="text-lg font-black text-blue-900 mb-4 uppercase italic">কুপন জেনারেটর</h3>
            <div class="flex gap-2">
                <input type="text" id="newCouponCode" placeholder="কোড (SAVE50)" class="flex-1 p-3 rounded-2xl bg-gray-50 border-0 text-sm font-bold uppercase outline-none focus:ring-2 focus:ring-blue-200">
                <input type="number" id="newCouponAmount" placeholder="টাকা" class="w-24 p-3 rounded-2xl bg-gray-50 border-0 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-200">
                <button onclick="createCoupon()" class="bg-blue-700 text-white px-6 rounded-2xl font-bold text-sm active:scale-95 transition-all">সেভ</button>
            </div>
        </div>

        <div id="adminOrders" class="space-y-8"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, orderBy, query, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ১. কুপন তৈরির ফাংশন
        window.createCoupon = async () => {
            const codeInput = document.getElementById('newCouponCode');
            const amountInput = document.getElementById('newCouponAmount');
            const code = codeInput.value.trim().toUpperCase();
            const amount = parseFloat(amountInput.value);
            if(!code || isNaN(amount)) return alert("সঠিক ডাটা দিন");
            try {
                await setDoc(doc(db, "coupons", code), { amount: amount });
                alert("কুপন তৈরি হয়েছে!");
                codeInput.value = ""; amountInput.value = "";
            } catch (e) { alert(e.message); }
        };

        // ২. রিয়েল-টাইম অর্ডার লোড
        onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), (snapshot) => {
            const container = document.getElementById('adminOrders');
            document.getElementById('activeCount').innerText = `${snapshot.size}টি অর্ডার সেশন`;
            container.innerHTML = "";

            snapshot.forEach((orderDoc) => {
                const order = orderDoc.data();
                const id = orderDoc.id;
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-[2.5rem] shadow-xl border border-gray-100 relative mb-6";
                
                // আইটেম ইনপুট (প্রাইস + নোট)
                let itemsHtml = order.items.map(item => `
                    <div class="mb-4 p-3 bg-white rounded-2xl border border-gray-100 shadow-sm">
                        <p class="text-xs font-bold text-gray-700 mb-2 italic">📦 ${item}</p>
                        <div class="flex gap-2">
                            <input type="number" placeholder="৳ দাম" class="item-price w-24 p-2 rounded-xl bg-blue-50 text-xs font-bold outline-none focus:ring-1 focus:ring-blue-300" data-item="${item}" value="${order.itemPrices?.[item] || ''}">
                            <input type="text" placeholder="নোট (যেমন: Missing)" class="item-note flex-1 p-2 rounded-xl bg-gray-50 text-[10px] outline-none focus:ring-1 focus:ring-gray-300" data-item="${item}" value="${order.itemNotes?.[item] || ''}">
                        </div>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[9px] font-black uppercase italic tracking-tighter">ID: ...${id.slice(-6)}</span>
                        <span class="text-[9px] font-black text-white bg-green-500 px-3 py-1 rounded-full uppercase italic">${order.status}</span>
                    </div>

                    <div class="mb-6">
                        <h4 class="text-[10px] font-bold text-gray-400 mb-3 uppercase tracking-widest italic">পণ্যের দাম ও লাইভ আপডেট:</h4>
                        ${itemsHtml}
                    </div>

                    <div class="grid grid-cols-3 gap-2 mb-6">
                        <div class="bg-slate-50 p-2 rounded-2xl">
                            <label class="text-[9px] font-bold text-gray-400 block ml-1 italic">ডেলিভারি</label>
                            <input type="number" id="del-${id}" class="w-full bg-transparent p-1 text-sm font-bold outline-none" value="${order.deliveryCharge || 50}">
                        </div>
                        <div class="bg-slate-50 p-2 rounded-2xl">
                            <label class="text-[9px] font-bold text-gray-400 block ml-1 italic">প্ল্যাটফর্ম</label>
                            <input type="number" id="plat-${id}" class="w-full bg-transparent p-1 text-sm font-bold outline-none" value="${order.platformFee || 20}">
                        </div>
                        <div class="bg-slate-50 p-2 rounded-2xl">
                            <label class="text-[9px] font-bold text-gray-400 block ml-1 italic">কুপন (৳)</label>
                            <input type="number" id="coupon-${id}" class="w-full bg-transparent p-1 text-sm font-bold text-red-500 outline-none" value="${order.discount || 0}">
                        </div>
                    </div>

                    <button onclick="confirmInvoice('${id}')" class="w-full bg-blue-700 text-white py-4 rounded-2xl font-bold mb-6 shadow-lg shadow-blue-100 active:scale-95 transition-all">ইনভয়েস সেভ/আপডেট করুন</button>

                    <div class="grid grid-cols-2 gap-2 text-[9px]">
                        <button onclick="updateStatus('${id}', 'verifying')" class="bg-slate-200 p-2 rounded-lg font-bold">১. যাচাই</button>
                        <button onclick="updateStatus('${id}', 'invoice_ready')" class="bg-blue-100 text-blue-700 p-2 rounded-lg font-bold border border-blue-200">২. ইনভয়েস রেডি</button>
                        <button onclick="updateStatus('${id}', 'finding_assistant')" class="bg-indigo-100 text-indigo-700 p-2 rounded-lg font-bold">৩. সহকারী খুঁজছি</button>
                        <button onclick="updateStatus('${id}', 'assistant_assigned')" class="bg-purple-100 text-purple-700 p-2 rounded-lg font-bold">৪. সহকারী রেডি</button>
                        <button onclick="updateStatus('${id}', 'at_store')" class="bg-yellow-100 text-yellow-700 p-2 rounded-lg font-bold">৫. দোকানে</button>
                        <button onclick="updateStatus('${id}', 'shopping')" class="bg-amber-100 text-amber-700 p-2 rounded-lg font-bold">৬. কেনাকাটা</button>
                        <button onclick="updateStatus('${id}', 'packing')" class="bg-pink-100 text-pink-700 p-2 rounded-lg font-bold">৭. প্যাকিং</button>
                        <button onclick="updateStatus('${id}', 'delivery_started')" class="bg-orange-100 text-orange-700 p-2 rounded-lg font-bold">৮. রওয়ানা</button>
                        <button onclick="updateStatus('${id}', 'at_location')" class="bg-teal-100 text-teal-700 p-2 rounded-lg font-bold">৯. বাসার নিচে</button>
                        <button onclick="updateStatus('${id}', 'completed')" class="bg-green-600 text-white p-2 rounded-lg font-bold col-span-2 py-3 mt-2">১০. খিদমত ফিনিশ (Success)</button>
                    </div>
                `;
                container.appendChild(card);
            });
        });

        // ৩. ইনভয়েস কনফার্ম লজিক
        window.confirmInvoice = async (id) => {
            const card = event.target.closest('.bg-white');
            const priceInputs = card.querySelectorAll('.item-price');
            const noteInputs = card.querySelectorAll('.item-note');
            
            const itemPrices = {};
            const itemNotes = {};
            let subTotal = 0;

            priceInputs.forEach((input, index) => {
                const itemName = input.dataset.item;
                const price = parseFloat(input.value) || 0;
                const note = noteInputs[index].value || "";

                itemPrices[itemName] = price;
                itemNotes[itemName] = note;
                subTotal += price;
            });

            const delCharge = parseFloat(document.getElementById(`del-${id}`).value) || 0;
            const platFee = parseFloat(document.getElementById(`plat-${id}`).value) || 0;
            const discount = parseFloat(document.getElementById(`coupon-${id}`).value) || 0;

            try {
                await updateDoc(doc(db, "orders", id), {
                    itemPrices: itemPrices,
                    itemNotes: itemNotes,
                    subTotal: subTotal,
                    deliveryCharge: delCharge,
                    platformFee: platFee,
                    discount: discount,
                    status: "invoice_ready"
                });
                alert("ইনভয়েস এবং লাইভ ডাটা আপডেট হয়েছে!");
            } catch (e) { alert(e.message); }
        };

        // ৪. স্ট্যাটাস আপডেট
        window.updateStatus = async (id, status) => {
            try {
                await updateDoc(doc(db, "orders", id), { status: status });
            } catch (e) { alert("Failed!"); }
        };
    </script>
</body>
</html>
