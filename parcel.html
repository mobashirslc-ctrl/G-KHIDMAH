<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G KHIDMAH | পার্সেল ডেলিভারি</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <audio id="notifySound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <header class="bg-white shadow-sm p-4 sticky top-0 z-50 border-b border-green-100 flex items-center justify-between px-6">
        <div class="flex items-center gap-2">
            <div class="bg-green-700 w-8 h-8 rounded-lg flex items-center justify-center text-white font-black italic text-xl">G</div>
            <h1 class="text-xl font-bold text-green-700 uppercase italic">G KHIDMAH</h1>
        </div>
        <button onclick="localStorage.removeItem('activeOrderId'); location.reload();" class="text-[10px] font-bold bg-red-50 text-red-600 px-3 py-1 rounded-full uppercase">নতুন পার্সেল</button>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-6">
        
        <div id="orderSection" class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-gray-100">
            <div class="text-center mb-6"><div class="text-5xl mb-2">📦</div><h2 class="text-lg font-bold text-gray-800 italic uppercase">পার্সেল ডেলিভারি</h2></div>
            <div class="space-y-3">
                <input type="text" id="custName" placeholder="আপনার নাম" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-green-200 outline-none text-sm font-bold">
                <input type="tel" id="custPhone" placeholder="মোবাইল নাম্বার" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-green-200 outline-none text-sm font-bold">
                <input type="text" id="pickupAddr" placeholder="পিকআপ ঠিকানা" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-green-200 outline-none text-sm font-bold">
                <input type="text" id="deliveryAddr" placeholder="ডেলিভারি ঠিকানা" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-green-200 outline-none text-sm font-bold">
                <textarea id="parcelNote" rows="2" class="w-full border-2 border-green-50 p-4 rounded-3xl outline-none text-sm font-semibold" placeholder="পার্সেলের বিবরণ..."></textarea>
            </div>
            <button id="submitBtn" class="w-full bg-green-700 text-white mt-5 py-4 rounded-2xl font-bold text-lg active:scale-95 shadow-lg">ডেলিভারি রিকোয়েস্ট পাঠান</button>
        </div>

        <div id="trackingSection" class="hidden space-y-4">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center border border-green-100">
                <div id="statusIcon" class="text-7xl mb-4 animate-bounce">📋</div>
                <h1 id="trackMessage" class="text-xl font-black text-green-700 leading-tight uppercase">অনুরোধ পাঠানো হয়েছে...</h1>
                
                <div id="liveStatusBox" class="hidden mt-4 py-2 px-4 bg-orange-50 border border-orange-100 rounded-full inline-block">
                    <p class="text-[11px] text-orange-600 font-bold animate-pulse" id="liveStatusText">📍 লোকেশন আপডেট হচ্ছে...</p>
                </div>

                <div class="w-full bg-gray-100 h-4 rounded-full overflow-hidden p-1 mt-6">
                    <div id="progressBar" class="bg-green-700 h-full rounded-full transition-all duration-1000" style="width: 10%"></div>
                </div>
            </div>

            <div id="chargeBox" class="hidden bg-white p-6 rounded-[2rem] border-2 border-dashed border-green-200 text-center shadow-lg">
                <p class="text-xs font-bold text-gray-500 uppercase mb-2">Delivery Charge</p>
                <h2 id="chargeDisplay" class="text-4xl font-black text-green-800 mb-4">৳০</h2>
                <button id="confirmChargeBtn" class="w-full bg-green-700 text-white py-3 rounded-xl font-black uppercase shadow-lg active:scale-95">কনফার্ম ও রাইডার কল করুন</button>
            </div>
            
<div class="space-y-4 p-6 bg-white rounded-3xl shadow-sm">
    <h3 class="font-bold text-gray-700">প্রেরকের তথ্য (Sender)</h3>
    <input type="text" placeholder="আপনার নাম" class="w-full p-4 bg-gray-50 rounded-2xl">
    <input type="tel" placeholder="আপনার মোবাইল নাম্বার" class="w-full p-4 bg-gray-50 rounded-2xl">

    <hr class="border-dashed my-4">

    <h3 class="font-bold text-gray-700">প্রাপকের তথ্য (Receiver)</h3>
    <input type="text" id="receiverName" placeholder="প্রাপকের নাম" class="w-full p-4 bg-gray-50 rounded-2xl" required>
    <input type="tel" id="receiverPhone" placeholder="প্রাপকের মোবাইল নাম্বার" class="w-full p-4 bg-gray-50 rounded-2xl" required>
    <textarea placeholder="বিস্তারিত ঠিকানা" class="w-full p-4 bg-gray-50 rounded-2xl"></textarea>
</div>
            <div id="riderCard" class="hidden bg-white p-5 rounded-[2rem] shadow-xl border border-gray-100 flex items-center gap-4">
                <img id="riderPic" src="" class="w-16 h-16 rounded-full object-cover border-2 border-green-500 shadow-sm">
                <div class="flex-1">
                    <h4 id="riderName" class="font-bold text-gray-800">রাইডার তথ্য</h4>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Verified Rider</p>
                    <div id="riderNidBox" class="mt-1">
                        <p id="riderNid" class="text-[9px] font-mono text-gray-500 bg-slate-50 px-2 py-0.5 rounded inline-block">NID: Verified</p>
                    </div>
                </div>
                <a id="riderCall" href="#" class="bg-green-100 p-3 rounded-full text-green-700">📞</a>
            </div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
        authDomain: "gkhidmah-8636b.firebaseapp.com",
        projectId: "gkhidmah-8636b",
        storageBucket: "gkhidmah-8636b.firebasestorage.app",
        messagingSenderId: "780745438049",
        appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let lastStatus = "";

    const parcelStatus = {
        "pending": { msg: "রাইডার খোঁজা হচ্ছে", icon: "🔍", progress: 15 },
        "wait_confirmation": { msg: "চার্জ কনফার্ম করুন", icon: "💰", progress: 30 },
        "rider_assigned": { msg: "রাইডার নিযুক্ত হয়েছে", icon: "🛵", progress: 45 },
        "at_pickup": { msg: "রাইডার পিকআপ পয়েন্টে", icon: "📍", progress: 60 },
        "picked": { msg: "পার্সেল রিসিভ করা হয়েছে", icon: "📦", progress: 75 },
        "in_transit": { msg: "পার্সেল গন্তব্যের পথে", icon: "🚚", progress: 90 },
        "completed": { msg: "ডেলিভারি সম্পন্ন", icon: "🎉", progress: 100 }
    };

    document.getElementById('submitBtn').onclick = async function() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const pAddr = document.getElementById('pickupAddr').value.trim();
        const dAddr = document.getElementById('deliveryAddr').value.trim();
        const note = document.getElementById('parcelNote').value.trim();
        
        // ১. পার্টনার আইডি নিয়ে আসা
        const partnerId = localStorage.getItem('assignedPartnerId') || "01752425414"; 

        if(!name || !phone || !pAddr || !dAddr) return alert("সব তথ্য পূরণ করুন!");

        const btn = document.getElementById('submitBtn');
        btn.innerText = "অনুরোধ পাঠানো হচ্ছে...";
        btn.disabled = true;

        const orderData = {
            customerName: name, 
            customerPhone: phone, 
            pickupLocation: pAddr,
            customerAddress: dAddr, 
            items: [note || "Parcel Delivery"],
            orderType: "parcel", 
            status: "pending", 
            
            // ২. পার্টনার প্যানেলের জন্য জরুরি অবজেক্ট
            assignedPerson: {
                id: partnerId
            },

            deliveryCharge: 0, 
            platformFee: 20,
            invoiceConfirmed: false,
            createdAt: serverTimestamp()
        };

        try {
            const docRef = await addDoc(collection(db, "orders"), orderData);
            localStorage.setItem('activeOrderId', docRef.id);
            initTracking();
        } catch (e) {
            console.error(e);
            alert("দুঃখিত, আবার চেষ্টা করুন।");
            btn.innerText = "ডেলিভারি রিকোয়েস্ট পাঠান";
            btn.disabled = false;
        }
    };

    function initTracking() {
        const orderId = localStorage.getItem('activeOrderId');
        if(!orderId) return;

        document.getElementById('orderSection').classList.add('hidden');
        document.getElementById('trackingSection').classList.remove('hidden');

        onSnapshot(doc(db, "orders", orderId), (snapshot) => {
            const data = snapshot.data();
            if(!data) return;

            if(lastStatus !== "" && lastStatus !== data.status) {
                document.getElementById('notifySound').play().catch(() => {});
            }
            lastStatus = data.status;

            const config = parcelStatus[data.status] || parcelStatus["pending"];
            document.getElementById('statusIcon').innerText = config.icon;
            document.getElementById('trackMessage').innerText = config.msg;
            document.getElementById('progressBar').style.width = config.progress + "%";

            // লাইভ লোকেশন আপডেট
            if(data.currentLoc) {
                document.getElementById('liveStatusBox').classList.remove('hidden');
                document.getElementById('liveStatusText').innerText = `📍 ${data.currentLoc}`;
            } else {
                document.getElementById('liveStatusBox').classList.add('hidden');
            }

            // চার্জ কনফার্মেশন লজিক
            if(data.deliveryCharge > 0 && data.status === "wait_confirmation") {
                document.getElementById('chargeBox').classList.remove('hidden');
                document.getElementById('chargeDisplay').innerText = `৳${data.deliveryCharge}`;
                
                document.getElementById('confirmChargeBtn').onclick = async () => {
                    const btn = document.getElementById('confirmChargeBtn');
                    btn.innerText = "প্রসেসিং...";
                    btn.disabled = true;
                    await updateDoc(doc(db, "orders", orderId), { 
                        status: "rider_assigned",
                        invoiceConfirmed: true 
                    });
                };
            } else {
                document.getElementById('chargeBox').classList.add('hidden');
            }

            // রাইডার তথ্য প্রদর্শন
            const showRiderStatuses = ["rider_assigned", "at_pickup", "picked", "in_transit", "completed"];
            if(showRiderStatuses.includes(data.status)) {
                document.getElementById('riderCard').classList.remove('hidden');
                document.getElementById('riderName').innerText = data.riderName || "রাইডার খোঁজা হচ্ছে...";
                document.getElementById('riderPic').src = data.riderPic || "https://ui-avatars.com/api/?name=Rider";
                document.getElementById('riderCall').href = data.riderPhone ? `tel:${data.riderPhone}` : "#";
                document.getElementById('riderNid').innerText = `NID: ${data.riderNid || 'Verified'}`;
            } else {
                document.getElementById('riderCard').classList.add('hidden');
            }
        });
    }

    window.onload = initTracking;
</script>
</body>
</html>
