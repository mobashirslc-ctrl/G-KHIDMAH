<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G KHIDMAH | রক্তদান</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-red-50 min-h-screen">
    <header class="bg-white p-6 shadow-sm border-b border-red-100 flex flex-col items-center">
        <h1 class="text-2xl font-black text-red-600 italic uppercase">BLOOD CONNECTION</h1>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-4">
        <div id="orderSection" class="bg-white p-6 rounded-[2.5rem] shadow-xl">
            <h2 class="text-center font-bold text-gray-700 mb-4">রক্তের প্রয়োজন? তথ্য দিন</h2>
            <div class="space-y-3">
                <input type="text" id="custName" placeholder="রোগীর নাম/আপনার নাম" class="w-full p-4 rounded-2xl bg-red-50/30 border-2 border-transparent outline-none font-bold">
                <input type="tel" id="custPhone" placeholder="মোবাইল নাম্বার" class="w-full p-4 rounded-2xl bg-red-50/30 border-2 border-transparent outline-none font-bold">
                <select id="bloodGroup" class="w-full p-4 rounded-2xl bg-red-50/30 border-2 border-transparent outline-none font-bold">
                    <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                    <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
                </select>
                <input type="text" id="hospital" placeholder="হাসপাতালের নাম ও ঠিকানা" class="w-full p-4 rounded-2xl bg-red-50/30 border-2 border-transparent outline-none font-bold">
            </div>
            <button id="submitBtn" class="w-full bg-red-600 text-white mt-5 py-4 rounded-2xl font-bold">রক্তের জন্য অনুরোধ পাঠান</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { /* Your Config Here */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('submitBtn').onclick = async function() {
            await addDoc(collection(db, "orders"), {
                customerName: document.getElementById('custName').value,
                customerPhone: document.getElementById('custPhone').value,
                bloodGroup: document.getElementById('bloodGroup').value,
                hospital: document.getElementById('hospital').value,
                orderType: "blood",
                status: "pending",
                createdAt: serverTimestamp()
            });
            alert("আপনার অনুরোধ সফলভাবে পাঠানো হয়েছে। আমরা দ্রুত যোগাযোগ করব।");
        };
    </script>
</body>
</html>
