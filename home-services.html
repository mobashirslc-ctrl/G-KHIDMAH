<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G KHIDMAH | হোম সার্ভিস</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <header class="bg-white shadow-sm p-4 border-b border-blue-100 flex items-center justify-between px-6">
        <h1 class="text-xl font-bold text-blue-900 italic uppercase">G KHIDMAH SERVICES</h1>
        <button onclick="localStorage.removeItem('activeOrderId'); location.reload();" class="text-[10px] font-bold bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs uppercase font-black">নতুন রিকোয়েস্ট</button>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-6">
        <div id="orderSection" class="bg-white p-6 rounded-[2.5rem] shadow-xl border">
            <div class="text-center mb-6"><div class="text-5xl mb-2">🛠️</div><h2 class="text-lg font-bold">হোম সার্ভিস বুকিং</h2></div>
            <div class="space-y-3">
                <input type="text" id="custName" placeholder="আপনার নাম" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-200 outline-none font-bold">
                <input type="tel" id="custPhone" placeholder="মোবাইল নাম্বার" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-200 outline-none font-bold">
                <input type="text" id="custAddress" placeholder="বাসার ঠিকানা" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-200 outline-none font-bold">
                <select id="cat" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent outline-none font-bold">
                    <option value="" disabled selected>সার্ভিস ক্যাটাগরি</option>
                    <option>প্লাম্বার (Plumber)</option>
                    <option>ইলেকট্রিশিয়ান (Electrician)</option>
                    <option>এসি সার্ভিস (AC Service)</option>
                    <option>অন্যান্য</option>
                </select>
                <textarea id="serviceNote" rows="3" class="w-full border-2 border-slate-100 p-4 rounded-3xl outline-none font-semibold" placeholder="কি সমস্যা হয়েছে বিস্তারিত লিখুন..."></textarea>
            </div>
            <button id="submitBtn" class="w-full bg-blue-900 text-white mt-5 py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all uppercase">সার্ভিস কনফার্ম করুন</button>
        </div>

        <div id="trackingSection" class="hidden space-y-4">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center border border-blue-100">
                <div id="statusIcon" class="text-7xl mb-4 animate-bounce">📋</div>
                <h1 id="trackMessage" class="text-xl font-black text-blue-900 uppercase">অপেক্ষা করুন...</h1>
                <div class="w-full bg-gray-100 h-4 rounded-full overflow-hidden p-1 mt-4">
                    <div id="progressBar" class="bg-blue-900 h-full rounded-full transition-all duration-1000" style="width: 10%"></div>
                </div>

                <div id="couponSection" class="hidden mt-6 bg-blue-50/50 p-4 rounded-2xl border-2 border-dashed border-blue-200">
                    <div class="flex gap-2">
                        <input type="text" id="couponInput" placeholder="কুপন কোড" class="flex-1 p-2 rounded-xl border border-blue-200 outline-none text-xs font-bold uppercase">
                        <button id="applyCouponBtn" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black tracking-widest">APPLY</button>
                    </div>
                    <p id="couponMsg" class="text-[9px] mt-1 font-bold hidden"></p>
                </div>

                <div id="billBox" class="hidden mt-6 bg-blue-50 p-6 rounded-2xl border-2 border-dashed border-blue-200 space-y-2">
                    <div class="flex justify-between text-xs font-bold text-gray-500"><span>সার্ভিস বিল:</span><span id="subTotalDisplay">৳০</span></div>
                    <div id="discountRow" class="hidden flex justify-between text-xs font-bold text-red-500"><span>ডিসকাউন্ট:</span><span id="discountDisplay">-৳০</span></div>
                    <div class="flex justify-between text-xs font-bold text-gray-500"><span>প্লাটফর্ম ফি:</span><span>৳২০</span></div>
                    
                    <div class="pt-2 border-t border-blue-200">
                        <p class="text-[10px] font-bold text-gray-400 uppercase text-left">মোট প্রদেয়</p>
                        <h2 id="totalBill" class="text-4xl font-black text-blue-900 text-right">৳০</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
        authDomain: "gkhidmah-8636b.firebaseapp.com",
        projectId: "gkhidmah-8636b",
        storageBucket: "gkhidmah-8636b.firebasestorage.app",
        messagingSenderId: "780745438049",
        appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const statusMap = {
        "expert_finding": { msg: "আপনার জন্য এক্সপার্ট খোঁজা হচ্ছে", progress: "20%" },
        "expert_assigned": { msg: "এক্সপার্ট নির্ধারিত হয়েছে", progress: "40%" },
        "work_in_progress": { msg: "কাজ চলছে...", progress: "70%" },
        "payment_pending": { msg: "কাজ শেষ, পেমেন্ট করুন", progress: "90%" },
        "completed": { msg: "সফলভাবে সম্পন্ন হয়েছে", progress: "100%" }
    };

    document.getElementById('submitBtn').onclick = async function() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const address = document.getElementById('custAddress').value.trim();
        const category = document.getElementById('cat').value;
        const note = document.getElementById('serviceNote').value.trim();
        const partnerId = localStorage.getItem('assignedPartnerId') || "01752425414"; 

        if(!name || !phone || !category) return alert("অনুগ্রহ করে নাম, মোবাইল এবং ক্যাটাগরি পূরণ করুন।");

        const btn = document.getElementById('submitBtn');
        btn.innerText = "অনুরোধ পাঠানো হচ্ছে...";
        btn.disabled = true;

        const data = {
            customerName: name,
            customerPhone: phone,
            customerAddress: address,
            items: [`${category}: ${note}`],
            serviceType: "home_service",
            status: "expert_finding",
            assignedPerson: { id: partnerId },
            createdAt: serverTimestamp(),
            subTotal: 0,
            deliveryCharge: 0,
            platformFee: 20,
            discount: 0,
            invoiceConfirmed: false
        };

        try {
            const docRef = await addDoc(collection(db, "orders"), data);
            localStorage.setItem('activeOrderId', docRef.id);
            initTracking();
        } catch (e) {
            alert("দুঃখিত, ডাটা সেভ করতে সমস্যা হয়েছে।");
            btn.innerText = "সার্ভিস কনফার্ম করুন";
            btn.disabled = false;
        }
    };

    function initTracking() {
        const orderId = localStorage.getItem('activeOrderId');
        if(!orderId) return;

        document.getElementById('orderSection').classList.add('hidden');
        document.getElementById('trackingSection').classList.remove('hidden');

        onSnapshot(doc(db, "orders", orderId), (snapshot) => {
            if(!snapshot.exists()) return;
            const data = snapshot.data();
            
            const step = statusMap[data.status] || statusMap["expert_finding"];
            document.getElementById('trackMessage').innerText = step.msg;
            document.getElementById('progressBar').style.width = step.progress;
            
            // বিল এবং কুপন লজিক
            if(data.subTotal > 0) {
                document.getElementById('billBox').classList.remove('hidden');
                document.getElementById('subTotalDisplay').innerText = `৳${data.subTotal}`;
                
                // কুপন সেকশন তখনই দেখাবে যখন বিল আসবে কিন্তু কুপন লাগানো হয়নি
                if(data.discount <= 0) {
                    document.getElementById('couponSection').classList.remove('hidden');
                } else {
                    document.getElementById('couponSection').classList.add('hidden');
                    document.getElementById('discountRow').classList.remove('hidden');
                    document.getElementById('discountDisplay').innerText = `-৳${data.discount}`;
                    document.getElementById('couponMsg').innerText = "কুপন ডিসকাউন্ট যোগ হয়েছে!";
                    document.getElementById('couponMsg').className = "text-[9px] mt-1 font-bold text-green-600";
                    document.getElementById('couponMsg').classList.remove('hidden');
                }

                const total = (data.subTotal + (data.platformFee || 20)) - (data.discount || 0);
                document.getElementById('totalBill').innerText = `৳${total}`;
            }
        });
    }

    // কুপন অ্যাপ্লাই বাটন লজিক
    document.getElementById('applyCouponBtn').onclick = async () => {
        const code = document.getElementById('couponInput').value.trim().toUpperCase();
        const orderId = localStorage.getItem('activeOrderId');
        const msg = document.getElementById('couponMsg');

        if(!code || !orderId) return;

        try {
            const couponRef = doc(db, "coupons", code);
            const couponSnap = await getDoc(couponRef);

            if (couponSnap.exists() && couponSnap.data().isActive) {
                const couponData = couponSnap.data();
                
                if(couponData.serviceType === "all" || couponData.serviceType === "home_service") {
                    await updateDoc(doc(db, "orders", orderId), {
                        discount: parseFloat(couponData.discount),
                        couponCode: code
                    });
                } else {
                    msg.innerText = "এই কুপনটি হোম সার্ভিসের জন্য নয়।";
                    msg.className = "text-[10px] text-red-600 font-bold";
                    msg.classList.remove('hidden');
                }
            } else {
                msg.innerText = "ভুল কুপন কোড!";
                msg.className = "text-[10px] text-red-600 font-bold";
                msg.classList.remove('hidden');
            }
        } catch (e) {
            alert("কুপন কাজ করছে না।");
        }
    };

    window.onload = initTracking;
</script>
</body>
</html>
