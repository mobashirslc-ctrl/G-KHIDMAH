<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G KHIDMAH | হোম সার্ভিস</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">
    <audio id="notifySound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <header class="bg-white shadow-sm p-4 border-b border-green-100 flex items-center justify-between px-6">
        <h1 class="text-xl font-bold text-green-700 italic">G KHIDMAH SERVICES</h1>
        <button onclick="localStorage.removeItem('activeOrderId'); location.reload();" class="text-[10px] font-bold bg-red-50 text-red-600 px-3 py-1 rounded-full">নতুন রিকোয়েস্ট</button>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-6">
        <div id="orderSection" class="bg-white p-6 rounded-[2.5rem] shadow-xl border">
            <div class="text-center mb-6"><div class="text-5xl mb-2">🛠️</div><h2 class="text-lg font-bold">কি সেবা প্রয়োজন?</h2></div>
            <div class="space-y-3">
                <input type="text" id="custName" placeholder="আপনার নাম" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-green-200 outline-none font-bold">
                <input type="tel" id="custPhone" placeholder="মোবাইল নাম্বার" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-green-200 outline-none font-bold">
                <input type="text" id="custAddress" placeholder="বাসার ঠিকানা" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-green-200 outline-none font-bold">
                <select id="serviceType" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent outline-none font-bold">
                    <option value="" disabled selected>সার্ভিস ক্যাটাগরি</option>
                    <option>প্লাম্বার (Plumber)</option>
                    <option>ইলেকট্রিশিয়ান (Electrician)</option>
                    <option>এসি সার্ভিস (AC Service)</option>
                    <option>অন্যান্য</option>
                </select>
                <textarea id="serviceNote" rows="3" class="w-full border-2 border-green-50 p-4 rounded-3xl outline-none font-semibold" placeholder="সমস্যার বিবরণ দিন..."></textarea>
            </div>
            <button id="submitBtn" class="w-full bg-green-700 text-white mt-5 py-4 rounded-2xl font-bold shadow-lg">সার্ভিস বুক করুন</button>
        </div>

        <div id="trackingSection" class="hidden space-y-4">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center border border-green-100">
                <div id="statusIcon" class="text-7xl mb-4 animate-bounce">📋</div>
                <h1 id="trackMessage" class="text-xl font-black text-green-700 uppercase">অপেক্ষা করুন...</h1>
                <div class="w-full bg-gray-100 h-4 rounded-full overflow-hidden p-1 mt-4">
                    <div id="progressBar" class="bg-green-700 h-full rounded-full transition-all duration-1000" style="width: 10%"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('submitBtn').onclick = async function() {
            const data = {
                customerName: document.getElementById('custName').value,
                customerPhone: document.getElementById('custPhone').value,
                customerAddress: document.getElementById('custAddress').value,
                serviceType: document.getElementById('serviceType').value,
                items: [document.getElementById('serviceNote').value],
                orderType: "home_service",
                status: "pending",
                createdAt: serverTimestamp()
            };
            const docRef = await addDoc(collection(db, "orders"), data);
            localStorage.setItem('activeOrderId', docRef.id);
            initTracking();
        };

        function initTracking() {
            const orderId = localStorage.getItem('activeOrderId');
            if(!orderId) return;
            document.getElementById('orderSection').classList.add('hidden');
            document.getElementById('trackingSection').classList.remove('hidden');
            onSnapshot(doc(db, "orders", orderId), (snapshot) => {
                const data = snapshot.data();
                if(data) {
                    document.getElementById('trackMessage').innerText = data.status.toUpperCase();
                    if(data.status === 'pending') document.getElementById('progressBar').style.width = "20%";
                    if(data.status === 'completed') document.getElementById('progressBar').style.width = "100%";
                }
            });
        }
        window.onload = initTracking;
    </script>
</body>
</html>
