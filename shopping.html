<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G KHIDMAH | বাজার সদাই</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .brand-green { color: #15803d; }
        .bg-brand-dark-green { background-color: #15803d; }
        .progress-glow { box-shadow: 0 0 15px rgba(21, 128, 61, 0.3); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <audio id="statusSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <header class="bg-white shadow-sm p-4 sticky top-0 z-50 border-b border-green-100 flex items-center justify-between px-6">
        <div class="flex items-center gap-2">
            <div class="bg-green-700 w-9 h-9 rounded-xl flex items-center justify-center shadow-lg shadow-green-100">
                <span class="text-white font-black text-xl italic tracking-tighter">G</span>
            </div>
            <h1 class="text-xl font-bold brand-green uppercase italic tracking-tighter">G KHIDMAH</h1>
        </div>
        <button id="newOrderBtn" class="hidden text-[10px] font-bold bg-red-50 text-red-600 px-4 py-2 rounded-full border border-red-100 uppercase tracking-tighter">নতুন বাজার</button>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-6">
        <div id="orderSection" class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-gray-100 mt-6 text-center">
            <div class="text-5xl mb-2">🛒</div>
            <h2 class="text-lg font-bold text-gray-800 italic mb-6">আপনার বাজারের ফর্দ দিন</h2>
            
            <div class="space-y-3 text-left">
                <input type="text" id="custName" placeholder="আপনার নাম" class="w-full p-4 rounded-2xl bg-slate-50 outline-none font-bold">
                <input type="tel" id="custPhone" placeholder="মোবাইল নাম্বার" class="w-full p-4 rounded-2xl bg-slate-50 outline-none font-bold">
                <input type="text" id="custAddress" placeholder="বাসার পূর্ণ ঠিকানা" class="w-full p-4 rounded-2xl bg-slate-50 outline-none font-bold">
                <textarea id="orderList" rows="5" class="w-full border-2 border-green-50 p-4 rounded-3xl outline-none font-semibold" placeholder="১. চাল ৫ কেজি..."></textarea>
            </div>

            <button id="submitOrderBtn" class="w-full bg-brand-dark-green text-white mt-5 py-5 rounded-2xl font-bold text-lg flex justify-center items-center gap-2 active:scale-95 transition-all shadow-lg">
                <span>খাদেমকে লিস্ট পাঠান</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
            </button>
        </div>

        <div id="trackingSection" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center border border-green-100">
                <div id="statusIcon" class="text-7xl mb-4 animate-bounce">📋</div>
                <p id="stepCounter" class="text-[10px] text-green-600 font-black italic mb-2 tracking-widest uppercase"></p>
                <h1 id="trackMessage" class="text-xl font-black brand-green italic mb-6"></h1>
                <div class="w-full bg-gray-100 h-3 rounded-full overflow-hidden p-1">
                    <div id="progressBar" class="bg-brand-dark-green h-full rounded-full transition-all duration-1000 progress-glow" style="width: 0%"></div>
                </div>
            </div>

            <div id="invoiceBox" class="hidden bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-gray-100">
                <div class="p-5 bg-slate-50 border-b border-dashed border-gray-200 text-center">
                    <h3 class="text-sm font-black brand-green uppercase italic">অফিসিয়াল বাজার রশিদ</h3>
                    <p class="text-[9px] text-gray-400 mt-1 uppercase tracking-widest" id="orderIdDisplay"></p>
                </div>
                
                <div id="invoiceItemsDisplay" class="p-6 space-y-3 font-semibold text-sm"></div>

                <div class="px-6 py-4 bg-gray-50 border-t border-gray-100">
                    <div class="flex gap-2">
                        <input type="text" id="couponInput" placeholder="কুপন কোড" class="flex-1 p-3 rounded-xl border border-dashed border-green-300 text-xs outline-none font-bold uppercase">
                        <button id="applyCouponBtn" class="bg-gray-800 text-white px-4 rounded-xl text-[10px] font-bold">Apply</button>
                    </div>
                    <p id="couponMsg" class="text-[9px] mt-1 font-bold"></p>
                </div>

                <div class="px-6 py-5 bg-green-50/30 border-t border-b border-dashed border-green-100 space-y-2">
                    <div class="flex justify-between text-xs font-bold text-gray-500"><span>আইটেম বিল:</span><span id="subTotalDisplay">৳০</span></div>
                    <div id="discountRow" class="hidden flex justify-between text-xs font-bold text-red-500"><span>ডিসকাউন্ট:</span><span id="discountDisplay"></span></div>
                    <div class="flex justify-between text-xs font-bold text-gray-500"><span>ডেলিভারি চার্জ:</span><span id="delChargeDisplay">৳৭০</span></div>
                    <div class="flex justify-between text-xs font-bold text-gray-500"><span>প্ল্যাটফর্ম ফি:</span><span id="platFeeDisplay">৳২০</span></div>
                    <div class="pt-4 border-t border-green-100 flex justify-between items-center">
                        <span class="text-xs font-black uppercase text-gray-400">মোট বিল:</span>
                        <span id="grandTotalDisplay" class="text-4xl font-black brand-green tracking-tighter">৳০</span>
                    </div>
                </div>

                <div id="confirmBox" class="p-6 hidden">
                    <button id="confirmInvoiceBtn" class="w-full py-4 bg-green-700 text-white rounded-2xl font-bold shadow-lg uppercase tracking-tighter">Confirm & Proceed</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // অ্যাডমিন প্যানেলের বাটনের সাথে হুবহু মিলানো স্ট্যাটাস লিস্ট
        const statusConfig = {
            "pending": { step: "১/১০", msg: "অনুরোধ পেয়েছি", icon: "📋", progress: 10 },
            "received": { step: "২/১০", msg: "অর্ডার যাচাই করা হচ্ছে", icon: "✅", progress: 20 },
            "invoice_ready": { step: "৩/১০", msg: "রশিদ তৈরি হয়েছে", icon: "📄", progress: 30 },
            "confirmed": { step: "৪/১০", msg: "অর্ডার কনফার্ম হয়েছে", icon: "🤝", progress: 40 },
            "on_the_way": { step: "৫/১০", msg: "সহকারী আপনার বাজারের পথে", icon: "🏍️", progress: 50 },
            "market_reached": { step: "৬/১০", msg: "সহকারী বাজারে পৌঁছেছে", icon: "🏬", progress: 60 },
            "shopping": { step: "৭/১০", msg: "কেনাকাটা চলছে", icon: "🛒", progress: 75 },
            "packing": { step: "৮/১০", msg: "প্যাকিং করা হচ্ছে", icon: "📦", progress: 85 },
            "delivery": { step: "৯/১০", msg: "সহকারী ডেলিভারি নিয়ে আসছে", icon: "🚚", progress: 95 },
            "completed": { step: "সফল", msg: "খিদমত সম্পন্ন", icon: "🎉", progress: 100 }
        };

        let lastAlertTime = 0;
        let lastKnownStatus = "";

        // ১. অর্ডার পাঠানো
        document.getElementById('submitOrderBtn').onclick = async () => {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const addr = document.getElementById('custAddress').value.trim();
            const list = document.getElementById('orderList').value.trim();

            if(!name || !phone || !addr || !list) return alert("সব তথ্য দিন!");

            const submitBtn = document.getElementById('submitOrderBtn');
            submitBtn.innerText = "অর্ডার যাচ্ছে...";
            submitBtn.disabled = true;

            try {
                const docRef = await addDoc(collection(db, "orders"), {
                    customerName: name,
                    customerPhone: phone,
                    customerAddress: addr,
                    items: list.split('\n').filter(i => i.trim() !== ""),
                    status: "pending",
                    createdAt: serverTimestamp(),
                    subTotal: 0,
                    deliveryCharge: 70,
                    platformFee: 20,
                    discount: 0,
                    invoiceConfirmed: false,
                    missingItems: [],
                    alertTime: 0
                });
                localStorage.setItem('activeOrderId', docRef.id);
                initTracking();
            } catch (e) {
                alert("চেষ্টা করুন আবার!");
                submitBtn.innerText = "খাদেমকে লিস্ট পাঠান";
                submitBtn.disabled = false;
            }
        };

        // ২. ট্র্যাকিং ফাংশন
        const initTracking = () => {
            const orderId = localStorage.getItem('activeOrderId');
            if(!orderId) return;

            document.getElementById('orderSection').classList.add('hidden');
            document.getElementById('trackingSection').classList.remove('hidden');
            document.getElementById('newOrderBtn').classList.remove('hidden');

            onSnapshot(doc(db, "orders", orderId), (snapshot) => {
                if(!snapshot.exists()) return;
                const data = snapshot.data();

                // ৪০ সেকেন্ড রিংটোন লজিক
                if (data.alertTime && data.alertTime > lastAlertTime) {
                    lastAlertTime = data.alertTime;
                    const ringtone = new Audio('https://assets.mixkit.co/active_storage/sfx/1004/1004-preview.mp3');
                    ringtone.loop = true;
                    ringtone.play().catch(() => {});
                    if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 300]);

                    const autoStop = setTimeout(() => {
                        ringtone.pause();
                        if (navigator.vibrate) navigator.vibrate(0);
                    }, 40000); 

                    setTimeout(() => { 
                        alert("⚠️ আপডেট: " + data.alertMessage); 
                        ringtone.pause(); 
                        if (navigator.vibrate) navigator.vibrate(0);
                        clearTimeout(autoStop);
                    }, 1000);
                }

                // স্ট্যাটাস চেঞ্জ সাউন্ড
                if (lastKnownStatus !== "" && lastKnownStatus !== data.status) {
                    const notify = document.getElementById('statusSound');
                    if(notify) notify.play().catch(() => {});
                }
                lastKnownStatus = data.status;

                // UI আপডেট (অ্যাডমিনের স্ট্যাটাস কী অনুযায়ী)
                const config = statusConfig[data.status] || statusConfig["pending"];
                document.getElementById('statusIcon').innerText = config.icon;
                document.getElementById('trackMessage').innerText = config.msg;
                document.getElementById('stepCounter').innerText = `ধাপ: ${config.step}`;
                document.getElementById('progressBar').style.width = config.progress + "%";
                document.getElementById('orderIdDisplay').innerText = `ID: #${orderId.slice(-6).toUpperCase()}`;

                // ইনভয়েস লজিক
                const invoiceShownStatuses = ["invoice_ready", "confirmed", "on_the_way", "market_reached", "shopping", "packing", "delivery", "completed"];
                if(invoiceShownStatuses.includes(data.status)) {
                    document.getElementById('invoiceBox').classList.remove('hidden');
                    const prices = data.itemPrices || {};
                    const missing = data.missingItems || [];
                    
                    let itemsHtml = "";
                    data.items.forEach(item => {
                        itemsHtml += `
                            <div class="flex justify-between border-b border-gray-100 pb-1 py-1">
                                <span>${item}</span><span class="brand-green font-bold">৳${prices[item] || 0}</span>
                            </div>`;
                    });

                    missing.forEach(item => {
                        itemsHtml += `
                            <div class="flex justify-between border-b border-red-50 pb-1 bg-red-50/20 px-2 py-1 rounded">
                                <span class="text-red-400 line-through italic">${item}</span>
                                <span class="text-[9px] text-red-500 font-bold uppercase">বাদ গেছে</span>
                            </div>`;
                    });
                    document.getElementById('invoiceItemsDisplay').innerHTML = itemsHtml;

                    let sub = 0;
                    data.items.forEach(item => sub += (parseFloat(prices[item]) || 0));
                    const disc = data.discount || 0;
                    const del = data.deliveryCharge || 70;
                    const plat = data.platformFee || 20;

                    document.getElementById('subTotalDisplay').innerText = `৳${sub}`;
                    document.getElementById('delChargeDisplay').innerText = `৳${del}`;
                    document.getElementById('platFeeDisplay').innerText = `৳${plat}`;
                    
                    if(disc > 0) {
                        document.getElementById('discountRow').classList.remove('hidden');
                        document.getElementById('discountDisplay').innerText = `-৳${disc}`;
                    } else {
                        document.getElementById('discountRow').classList.add('hidden');
                    }
                    
                    document.getElementById('grandTotalDisplay').innerText = `৳${(sub - disc) + del + plat}`;

                    if(data.status === "invoice_ready" && !data.invoiceConfirmed) {
                        document.getElementById('confirmBox').classList.remove('hidden');
                    } else {
                        document.getElementById('confirmBox').classList.add('hidden');
                    }
                }
            });
        };

        // কুপন লজিক
        document.getElementById('applyCouponBtn').onclick = async () => {
            const id = localStorage.getItem('activeOrderId');
            const code = document.getElementById('couponInput').value.trim().toUpperCase();
            if(!code) return;
            const snap = await getDoc(doc(db, "coupons", code));
            if(snap.exists()) {
                await updateDoc(doc(db, "orders", id), { discount: snap.data().amount || 0 });
                document.getElementById('couponMsg').innerText = "সফল!";
                document.getElementById('couponMsg').style.color = "green";
            } else {
                alert("ভুল কুপন!");
            }
        };

        // ইনভয়েস কনফার্ম
        document.getElementById('confirmInvoiceBtn').onclick = async () => {
            const id = localStorage.getItem('activeOrderId');
            await updateDoc(doc(db, "orders", id), { invoiceConfirmed: true, status: "confirmed" });
            alert("ধন্যবাদ! খিদমত কনফার্ম হয়েছে।");
        };

        // নতুন বাজার
        document.getElementById('newOrderBtn').onclick = () => {
            if(confirm("নতুন বাজার করতে চাইলে আগের ট্র্যাকিং মুছে যাবে। আপনি কি নিশ্চিত?")) { 
                localStorage.removeItem('activeOrderId'); 
                location.reload(); 
            }
        };

        window.onload = initTracking;
    </script>
</body>
</html>
