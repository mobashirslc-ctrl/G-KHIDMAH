<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G KHIDMAH | আপনার বিশ্বস্ত খিদমতকারী</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .brand-green { color: #15803d; }
        .bg-brand-dark-green { background-color: #15803d; }
        .dashed-border { border-style: dashed; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <header class="bg-white shadow-sm p-4 sticky top-0 z-50 border-b border-green-100">
        <div class="max-w-md mx-auto flex items-center justify-center gap-2">
            <img src="logo.png" alt="G Khidmah" class="h-8 w-auto object-contain" onerror="this.src='https://ui-avatars.com/api/?name=G+K&background=16a34a&color=fff'">
            <h1 class="text-xl font-bold brand-green uppercase italic tracking-tighter">G KHIDMAH</h1>
        </div>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-6">
        
        <div id="orderSection" class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-gray-100 text-center">
            <dotlottie-player src="https://lottie.host/7905b29c-6237-4d6d-b89a-0726618e001a/writing_list.json" background="transparent" speed="1" style="width: 150px; height: 150px; margin: 0 auto;" loop autoplay></dotlottie-player>
            <h2 class="text-lg font-bold text-gray-800 mt-4 italic">আজ আপনার কী কী খিদমত লাগবে?</h2>
            <textarea id="orderList" rows="5" class="w-full border-2 border-green-50 p-4 rounded-3xl focus:border-green-300 outline-none text-sm font-semibold mt-4 shadow-inner" placeholder="যেমন: ৫ কেজি চাল, ১ ডজন ডিম..."></textarea>
            <button id="submitOrderBtn" class="w-full bg-brand-dark-green text-white mt-5 py-4 rounded-2xl font-bold text-lg active:scale-95 shadow-lg shadow-green-100 transition-all">
                খিদমত শুরু করুন
            </button>
        </div>

        <div id="trackingSection" class="hidden space-y-6">
            
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl text-center border border-green-100 relative overflow-hidden">
                <div id="lottieContainer" class="w-48 h-48 mx-auto flex items-center justify-center">
                    </div>
                <div class="mt-4">
                    <p class="text-[10px] uppercase tracking-[0.2em] text-green-600 font-black italic" id="stepCounter">ধাপ: ১/১০</p>
                    <h1 id="trackMessage" class="text-lg font-bold brand-green leading-tight italic font-black mt-1 uppercase">যাচাই করা হচ্ছে...</h1>
                </div>
            </div>

            <div id="invoiceBox" class="hidden bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-gray-100">
                <div class="p-6 bg-slate-50 border-b border-dashed border-gray-200 text-center relative">
                    <img src="logo.png" alt="Logo" class="h-10 mx-auto mb-2 opacity-80" onerror="this.style.display='none'">
                    <h3 class="text-sm font-black brand-green uppercase tracking-tighter italic">অফিসিয়াল খিদমত রশিদ</h3>
                    <p class="text-[9px] text-gray-400 uppercase tracking-widest mt-1" id="orderIdDisplay">ID: #000000</p>
                    <div id="paymentStatus" class="absolute top-4 right-4 text-[9px] font-black px-2 py-1 rounded bg-red-100 text-red-600 uppercase">Unpaid</div>
                </div>

                <div class="p-6">
                    <h4 class="text-[10px] font-bold text-gray-400 uppercase mb-4 tracking-widest">পণ্যের তালিকা:</h4>
                    <div id="invoiceItemsDisplay" class="space-y-3">
                        </div>
                </div>

                <div class="px-6 py-5 bg-green-50/30 border-t border-b border-dashed border-green-100 space-y-2">
                    <div class="flex justify-between text-xs font-semibold text-gray-500">
                        <span>পণ্যের মোট দাম:</span>
                        <span id="subTotalDisplay">৳০</span>
                    </div>
                    <div class="flex justify-between text-xs font-semibold text-gray-500">
                        <span>ডেলিভারি চার্জ:</span>
                        <span id="delChargeDisplay">৳০</span>
                    </div>
                    <div class="flex justify-between text-xs font-semibold text-gray-500">
                        <span>প্ল্যাটফর্ম ফি:</span>
                        <span id="platFeeDisplay">৳০</span>
                    </div>
                    <div id="discountRow" class="hidden flex justify-between text-xs font-bold text-green-600">
                        <span>কুপন ডিসকাউন্ট:</span>
                        <span id="discountDisplay">-৳০</span>
                    </div>
                </div>

                <div id="couponArea" class="p-4 bg-white border-b border-gray-50">
                    <div class="flex gap-2">
                        <input type="text" id="couponInput" placeholder="কুপন কোড" class="flex-1 text-[10px] border border-gray-200 p-2 rounded-xl outline-none focus:border-green-500 uppercase font-bold">
                        <button id="applyCouponBtn" class="bg-gray-800 text-white text-[10px] px-4 py-2 rounded-xl font-bold uppercase active:scale-95 transition-all">Apply</button>
                    </div>
                    <p id="couponMsg" class="text-[9px] mt-1 hidden"></p>
                </div>

                <div class="p-6 bg-white flex justify-between items-end">
                    <div>
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-tighter">সর্বমোট প্রদেয় বিল:</p>
                        <h2 id="grandTotalDisplay" class="text-4xl font-black brand-green tracking-tighter">৳০</h2>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-gray-400 italic">খিদমত শেষে নগদ<br>পরিশোধযোগ্য।</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ১০টি MNC স্ট্যান্ডার্ড স্ট্যাটাস কনফিগ (Foodpanda Style)
        const statusConfig = {
            "pending": { step: "১/১০", msg: "আপনার ফর্দটি আমরা পেয়েছি।", anim: "https://lottie.host/9f50e82c-6337-4d6d-b89a-0726618e001a/checking_invoice.json" },
            "verifying": { step: "২/১০", msg: "তালিকা যাচাই করা হচ্ছে...", anim: "https://lottie.host/c5c8a324-4f0e-43f6-938b-038c35d90987/verifying.json" },
            "invoice_ready": { step: "৩/১০", msg: "ইনভয়েস রেডি। চেক করে দেখুন।", anim: "https://lottie.host/86c6242c-2384-4861-a537-88544a04588f/invoice_ready.json" },
            "finding_assistant": { step: "৪/১০", msg: "সহকারী খোঁজা হচ্ছে...", anim: "https://lottie.host/3138b29c-850d-400d-9b0d-520e7df5d996/searching.json" },
            "assistant_assigned": { step: "৫/১০", msg: "সহকারী দোকানের পথে রওয়ানা হয়েছেন।", anim: "https://lottie.host/7e04b081-424d-446a-8b83-933c16a8d626/walking_bag.json" },
            "at_store": { step: "৬/১০", msg: "সহকারী দোকানে পৌঁছেছেন।", anim: "https://lottie.host/a6162383-7c9c-4822-832f-7649d038e3e4/store.json" },
            "shopping": { step: "৭/১০", msg: "আপনার বাজার কেনা হচ্ছে...", anim: "https://lottie.host/91b702ec-24e0-47b7-8495-257a1240c313/shopping_cart.json" },
            "packing": { step: "৮/১০", msg: "বাজার প্যাকিং করা হচ্ছে।", anim: "https://lottie.host/f7468164-839e-43f1-b1e7-578d38769395/packing.json" },
            "delivery_started": { step: "৯/১০", msg: "সহকারী আপনার ঠিকানার দিকে আসছেন।", anim: "https://lottie.host/6d2c499c-e3bc-467a-bc12-8874136e65a0/delivery_scooter.json" },
            "at_location": { step: "১০/১০", msg: "সহকারী বাসার নিচে। বাজার বুঝে নিন।", anim: "https://lottie.host/ec71c53e-360e-4375-926e-441617300c41/arrived.json" },
            "completed": { step: "সফল", msg: "খিদমতটি সম্পন্ন হয়েছে। ধন্যবাদ!", anim: "https://lottie.host/703666d9-373b-4835-b82f-87d8120e360f/success.json" }
        };

        // অর্ডার সাবমিট
        document.getElementById('submitOrderBtn').addEventListener('click', async () => {
            const listText = document.getElementById('orderList').value;
            if(!listText.trim()) return alert("ফর্দ লিখুন");

            try {
                const docRef = await addDoc(collection(db, "orders"), {
                    items: listText.split('\n').filter(i => i.trim() !== ""),
                    status: "pending",
                    createdAt: serverTimestamp(),
                    subTotal: 0,
                    discount: 0,
                    deliveryCharge: 50,
                    platformFee: 20
                });
                localStorage.setItem('activeOrderId', docRef.id);
                initTracking();
            } catch (e) { alert("Error!"); }
        });

        // ট্র্যাকিং এবং ইনভয়েস লজিক
        const initTracking = () => {
            const orderId = localStorage.getItem('activeOrderId');
            if(!orderId) return;

            document.getElementById('orderSection').classList.add('hidden');
            document.getElementById('trackingSection').classList.remove('hidden');

            onSnapshot(doc(db, "orders", orderId), (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.data();
                    const config = statusConfig[data.status] || statusConfig["pending"];
                    
                    document.getElementById('trackMessage').innerText = config.msg;
                    document.getElementById('stepCounter').innerText = `ধাপ: ${config.step}`;
                    document.getElementById('orderIdDisplay').innerText = `ID: #${orderId.slice(-6).toUpperCase()}`;

                    // MNC Animation Logic: নতুন স্ট্যাটাস এলে ফ্রেশ করে অ্যানিমেশন রেন্ডার হবে
                    const container = document.getElementById('lottieContainer');
                    if (container.dataset.status !== data.status) {
                        container.innerHTML = `<dotlottie-player src="${config.anim}" background="transparent" speed="1" style="width: 200px; height: 200px;" loop autoplay></dotlottie-player>`;
                        container.dataset.status = data.status;
                    }

                    // ফুল ইনভয়েস লজিক (যখন স্ট্যাটাস invoice_ready বা তার বেশি)
                    if(!["pending", "verifying"].includes(data.status)) {
                        document.getElementById('invoiceBox').classList.remove('hidden');
                        
                        const sub = data.subTotal || 0;
                        const dCharge = data.deliveryCharge || 0;
                        const pFee = data.platformFee || 0;
                        const disc = data.discount || 0;
                        const total = (sub + dCharge + pFee) - disc;

                        document.getElementById('subTotalDisplay').innerText = `৳${sub}`;
                        document.getElementById('delChargeDisplay').innerText = `৳${dCharge}`;
                        document.getElementById('platFeeDisplay').innerText = `৳${pFee}`;
                        document.getElementById('grandTotalDisplay').innerText = `৳${total}`;

                        if(disc > 0) {
                            document.getElementById('discountRow').classList.remove('hidden');
                            document.getElementById('discountDisplay').innerText = `-৳${disc}`;
                        }

                        // ইন্ডিভিজুয়াল আইটেম লিস্ট
                        const prices = data.itemPrices || {};
                        document.getElementById('invoiceItemsDisplay').innerHTML = data.items.map(item => `
                            <div class="flex justify-between items-center text-xs font-bold italic">
                                <span class="text-gray-600">${item}</span>
                                <span class="brand-green">৳${prices[item] || '...'}</span>
                            </div>
                        `).join('');

                        // পেমেন্ট স্ট্যাটাস আপডেট
                        if(!["invoice_ready", "finding_assistant"].includes(data.status)) {
                            document.getElementById('paymentStatus').innerText = "PAID";
                            document.getElementById('paymentStatus').className = "absolute top-4 right-4 text-[9px] font-black px-2 py-1 rounded bg-green-100 text-green-600 uppercase";
                            document.getElementById('couponArea').classList.add('hidden');
                        }
                    }

                    if(data.status === "completed") {
                        setTimeout(() => { localStorage.removeItem('activeOrderId'); location.reload(); }, 15000);
                    }
                }
            });
        };

        // কুপন লজিক
        document.getElementById('applyCouponBtn').addEventListener('click', async () => {
            const code = document.getElementById('couponInput').value.trim().toUpperCase();
            const orderId = localStorage.getItem('activeOrderId');
            const msg = document.getElementById('couponMsg');

            try {
                const couponRef = doc(db, "coupons", code);
                const couponSnap = await getDoc(couponRef);
                if (couponSnap.exists()) {
                    await updateDoc(doc(db, "orders", orderId), { discount: couponSnap.data().amount });
                    msg.innerText = "কুপন সফল!"; msg.className = "text-[9px] mt-1 text-green-600 font-bold block";
                } else {
                    msg.innerText = "ভুল কোড!"; msg.className = "text-[9px] mt-1 text-red-500 font-bold block";
                }
            } catch (e) { console.log(e); }
        });

        window.addEventListener('load', initTracking);
    </script>
</body>
</html>
