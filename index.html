<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | Quick Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5 font-sans">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-xl mt-10">
        <h1 class="text-3xl font-extrabold text-center text-blue-700 mb-2">G KHIDMAH</h1>
        <p class="text-center text-gray-500 text-sm mb-6 font-medium italic">Your Personal Shopping Assistant</p>
        
        <div class="space-y-4">
            <label class="block text-gray-700 font-bold mb-1">আপনার বাজারের তালিকা লিখুন:</label>
            <textarea id="orderList" rows="6" 
                class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all" 
                placeholder="১. চাল ৫ কেজি&#10;২. সয়াবিন তেল ২ লিটার..."></textarea>
            
            <button id="submitBtn" onclick="submitToFirebase()" 
                class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-200">
                অর্ডার কনফার্ম করুন
            </button>
        </div>
        
        <div id="status" class="mt-6 p-4 rounded-xl text-center hidden"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Submit Function
        window.submitToFirebase = async () => {
            const listText = document.getElementById('orderList').value;
            const btn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');

            if(listText.trim() === "") {
                alert("দয়া করে কিছু লিখুন!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "প্রসেসিং হচ্ছে...";

            try {
                // Formatting data for Admin
                const lines = listText.split('\n').filter(l => l.trim() !== "");
                
                await addDoc(collection(db, "orders"), {
                    items: lines,
                    status: "pending",
                    createdAt: serverTimestamp(),
                    customerName: "Guest User", // Pore Login system add korbo
                    totalBill: 0
                });

                statusDiv.innerText = "ধন্যবাদ! আপনার অর্ডারটি অ্যাডমিনের কাছে পাঠানো হয়েছে।";
                statusDiv.className = "mt-6 p-4 rounded-xl text-center bg-green-100 text-green-700 font-bold block";
                document.getElementById('orderList').value = "";
            } catch (e) {
                console.error("Error adding document: ", e);
                statusDiv.innerText = "দুঃখিত, আবার চেষ্টা করুন।";
                statusDiv.className = "mt-6 p-4 rounded-xl text-center bg-red-100 text-red-700 font-bold block";
            } finally {
                btn.disabled = false;
                btn.innerText = "অর্ডার কনফার্ম করুন";
            }
        };
    </script>
</body>
</html>
