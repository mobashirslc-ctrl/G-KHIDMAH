<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G KHIDMAH | কাস্টমার প্যানেল</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .brand-green { color: #15803d; }
        .bg-brand-dark-green { background-color: #15803d; }
        #lottieContainer dotlottie-player { width: 250px; height: 250px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <header class="bg-white shadow-sm p-4 sticky top-0 z-50 border-b border-green-100 flex items-center justify-center gap-2">
        <img src="logo.png" alt="Logo" class="h-8 w-auto" onerror="this.src='https://ui-avatars.com/api/?name=G+K&background=16a34a&color=fff'">
        <h1 class="text-xl font-bold brand-green uppercase italic tracking-tighter">G KHIDMAH</h1>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-6">
        
        <div id="orderSection" class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-gray-100">
            <div class="text-center mb-6">
                <div class="w-32 h-32 mx-auto">
                    <dotlottie-player src="https://lottie.host/7905b29c-6237-4d6d-b89a-0726618e001a/writing_list.json" background="transparent" speed="1" loop autoplay></dotlottie-player>
                </div>
                <h2 class="text-lg font-bold text-gray-800 italic mt-2">আপনার তথ্য ও ফর্দ দিন</h2>
            </div>
            
            <div class="space-y-3">
                <input type="text" id="custName" placeholder="আপনার নাম" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-green-200 outline-none text-sm font-bold">
                <input type="tel" id="custPhone" placeholder="মোবাইল নাম্বার" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-green-200 outline-none text-sm font-bold">
                <input type="text" id="custAddress" placeholder="বাসার পূর্ণ ঠিকানা" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-green-200 outline-none text-sm font-bold">
                <textarea id="orderList" rows="4" class="w-full border-2 border-green-50 p-4 rounded-3xl focus:border-green-300 outline-none text-sm font-semibold shadow-inner" placeholder="বাজারের ফর্দ লিখুন..."></textarea>
            </div>

            <button id="submitOrderBtn" class="w-full bg-brand-dark-green text-white mt-5 py-4 rounded-2xl font-bold text-lg active:scale-95 shadow-lg transition-all">
                খিদমত শুরু করুন
            </button>
        </div>

        <div id="trackingSection" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl text-center border border-green-100">
                <div id="lottieContainer" class="flex justify-center items-center min-h-[250px]">
                    </div>
                <div class="mt-2">
                    <p class="text-[10px] uppercase tracking-[0.2em] text-green-600 font-black italic" id="stepCounter">ধাপ: ১/১০</p>
                    <h1 id="trackMessage" class="text-lg font-bold brand-green leading-tight italic font-black mt-1 uppercase">যাচাই করা হচ্ছে...</h1>
                </div>
            </div>

            <div id="couponSection" class="hidden bg-white p-6 rounded-[2rem] shadow-xl border border-dashed border-green-200">
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-3 italic">ডিসকাউন্ট কুপন আছে?</p>
                <div class="flex gap-2">
                    <input type="text" id="couponInput" placeholder="কোড" class="flex-1 p-3 rounded-xl bg-slate-50 border-0 text-sm font-bold uppercase outline-none focus:ring-2 focus:ring-green-200">
                    <button id="applyCouponBtn" class="bg-green-700 text-white px-6 rounded-xl font-bold text-xs active:scale-95">Apply</button>
                </div>
            </div>

            <div id="invoiceBox" class="hidden bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-gray-100">
                <div class="p-6 bg-slate-50 border-b border-dashed border-gray-200 text-center relative">
                    <img src="logo.png" alt="Logo" class="h-10 mx-auto mb-2" onerror="this.style.display='none'">
                    <h3 class="text-sm font-black brand-green uppercase tracking-tighter italic">অফিসিয়াল খিদমত রশিদ</h3>
                    <p class="text-[9px] text-gray-400 uppercase tracking-widest mt-1" id="orderIdDisplay"></p>
                </div>

                <div class="p-6">
                    <h4 class="text-[10px] font-bold text-gray-400 uppercase mb-4 tracking-widest italic">পণ্যের তালিকা ও মূল্য:</h4>
                    <div id="invoiceItemsDisplay" class="space-y-4 font-semibold text-sm"></div>
                </div>

                <div class="px-6 py-5 bg-green-50/30 border-t border-b border-dashed border-green-100 space-y-2">
                    <div class="flex justify-between text-xs font-bold text-gray-500"><span>পণ্যের মোট দাম:</span><span id="subTotalDisplay">৳০</span></div>
                    <div class="flex justify-between text-xs font-bold text-gray-500"><span>ডেলিভারি চার্জ:</span><span id="delChargeDisplay">৳০</span></div>
                    <div class="flex justify-between text-xs font-bold text-gray-500"><span>প্ল্যাটফর্ম ফি:</span><span id="platFeeDisplay">৳০</span></div>
                    <div id="discountRow" class="hidden flex justify-between text-xs font-bold text-green-600 border-t border-green-100 pt-2"><span>কুপন ডিসকাউন্ট:</span><span id="discountDisplay">-৳০</span></div>
                    <div class="pt-4 border-t border-green-100 flex justify-between items-center">
                        <span class="text-xs font-black uppercase text-gray-400">সর্বমোট বিল:</span>
                        <span id="grandTotalDisplay" class="text-4xl font-black brand-green tracking-tighter">৳০</span>
                    </div>
                </div>
                <div class="p-4 text-center">
                    <p class="text-[9px] text-gray-400 italic font-bold">খিদমত শেষে নগদ পরিশোধযোগ্য।</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const statusConfig = {
            "pending": { step: "১/১০", msg: "ফর্দ পেয়েছি।", anim: "https://lottie.host/9f50e82c-6337-4d6d-b89a-0726618e001a/X3N5F3GZ6W.json" },
            "verifying": { step: "২/১০", msg: "যাচাই চলছে...", anim: "https://lottie.host/9f50e82c-6337-4d6d-b89a-0726618e001a/X3N5F3GZ6W.json" },
            "invoice_ready": { step: "৩/১০", msg: "ইনভয়েস রেডি।", anim: "https://lottie.host/86c6242c-2384-4861-a537-88544a04588f/M9GvS9F1Qp.json" },
            "finding_assistant": { step: "৪/১০", msg: "সহকারী খুঁজছি...", anim: "https://lottie.host/3138b29c-850d-400d-9b0d-520e7df5d996/L8k5B0Z9Wq.json" },
            "assistant_assigned": { step: "৫/১০", msg: "সহকারী যুক্ত হয়েছে।", anim: "https://lottie.host/7e04b081-424d-446a-8b83-933c16a8d626/UuX7fU6sQp.json" },
            "at_store": { step: "৬/১০", msg: "সহকারী দোকানে।", anim: "https://lottie.host/a6162383-7c9c-4822-832f-7649d038e3e4/J9s2L0G5Wq.json" },
            "shopping": { step: "৭/১০", msg: "বাজার কেনা হচ্ছে...", anim: "https://lottie.host/91b702ec-24e0-47b7-8495-257a1240c313/f5W9u3M2Lp.json" },
            "packing": { step: "৮/১০", msg: "প্যাকিং চলছে...", anim: "https://lottie.host/f7468164-839e-43f1-b1e7-578d38769395/zL9p3Q6wXm.json" },
            "delivery_started": { step: "৯/১০", msg: "সহকারী আসছেন...", anim: "https://lottie.host/6d2c499c-e3bc-467a-bc12-8874136e65a0/S9w2M3Xp4L.json" },
            "at_location": { step: "১০/১০", msg: "সহকারী বাসার নিচে।", anim: "https://lottie.host/ec71c53e-360e-4375-926e-441617300c41/P9L0m2Wq9p.json" },
            "completed": { step: "সফল", msg: "ধন্যবাদ!", anim: "https://lottie.host/703666d9-373b-4835-b82f-87d8120e360f/R9f2Z9Wq9p.json" }
        };

        document.getElementById('submitOrderBtn').addEventListener('click', async () => {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const addr = document.getElementById('custAddress').value.trim();
            const list = document.getElementById('orderList').value;

            if(!name || !phone || !addr || !list.trim()) return alert("সবগুলো ঘর পূরণ করুন");

            try {
                // Sending customer data to Firebase
                const docRef = await addDoc(collection(db, "orders"), {
                    customerName: name,
                    customerPhone: phone,
                    customerAddress: addr,
                    items: list.split('\n').filter(i => i.trim() !== ""),
                    status: "pending",
                    createdAt: serverTimestamp(),
                    subTotal: 0,
                    deliveryCharge: 70,
                    platformFee: 20,
                    discount: 0,
                    itemPrices: {},
                    itemNotes: {}
                });
                localStorage.setItem('activeOrderId', docRef.id);
                initTracking();
            } catch (e) { alert("Error connecting to database!"); }
        });

        // Coupon Logic
        document.getElementById('applyCouponBtn').addEventListener('click', async () => {
            const code = document.getElementById('couponInput').value.trim().toUpperCase();
            const orderId = localStorage.getItem('activeOrderId');
            if(!code) return alert("কুপন কোড দিন");
            try {
                const couponDoc = await getDoc(doc(db, "coupons", code));
                if (couponDoc.exists()) {
                    await updateDoc(doc(db, "orders", orderId), { discount: couponDoc.data().amount });
                    alert("কুপন সফল!");
                } else { alert("ভুল কুপন!"); }
            } catch (e) { alert("Error applying coupon"); }
        });

        const initTracking = () => {
            const orderId = localStorage.getItem('activeOrderId');
            if(!orderId) return;

            document.getElementById('orderSection').classList.add('hidden');
            document.getElementById('trackingSection').classList.remove('hidden');

            onSnapshot(doc(db, "orders", orderId), (snapshot) => {
                const data = snapshot.data();
                if (!data) return;

                // Fixed Animation Logic with dotlottie-player
                const config = statusConfig[data.status] || statusConfig["pending"];
                const container = document.getElementById('lottieContainer');
                
                if (container.dataset.status !== data.status) {
                    container.innerHTML = `<dotlottie-player src="${config.anim}" background="transparent" speed="1" loop autoplay></dotlottie-player>`;
                    container.dataset.status = data.status;
                }
                
                document.getElementById('trackMessage').innerText = config.msg;
                document.getElementById('stepCounter').innerText = `ধাপ: ${config.step}`;
                document.getElementById('orderIdDisplay').innerText = `ID: #${orderId.slice(-6).toUpperCase()}`;

                if(data.status !== "pending" && data.status !== "verifying") {
                    document.getElementById('invoiceBox').classList.remove('hidden');
                    document.getElementById('couponSection').classList.remove('hidden');
                    
                    const prices = data.itemPrices || {};
                    const notes = data.itemNotes || {};
                    
                    document.getElementById('invoiceItemsDisplay').innerHTML = data.items.map(item => {
                        const isMissing = notes[item] === "Missing";
                        return `
                            <div class="flex justify-between items-start border-b border-gray-50 pb-2 italic">
                                <div>
                                    <p class="${isMissing ? 'text-red-400 line-through' : 'text-gray-700'}">${item}</p>
                                    ${notes[item] && !isMissing ? `<p class="text-[9px] text-orange-500 font-black">${notes[item]}</p>` : ''}
                                    ${isMissing ? `<p class="text-[9px] text-red-500 font-black">পাওয়া যায়নি</p>` : ''}
                                </div>
                                <span class="brand-green">৳${prices[item] || 0}</span>
                            </div>
                        `;
                    }).join('');

                    const total = (data.subTotal || 0) + (data.deliveryCharge || 0) + (data.platformFee || 0) - (data.discount || 0);
                    document.getElementById('subTotalDisplay').innerText = `৳${data.subTotal || 0}`;
                    document.getElementById('delChargeDisplay').innerText = `৳${data.deliveryCharge || 0}`;
                    document.getElementById('platFeeDisplay').innerText = `৳${data.platformFee || 0}`;
                    document.getElementById('grandTotalDisplay').innerText = `৳${total}`;

                    if(data.discount > 0) {
                        document.getElementById('discountRow').classList.remove('hidden');
                        document.getElementById('discountDisplay').innerText = `-৳${data.discount}`;
                    }
                }

                if(data.status === "completed") {
                    setTimeout(() => { localStorage.removeItem('activeOrderId'); location.reload(); }, 30000);
                }
            });
        };

        window.addEventListener('load', initTracking);
    </script>
</body>
</html>
