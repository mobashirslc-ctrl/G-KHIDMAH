<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G KHIDMAH | আপনার বিশ্বস্ত খিদমতকারী</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .animate-bounce-in { animation: bounceIn 0.5s ease-out; }
        @keyframes bounceIn {
            0% { transform: scale(0.9); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-white shadow-sm p-4 text-center border-b border-blue-100">
        <img src="logo.png" alt="G-KHIDMAH Logo" class="h-20 mx-auto mb-2 drop-shadow-md">
        <h1 class="text-2xl font-bold text-blue-700">G KHIDMAH</h1>
        <p class="text-xs text-gray-500 italic font-medium">আপনার ভরসা, আমাদের আন্তরিকতা</p>
    </header>

    <div class="max-w-md mx-auto p-4 pb-20 space-y-6">
        
        <div id="orderSection" class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100 mt-4">
            <h2 class="text-lg font-bold text-gray-800 mb-4 text-center">আজ আপনার কী কী লাগবে?</h2>
            <textarea id="orderList" rows="5" 
                class="w-full border-2 border-blue-50 p-4 rounded-2xl focus:border-blue-300 focus:ring-0 outline-none transition-all placeholder:text-gray-300 text-gray-700" 
                placeholder="যেমন: ৫ কেজি চাল, ২ লিটার তেল..."></textarea>
            
            <button onclick="placeOrder()" 
                class="w-full bg-blue-600 text-white mt-4 py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-100">
                খিদমত শুরু করুন
            </button>
        </div>

        <div id="trackingSection" class="hidden space-y-6 animate-bounce-in">
            
            <div class="bg-gradient-to-r from-blue-700 to-blue-500 text-white p-6 rounded-3xl shadow-xl text-center relative overflow-hidden">
                <div class="absolute top-0 right-0 p-2 opacity-10">
                    <svg width="60" height="60" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
                </div>
                <p class="text-[10px] uppercase tracking-widest opacity-80 mb-2 font-bold">অর্ডারের বর্তমান অবস্থা</p>
                <h1 id="trackMessage" class="text-lg font-bold leading-tight italic">তালিকা যাচাই করা হচ্ছে...</h1>
            </div>

            <div id="invoiceBox" class="hidden bg-white rounded-3xl shadow-2xl overflow-hidden border border-blue-100 border-t-8 border-t-blue-700">
                <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-blue-50/50">
                    <h3 class="text-sm font-black text-blue-900 uppercase tracking-tighter">ডিজিটাল রশিদ (Invoice)</h3>
                    <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold">PAID/UNPAID</span>
                </div>
                
                <div class="p-6 space-y-4" id="invoiceItemsDisplay">
                    </div>

                <div class="p-6 bg-slate-50 border-t border-dashed border-gray-200 space-y-3">
                    <div class="flex justify-between text-gray-500 text-sm">
                        <span>পণ্যের মোট বাজারমূল্য:</span>
                        <span id="displaySubtotal" class="font-bold text-gray-800 tracking-wide">৳০</span>
                    </div>
                    <div class="flex justify-between text-gray-500 text-sm">
                        <span>ডেলিভারি চার্জ:</span>
                        <span id="displayDelivery" class="font-bold text-gray-800 tracking-wide">৳০</span>
                    </div>
                    <div class="flex justify-between text-gray-500 text-sm">
                        <span>প্ল্যাটফর্ম ফি:</span>
                        <span id="displayPlatform" class="font-bold text-gray-800 tracking-wide">৳০</span>
                    </div>
                    <div class="pt-4 mt-2 border-t-2 border-blue-200 flex justify-between items-end">
                        <div>
                            <span class="text-[10px] font-bold text-blue-400 uppercase block leading-none mb-1">Total Payable</span>
                            <span class="text-lg font-black text-blue-900 leading-none">মোট প্রদেয় বিল:</span>
                        </div>
                        <span id="displayTotal" class="text-4xl font-black text-blue-700 tracking-tighter">৳০</span>
                    </div>
                </div>

                <div class="p-4 bg-white">
                    <button class="w-full bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-green-100 flex items-center justify-center gap-2">
                        <span>অর্ডার নিশ্চিত করুন</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    </button>
                </div>
            </div>

            <div class="flex justify-center gap-2 py-4" id="progressDots">
                <div class="w-2 h-2 rounded-full bg-blue-600 animate-pulse"></div>
                <div class="w-2 h-2 rounded-full bg-blue-200"></div>
                <div class="w-2 h-2 rounded-full bg-blue-200"></div>
                <div class="w-2 h-2 rounded-full bg-blue-200"></div>
            </div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, limit, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
        authDomain: "gkhidmah-8636b.firebaseapp.com",
        projectId: "gkhidmah-8636b",
        storageBucket: "gkhidmah-8636b.firebasestorage.app",
        messagingSenderId: "780745438049",
        appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentOrderData = null; // গ্লোবাল ডাটা স্টোর
    let discountAmount = 0;

    const statusMessages = {
        "pending": "আমরা আপনার বাজারের ফর্দটি পেয়েছি। একটু অপেক্ষা করুন, আমরা যাচাই করছি।",
        "verifying": "আপনার তালিকাটি আমরা দেখেছি। বর্তমান বাজারদর অনুযায়ী একটি খসড়া রশিদ তৈরি করা হচ্ছে।",
        "invoice_ready": "বাজারমূল্য ভিত্তিক আপনার ইনভয়েসটি তৈরি করা হয়েছে। দয়া করে নিচে চেক করে কনফার্ম করুন।",
        "finding_assistant": "ধন্যবাদ! আমরা আপনার জন্য একজন দক্ষ সহকারী (Assistant) খুঁজছি।",
        "assistant_assigned": "সহকারীকে দায়িত্ব দেওয়া হয়েছে। তিনি বাজারের দিকে যাচ্ছেন।",
        "shopping": "আপনার কেনাকাটা চলছে। একটু সময় দিন।",
        "packing": "কেনাকাটা শেষ! আমরা এখন সবকিছু প্যাকিং করছি।",
        "delivery_started": "সহকারী আপনার বাসার দিকে রওয়ানা দিয়েছেন।",
        "at_location": "সহকারী আপনার বাসার নিচে পৌঁছেছেন। অনুগ্রহ করে বুঝে নিন।",
        "completed": "খিদমতটি সফল হয়েছে। আমাদের পাশে থাকার জন্য ধন্যবাদ!"
    };

    window.placeOrder = async () => {
        const listText = document.getElementById('orderList').value;
        if(!listText.trim()) return alert("দয়া করে আপনার ফর্দটি লিখুন।");
        const items = listText.split('\n').filter(i => i.trim() !== "");

        try {
            const docRef = await addDoc(collection(db, "orders"), {
                items: items,
                itemPrices: {},
                status: "pending",
                createdAt: serverTimestamp(),
                subTotal: 0, deliveryCharge: 0, platformFee: 0, totalBill: 0
            });
            localStorage.setItem('activeOrderId', docRef.id);
            initTracking();
        } catch (e) { alert("আবার চেষ্টা করুন।"); }
    };

    function initTracking() {
        const orderId = localStorage.getItem('activeOrderId');
        if(!orderId) return;

        document.getElementById('orderSection').classList.add('hidden');
        document.getElementById('trackingSection').classList.remove('hidden');

        // এখানে আমরা রিয়েল-টাইম ডাটা ধরছি
        onSnapshot(doc(db, "orders", orderId), (snapshot) => {
            if (snapshot.exists()) {
                currentOrderData = snapshot.data();
                updateUI(currentOrderData);
            }
        });
    }

    function updateUI(data) {
        document.getElementById('trackMessage').innerText = statusMessages[data.status] || "প্রসেসিং...";
        
        // ইনভয়েস দেখানো
        if(data.status !== "pending" && data.status !== "verifying") {
            const box = document.getElementById('invoiceBox');
            box.classList.remove('hidden');
            
            // ক্যালকুলেশন এবং আইটেম লিস্ট দেখানো
            const prices = data.itemPrices || {};
            const itemsHtml = data.items.map(item => `
                <div class="flex justify-between items-center border-b border-gray-50 pb-1">
                    <span class="text-gray-700 font-medium text-sm">${item}</span>
                    <span class="text-blue-900 font-black text-sm">৳${prices[item] || '...'}</span>
                </div>
            `).join('');
            
            document.getElementById('invoiceItemsDisplay').innerHTML = itemsHtml;
            document.getElementById('displaySubtotal').innerText = `৳${data.subTotal}`;
            document.getElementById('displayCharges').innerText = `৳${(data.deliveryCharge || 0) + (data.platformFee || 0)}`;
            
            calculateFinalTotal();
        }
    }

    // কুপন লজিক
    window.applyCoupon = () => {
        const code = document.getElementById('couponInput').value.trim().toUpperCase();
        const msg = document.getElementById('couponMsg');
        const discRow = document.getElementById('discountRow');
        
        if (code === "KHIDMAH50") {
            discountAmount = 50;
            msg.innerText = "অভিনন্দন! ৫০ টাকা ডিসকাউন্ট যুক্ত হয়েছে।";
            msg.className = "text-[10px] mt-1 text-green-600 block";
            discRow.classList.remove('hidden');
            calculateFinalTotal();
        } else {
            alert("দুঃখিত, কুপনটি সঠিক নয়।");
        }
    };

    function calculateFinalTotal() {
        if (!currentOrderData) return;
        const sub = currentOrderData.subTotal || 0;
        const extra = (currentOrderData.deliveryCharge || 0) + (currentOrderData.platformFee || 0);
        const finalTotal = (sub + extra) - discountAmount;
        
        document.getElementById('displayDiscount').innerText = `৳${discountAmount}`;
        document.getElementById('displayTotal').innerText = `৳${finalTotal}`;
    }

    // কনফার্ম বাটন ফাংশন
    window.confirmOrderPayment = async () => {
        const orderId = localStorage.getItem('activeOrderId');
        const btn = document.getElementById('finalConfirmBtn');
        if (!orderId) return;

        try {
            btn.innerText = "প্রসেসিং হচ্ছে...";
            btn.disabled = true;

            await updateDoc(doc(db, "orders", orderId), {
                status: "finding_assistant",
                couponApplied: discountAmount > 0 ? true : false,
                finalPayable: document.getElementById('displayTotal').innerText.replace('৳', '')
            });

            btn.innerHTML = "অর্ডার নিশ্চিত হয়েছে! ✓";
            btn.classList.replace('bg-green-600', 'bg-blue-600');
            alert("অর্ডার নিশ্চিত হয়েছে! আমরা দ্রুত ব্যবস্থা নিচ্ছি।");
        } catch (e) { alert("ত্রুটি হয়েছে।"); btn.disabled = false; }
    };

    window.onload = initTracking;
</script>

</body>
</html>
