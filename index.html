<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G KHIDMAH | অল-ইন-ওয়ান সার্ভিস</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .brand-green { color: #15803d; }
        .bg-brand-dark-green { background-color: #15803d; }
        .progress-glow { box-shadow: 0 0 10px rgba(22, 163, 74, 0.5); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <audio id="notifySound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <header class="bg-white shadow-sm p-4 sticky top-0 z-50 border-b border-green-100 flex items-center justify-between px-6">
        <div class="flex items-center gap-2">
            <img src="logo.png" alt="Logo" class="h-8 w-auto" onerror="this.src='https://ui-avatars.com/api/?name=G+K&background=16a34a&color=fff'">
            <h1 class="text-xl font-bold brand-green uppercase italic tracking-tighter">G KHIDMAH</h1>
        </div>
        <button id="newOrderBtn" class="hidden text-[10px] font-bold bg-red-50 text-red-600 px-4 py-2 rounded-full border border-red-100 uppercase tracking-tighter">নতুন অর্ডার</button>
    </header>

    <div class="max-w-md mx-auto p-4 space-y-6">
        
        <div id="serviceChoice" class="grid grid-cols-2 gap-4">
            <button onclick="showForm('shopping')" class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-gray-50 flex flex-col items-center justify-center hover:bg-green-50 transition-colors group">
                <div class="text-5xl mb-3 group-hover:scale-110 transition-transform">🛒</div>
                <p class="font-bold text-gray-700">বাজার সদাই</p>
            </button>
            <button onclick="showForm('service')" class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-gray-50 flex flex-col items-center justify-center hover:bg-green-50 transition-colors group">
                <div class="text-5xl mb-3 group-hover:scale-110 transition-transform">🛠️</div>
                <p class="font-bold text-gray-700">অন্যান্য খিদমত</p>
            </button>
        </div>

        <div id="orderSection" class="hidden bg-white p-6 rounded-[2.5rem] shadow-xl border border-gray-100">
            <div class="text-center mb-6">
                <div id="formEmoji" class="text-5xl mb-2">📝</div>
                <h2 id="formTitle" class="text-lg font-bold text-gray-800 italic">আপনার তথ্য ও ফর্দ দিন</h2>
            </div>
            
            <div class="space-y-3">
                <input type="text" id="custName" placeholder="আপনার নাম" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-green-200 outline-none text-sm font-bold">
                <input type="tel" id="custPhone" placeholder="মোবাইল নাম্বার" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-green-200 outline-none text-sm font-bold">
                <input type="text" id="custAddress" placeholder="বাসার পূর্ণ ঠিকানা" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-green-200 outline-none text-sm font-bold">
                
                <select id="serviceType" class="hidden w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-green-200 outline-none text-sm font-bold">
                    <option value="Plumber">প্লাম্বার (Plumber)</option>
                    <option value="Electrician">ইলেকট্রিশিয়ান (Electrician)</option>
                    <option value="Gas Cylinder">গ্যাস সিলিন্ডার (Gas Refill)</option>
                    <option value="Shift Basa">বাসা বদল (House Shifting)</option>
                    <option value="Rent Car">গাড়ি ভাড়া (Rent a Car)</option>
                    <option value="Rent Home">বাসা ভাড়া প্রয়োজন (Need Home)</option>
                    <option value="Medicine">ওষুধ ডেলিভারি (Medicine)</option>
                    <option value="Laundry">লন্ড্রি সার্ভিস (Laundry)</option>
                </select>

                <textarea id="orderList" rows="4" class="w-full border-2 border-green-50 p-4 rounded-3xl focus:border-green-300 outline-none text-sm font-semibold shadow-inner" placeholder="বিস্তারিত লিখুন..."></textarea>
            </div>

            <button id="submitOrderBtn" class="w-full bg-brand-dark-green text-white mt-5 py-4 rounded-2xl font-bold text-lg active:scale-95 shadow-lg transition-all">
                খিদমত শুরু করুন
            </button>
        </div>

        <div id="trackingSection" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center border border-green-100">
                <div id="statusIcon" class="text-7xl mb-4 animate-bounce">📋</div>
                <p class="text-[10px] uppercase tracking-[0.2em] text-green-600 font-black italic mb-2" id="stepCounter">ধাপ: ১/১০</p>
                <h1 id="trackMessage" class="text-xl font-black brand-green leading-tight italic uppercase mb-6">ফর্দ গ্রহণ করা হয়েছে...</h1>
                <div class="w-full bg-gray-100 h-4 rounded-full overflow-hidden p-1 border border-gray-50">
                    <div id="progressBar" class="bg-brand-dark-green h-full rounded-full transition-all duration-1000 progress-glow" style="width: 10%"></div>
                </div>
            </div>

            <div id="couponSection" class="hidden bg-white p-6 rounded-[2rem] shadow-xl border border-dashed border-green-200">
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-3 italic">ডিসকাউন্ট কুপন আছে?</p>
                <div class="flex gap-2">
                    <input type="text" id="couponInput" placeholder="কোড" class="flex-1 p-3 rounded-xl bg-slate-50 border-0 text-sm font-bold uppercase outline-none focus:ring-2 focus:ring-green-200">
                    <button id="applyCouponBtn" class="bg-green-700 text-white px-6 rounded-xl font-bold text-xs active:scale-95">Apply</button>
                </div>
            </div>

            <div id="invoiceBox" class="hidden bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-gray-100">
                <div class="p-6 bg-slate-50 border-b border-dashed border-gray-200 text-center relative">
                    <h3 class="text-sm font-black brand-green uppercase tracking-tighter italic">অফিসিয়াল খিদমত রশিদ</h3>
                    <p class="text-[9px] text-gray-400 uppercase tracking-widest mt-1" id="orderIdDisplay"></p>
                </div>
                <div class="p-6">
                    <h4 class="text-[10px] font-bold text-gray-400 uppercase mb-4 tracking-widest italic">বিবরণ:</h4>
                    <div id="invoiceItemsDisplay" class="space-y-4 font-semibold text-sm"></div>
                </div>
                <div class="px-6 py-5 bg-green-50/30 border-t border-b border-dashed border-green-100 space-y-2">
                    <div class="flex justify-between text-xs font-bold text-gray-500"><span>মূল বিল:</span><span id="subTotalDisplay">৳০</span></div>
                    <div class="flex justify-between text-xs font-bold text-gray-500"><span>ডেলিভারি চার্জ:</span><span id="delChargeDisplay">৳৭০</span></div>
                    <div class="flex justify-between text-xs font-bold text-gray-500"><span>প্ল্যাটফর্ম ফি:</span><span id="platFeeDisplay">৳২০</span></div>
                    <div id="discountRow" class="hidden flex justify-between text-xs font-bold text-green-600 border-t border-green-100 pt-2"><span>ডিসকাউন্ট:</span><span id="discountDisplay">-৳০</span></div>
                    <div class="pt-4 border-t border-green-100 flex justify-between items-center">
                        <span class="text-xs font-black uppercase text-gray-400">সর্বমোট বিল:</span>
                        <span id="grandTotalDisplay" class="text-4xl font-black brand-green tracking-tighter">৳০</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let lastKnownStatus = "";

        const statusConfig = {
            "pending": { step: "১/১০", msg: "অনুরোধ পেয়েছি", icon: "📋", progress: 10 },
            "verifying": { step: "২/১০", msg: "যাচাই চলছে", icon: "🔍", progress: 20 },
            "invoice_ready": { step: "৩/১০", msg: "ইনভয়েস রেডি", icon: "📄", progress: 30 },
            "finding_assistant": { step: "৪/১০", msg: "সহকারী খুঁজছি", icon: "🤝", progress: 40 },
            "assistant_assigned": { step: "৫/১০", msg: "সহকারী নিযুক্ত", icon: "✅", progress: 50 },
            "at_store": { step: "৬/১০", msg: "সহকারী দোকানে", icon: "🏪", progress: 60 },
            "shopping": { step: "৭/১০", msg: "কাজ চলছে", icon: "🛒", progress: 70 },
            "packing": { step: "৮/১০", msg: "প্রস্তুত করা হচ্ছে", icon: "📦", progress: 85 },
            "delivery_started": { step: "৯/১০", msg: "সহকারী আসছেন", icon: "🛵", progress: 95 },
            "at_location": { step: "১০/১০", msg: "আপনার বাসার নিচে", icon: "📍", progress: 100 },
            "completed": { step: "সফল", msg: "খিদমত সম্পন্ন", icon: "🎉", progress: 100 }
        };

        // ফর্ম সুইচ লজিক
        window.showForm = (type) => {
            document.getElementById('serviceChoice').classList.add('hidden');
            document.getElementById('orderSection').classList.remove('hidden');
            if(type === 'service') {
                document.getElementById('serviceType').classList.remove('hidden');
                document.getElementById('formTitle').innerText = "সার্ভিস ও ঠিকানা দিন";
                document.getElementById('formEmoji').innerText = "🛠️";
            }
        };

        // নতুন অর্ডার বাটন লজিক
        document.getElementById('newOrderBtn').addEventListener('click', () => {
            if(confirm("আপনি কি আগের ট্র্যাকিং বাদ দিয়ে নতুন অর্ডার করতে চান?")) {
                localStorage.removeItem('activeOrderId');
                location.reload();
            }
        });

        document.getElementById('submitOrderBtn').addEventListener('click', async () => {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const addr = document.getElementById('custAddress').value.trim();
            const list = document.getElementById('orderList').value.trim();
            const serviceType = document.getElementById('serviceType').value;
            const isService = !document.getElementById('serviceType').classList.contains('hidden');

            if(!name || !phone || !addr || !list) return alert("সবগুলো তথ্য দিন");

            try {
                const docRef = await addDoc(collection(db, "orders"), {
                    customerName: name, customerPhone: phone, customerAddress: addr,
                    items: list.split('\n').filter(i => i.trim() !== ""),
                    orderType: isService ? "service" : "shopping",
                    serviceCategory: isService ? serviceType : "Grocery",
                    status: "pending",
                    createdAt: serverTimestamp(),
                    subTotal: 0, deliveryCharge: 70, platformFee: 20, discount: 0,
                    itemPrices: {}, itemNotes: {}
                });
                localStorage.setItem('activeOrderId', docRef.id);
                initTracking();
            } catch (e) { alert("Connection Error!"); }
        });

        // কুপন লজিক আপনার আগের কোড থেকে
        document.getElementById('applyCouponBtn').addEventListener('click', async () => {
            const code = document.getElementById('couponInput').value.trim().toUpperCase();
            const orderId = localStorage.getItem('activeOrderId');
            if(!code) return alert("কুপন কোড দিন");
            try {
                const couponDoc = await getDoc(doc(db, "coupons", code));
                if (couponDoc.exists()) {
                    await updateDoc(doc(db, "orders", orderId), { discount: couponDoc.data().amount });
                    alert("কুপন সফল!");
                } else { alert("ভুল কুপন!"); }
            } catch (e) { alert("Error applying coupon"); }
        });

        const initTracking = () => {
            const orderId = localStorage.getItem('activeOrderId');
            if(!orderId) return;

            document.getElementById('serviceChoice').classList.add('hidden');
            document.getElementById('orderSection').classList.add('hidden');
            document.getElementById('trackingSection').classList.remove('hidden');
            document.getElementById('newOrderBtn').classList.remove('hidden');

            onSnapshot(doc(db, "orders", orderId), (snapshot) => {
                const data = snapshot.data();
                if (!data) return;

                // সাউন্ড নোটিফিকেশন লজিক
                if (lastKnownStatus !== "" && lastKnownStatus !== data.status) {
                    document.getElementById('notifySound').play().catch(e => console.log("Sound play blocked by browser"));
                }
                lastKnownStatus = data.status;

                const config = statusConfig[data.status] || statusConfig["pending"];
                document.getElementById('statusIcon').innerText = config.icon;
                document.getElementById('trackMessage').innerText = config.msg;
                document.getElementById('stepCounter').innerText = `ধাপ: ${config.step}`;
                document.getElementById('progressBar').style.width = config.progress + "%";
                document.getElementById('orderIdDisplay').innerText = `ID: #${orderId.slice(-6).toUpperCase()}`;

                if(data.status !== "pending" && data.status !== "verifying") {
                    document.getElementById('invoiceBox').classList.remove('hidden');
                    document.getElementById('couponSection').classList.remove('hidden');
                    
                    const prices = data.itemPrices || {};
                    const notes = data.itemNotes || {};
                    
                    document.getElementById('invoiceItemsDisplay').innerHTML = data.items.map(item => {
                        const isMissing = notes[item] === "Missing";
                        return `
                            <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                                <div class="flex flex-col">
                                    <span class="text-gray-800 font-semibold ${isMissing ? 'line-through text-red-400 opacity-50' : ''}">${item}</span>
                                    ${isMissing ? '<span class="text-[8px] text-red-500 font-black uppercase tracking-tighter">পাওয়া যায়নি</span>' : ''}
                                </div>
                                <span class="font-bold brand-green">৳${prices[item] || 0}</span>
                            </div>`;
                    }).join('');

                    const total = (data.subTotal || 0) + (data.deliveryCharge || 0) + (data.platformFee || 0) - (data.discount || 0);
                    document.getElementById('subTotalDisplay').innerText = `৳${data.subTotal || 0}`;
                    document.getElementById('grandTotalDisplay').innerText = `৳${total}`;

                    if(data.discount > 0) {
                        document.getElementById('discountRow').classList.remove('hidden');
                        document.getElementById('discountDisplay').innerText = `-৳${data.discount}`;
                    }
                } else {
                    document.getElementById('invoiceBox').classList.add('hidden');
                    document.getElementById('couponSection').classList.add('hidden');
                }
            });
        };

        window.addEventListener('load', initTracking);
    </script>
</body>
</html>
