<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G KHIDMAH | আপনার বিশ্বস্ত খিদমতকারী</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .brand-green { color: #15803d; }
        .bg-brand-dark-green { background-color: #15803d; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-white shadow-sm p-4 text-center border-b border-green-100 flex items-center justify-center gap-3 sticky top-0 z-50">
        <h1 class="text-xl font-bold brand-green uppercase italic tracking-tighter">G KHIDMAH</h1>
    </header>

    <div class="max-w-md mx-auto p-4 pb-20 space-y-6">
        
        <div id="orderSection" class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-gray-100 mt-4 text-center">
            <dotlottie-player src="https://lottie.host/7905b29c-6237-4d6d-b89a-0726618e001a/writing_list.json" background="transparent" speed="1" style="width: 160px; height: 160px; margin: 0 auto;" loop autoplay></dotlottie-player>
            <h2 class="text-lg font-bold text-gray-800 mb-1 mt-4">আজ আপনার কী কী লাগবে?</h2>
            <p class="text-[10px] text-gray-400 mb-4 italic">বাজারের ফর্দটি নিচে লিখুন।</p>
            <textarea id="orderList" rows="5" class="w-full border-2 border-green-50 p-4 rounded-3xl focus:border-green-300 outline-none text-sm font-semibold mt-2 transition-all" placeholder="যেমন: ৫ কেজি চাল, ২ লিটার তেল..."></textarea>
            <button id="submitOrderBtn" class="w-full bg-brand-dark-green text-white mt-5 py-4 rounded-2xl font-bold text-lg active:scale-95 shadow-lg shadow-green-100 transition-all">
                খিদমত শুরু করুন
            </button>
        </div>

        <div id="trackingSection" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl text-center border border-green-100">
                <div id="lottieContainer" class="w-48 h-48 mx-auto flex items-center justify-center overflow-hidden">
                    </div>
                <p class="text-[10px] uppercase tracking-widest text-green-600 mb-1 font-black mt-4 italic" id="stepCounter">ধাপ: ১/১০</p>
                <h1 id="trackMessage" class="text-lg font-bold brand-green leading-tight italic font-black">যাচাই করা হচ্ছে...</h1>
            </div>

            <div id="invoiceBox" class="hidden bg-white rounded-[2rem] shadow-2xl overflow-hidden border-t-8 border-t-green-700">
                <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-green-50/50">
                    <h3 class="text-sm font-black brand-green uppercase italic">ডিজিটাল রশিদ</h3>
                    <span id="paymentStatus" class="text-[10px] bg-red-100 text-red-600 px-3 py-1 rounded-full font-black uppercase tracking-widest">Unpaid</span>
                </div>

                <div class="p-6 space-y-4 font-semibold" id="invoiceItemsDisplay">
                    </div>

                <div id="couponArea" class="px-6 py-4 bg-green-50/30 border-t border-dashed border-green-200">
                    <div class="flex gap-2">
                        <input type="text" id="couponInput" placeholder="কুপন কোড" class="flex-1 text-xs border border-green-200 p-2 rounded-xl outline-none focus:border-green-500 uppercase">
                        <button id="applyCouponBtn" class="bg-green-800 text-white text-xs px-4 py-2 rounded-xl font-bold active:scale-95">Apply</button>
                    </div>
                    <p id="couponMsg" class="text-[10px] mt-1 hidden font-bold"></p>
                </div>

                <div class="px-6 py-4 bg-slate-50 space-y-3 border-t border-gray-100">
                    <div class="flex justify-between text-gray-500 text-sm italic font-bold">
                        <span>মোট বিল (সব খরচসহ):</span>
                        <span id="displayTotal" class="text-3xl font-black brand-green tracking-tighter">৳০</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ১০টি স্ট্যাটাস কনফিগারেশন
        const statusConfig = {
            "pending": { step: "১/১০", msg: "আমরা আপনার ফর্দটি পেয়েছি।", anim: "https://lottie.host/9f50e82c-6337-4d6d-b89a-0726618e001a/checking_invoice.json" },
            "verifying": { step: "২/১০", msg: "তালিকা যাচাই করে দেখা হচ্ছে...", anim: "https://lottie.host/9f50e82c-6337-4d6d-b89a-0726618e001a/checking_invoice.json" },
            "invoice_ready": { step: "৩/১০", msg: "ইনভয়েস রেডি। চেক করে কনফার্ম করুন।", anim: "https://lottie.host/86c6242c-2384-4861-a537-88544a04588f/invoice_ready.json" },
            "finding_assistant": { step: "৪/১০", msg: "আপনার জন্য সহকারী খোঁজা হচ্ছে...", anim: "https://lottie.host/3138b29c-850d-400d-9b0d-520e7df5d996/searching.json" },
            "assistant_assigned": { step: "৫/১০", msg: "সহকারী নিযুক্ত হয়েছে। তিনি দোকানের দিকে যাচ্ছেন।", anim: "https://lottie.host/7e04b081-424d-446a-8b83-933c16a8d626/walking_bag.json" },
            "at_store": { step: "৬/১০", msg: "সহকারী দোকানে পৌঁছেছেন।", anim: "https://lottie.host/a6162383-7c9c-4822-832f-7649d038e3e4/store.json" },
            "shopping": { step: "৭/১০", msg: "আপনার বাজার কেনা হচ্ছে...", anim: "https://lottie.host/91b702ec-24e0-47b7-8495-257a1240c313/shopping_cart.json" },
            "packing": { step: "৮/১০", msg: "সবকিছু চেক করে প্যাকিং করা হচ্ছে।", anim: "https://lottie.host/f7468164-839e-43f1-b1e7-578d38769395/packing.json" },
            "delivery_started": { step: "৯/১০", msg: "সহকারী আপনার ঠিকানার দিকে রওয়ানা দিয়েছেন।", anim: "https://lottie.host/6d2c499c-e3bc-467a-bc12-8874136e65a0/delivery_scooter.json" },
            "at_location": { step: "১০/১০", msg: "সহকারী আপনার বাসার নিচে পৌঁছে গেছেন।", anim: "https://lottie.host/ec71c53e-360e-4375-926e-441617300c41/arrived.json" },
            "completed": { step: "সফল", msg: "খিদমতটি সফল হয়েছে। ধন্যবাদ!", anim: "https://lottie.host/703666d9-373b-4835-b82f-87d8120e360f/success.json" }
        };

        // অর্ডার সাবমিট লজিক
        document.getElementById('submitOrderBtn').addEventListener('click', async () => {
            const listText = document.getElementById('orderList').value;
            if(!listText.trim()) return alert("দয়া করে বাজারের ফর্দটি লিখুন");

            try {
                const docRef = await addDoc(collection(db, "orders"), {
                    items: listText.split('\n').filter(i => i.trim() !== ""),
                    status: "pending",
                    createdAt: serverTimestamp(),
                    subTotal: 0,
                    discount: 0,
                    deliveryCharge: 50, // ডিফল্ট চার্জ
                    platformFee: 20    // ডিফল্ট ফি
                });
                localStorage.setItem('activeOrderId', docRef.id);
                initTracking();
            } catch (e) { alert("অর্ডার নিতে সমস্যা হয়েছে। আবার চেষ্টা করুন।"); }
        });

        // ট্র্যাকিং এবং রিয়েল-টাইম UI আপডেট
        const initTracking = () => {
            const orderId = localStorage.getItem('activeOrderId');
            if(!orderId) return;

            document.getElementById('orderSection').classList.add('hidden');
            document.getElementById('trackingSection').classList.remove('hidden');

            onSnapshot(doc(db, "orders", orderId), (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.data();
                    const config = statusConfig[data.status] || statusConfig["pending"];
                    
                    document.getElementById('trackMessage').innerText = config.msg;
                    document.getElementById('stepCounter').innerText = `ধাপ: ${config.step}`;

                    // অ্যানিমেশন এরর ফিক্স: প্লেয়ার রি-রেন্ডার
                    const container = document.getElementById('lottieContainer');
                    if (container.dataset.status !== data.status) {
                        container.innerHTML = `<dotlottie-player src="${config.anim}" background="transparent" speed="1" style="width: 180px; height: 180px;" loop autoplay></dotlottie-player>`;
                        container.dataset.status = data.status;
                    }

                    // ইনভয়েস এবং বিল ক্যালকুলেশন
                    if(data.status !== "pending" && data.status !== "verifying") {
                        document.getElementById('invoiceBox').classList.remove('hidden');
                        
                        // অ্যাডমিন প্যানেল থেকে পাঠানো চার্জ রিড করা
                        const sub = data.subTotal || 0;
                        const dCharge = data.deliveryCharge || 0;
                        const pFee = data.platformFee || 0;
                        const disc = data.discount || 0;
                        const total = (sub + dCharge + pFee) - disc;

                        document.getElementById('displayTotal').innerText = `৳${total}`;
                        
                        // পেমেন্ট স্ট্যাটাস কালার চেঞ্জ (যদি অ্যাডমিন PAID করে দেয়)
                        if(total > 0 && !["pending", "verifying", "invoice_ready"].includes(data.status)){
                            document.getElementById('paymentStatus').innerText = "PAID";
                            document.getElementById('paymentStatus').className = "text-[10px] bg-green-100 text-green-600 px-3 py-1 rounded-full font-black";
                            document.getElementById('couponArea').classList.add('hidden');
                        }

                        // আইটেম প্রাইস লিস্ট
                        const prices = data.itemPrices || {};
                        document.getElementById('invoiceItemsDisplay').innerHTML = data.items.map(item => `
                            <div class="flex justify-between items-center border-b border-gray-50 pb-2 italic text-sm">
                                <span class="text-gray-600 font-semibold">${item}</span>
                                <span class="brand-green font-bold">৳${prices[item] || '...'}</span>
                            </div>
                        `).join('');
                    }

                    // ১০ সেকেন্ড পর অটো রিসেট
                    if(data.status === "completed") {
                        setTimeout(() => {
                            localStorage.removeItem('activeOrderId');
                            location.reload();
                        }, 15000);
                    }
                }
            });
        };

        // কুপন অ্যাপ্লাই ফাংশন (Firebase থেকে চেক করবে)
        document.getElementById('applyCouponBtn').addEventListener('click', async () => {
            const codeInput = document.getElementById('couponInput');
            const code = codeInput.value.trim().toUpperCase();
            const orderId = localStorage.getItem('activeOrderId');
            const msg = document.getElementById('couponMsg');

            if(!code) return;

            try {
                const couponRef = doc(db, "coupons", code);
                const couponSnap = await getDoc(couponRef);

                if (couponSnap.exists()) {
                    const discountAmount = couponSnap.data().amount;
                    await updateDoc(doc(db, "orders", orderId), { discount: discountAmount });
                    msg.innerText = `অভিনন্দন! ৳${discountAmount} ডিসকাউন্ট যোগ হয়েছে।`;
                    msg.className = "text-[10px] mt-1 text-green-600 block";
                    codeInput.value = "";
                } else {
                    msg.innerText = "ভুল কুপন কোড!";
                    msg.className = "text-[10px] mt-1 text-red-500 block";
                }
            } catch (e) { console.error("Coupon Error: ", e); }
        });

        // পেজ লোড হলে ট্র্যাকিং চেক করুন
        window.addEventListener('load', initTracking);
    </script>
</body>
</html>
