<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | মাস্টার অ্যাডমিন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Hind Siliguri', sans-serif; } .hide-scroll::-webkit-scrollbar { display: none; } </style>
</head>
<body class="bg-slate-100 pb-10">
    <div class="max-w-2xl mx-auto p-4">
        <header class="bg-blue-900 text-white p-6 rounded-3xl shadow-xl mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic">G-KHIDMAH</h1>
                <p class="text-[10px] uppercase opacity-70">Master Control Panel</p>
            </div>
            <div id="activeCount" class="bg-blue-700 px-4 py-2 rounded-2xl text-xs font-bold italic">অর্ডার লোড হচ্ছে...</div>
        </header>

        <div class="flex gap-2 overflow-x-auto hide-scroll mb-6 pb-2">
            <button onclick="renderOrders('all')" class="bg-gray-800 text-white px-4 py-2 rounded-xl text-xs font-bold">সব</button>
            <button onclick="renderOrders('shopping')" class="bg-green-600 text-white px-4 py-2 rounded-xl text-xs font-bold">🛒 বাজার</button>
            <button onclick="renderOrders('parcel')" class="bg-orange-500 text-white px-4 py-2 rounded-xl text-xs font-bold">📦 পার্সেল</button>
            <button onclick="renderOrders('car_rent')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold">🚗 গাড়ি</button>
            <button onclick="renderOrders('home_service')" class="bg-purple-600 text-white px-4 py-2 rounded-xl text-xs font-bold">🛠️ সার্ভিস</button>
            <button onclick="renderOrders('blood')" class="bg-red-600 text-white px-4 py-2 rounded-xl text-xs font-bold">🩸 ব্লাড</button>
        </div>

        <div id="adminOrders" class="space-y-6"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaEq12vL_6e52-6ZOba-yUPchKi-saCy0",
            authDomain: "gkhidmah-8636b.firebaseapp.com",
            projectId: "gkhidmah-8636b",
            storageBucket: "gkhidmah-8636b.firebasestorage.app",
            messagingSenderId: "780745438049",
            appId: "1:780745438049:web:d60cc33b84200a12bc4b20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentOrders = [];

        onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), (snapshot) => {
            currentOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderOrders('all');
        });

        window.renderOrders = (filter) => {
            const container = document.getElementById('adminOrders');
            const filtered = filter === 'all' ? currentOrders : currentOrders.filter(o => o.orderType === filter);
            document.getElementById('activeCount').innerText = `${filtered.length}টি অর্ডার`;
            container.innerHTML = "";

            filtered.forEach(order => {
                const id = order.id;
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-[2.5rem] shadow-lg border-l-8 " + getBorder(order.orderType);
                
                card.innerHTML = `
                    <div class="flex justify-between mb-4">
                        <span class="text-[10px] font-black uppercase text-gray-400">ID: ...${id.slice(-5)}</span>
                        <span class="text-[10px] font-black uppercase bg-green-100 text-green-700 px-3 py-1 rounded-full">${order.status}</span>
                    </div>

                    <div class="mb-4 bg-slate-50 p-4 rounded-3xl">
                        <h3 class="font-bold text-blue-900">${order.customerName}</h3>
                        <p class="text-xs font-bold text-gray-500">${order.customerPhone}</p>
                        <p class="text-[10px] mt-1 text-gray-400 italic">📍 ${order.customerAddress || order.pickupLocation}</p>
                    </div>

                    <div class="space-y-4 mb-6">
                        ${renderBody(order)}
                    </div>

                    <div class="bg-gray-50 p-4 rounded-3xl mb-6 border border-dashed">
                        ${renderInvoiceInputs(order)}
                        <button onclick="saveInvoice('${id}', '${order.orderType}')" class="w-full bg-blue-700 text-white py-3 rounded-2xl font-bold text-xs mt-3">ইনভয়েস আপডেট করুন</button>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        ${renderStatusButtons(order)}
                    </div>
                `;
                container.appendChild(card);
            });
        };

        function getBorder(type) {
            const b = { shopping: 'border-green-600', parcel: 'border-orange-500', car_rent: 'border-blue-600', home_service: 'border-purple-600', blood: 'border-red-600' };
            return b[type] || 'border-gray-300';
        }

        function renderBody(order) {
            if(order.orderType === 'shopping') {
                return order.items.map(item => `
                    <div class="flex gap-2 items-center bg-white p-2 rounded-xl shadow-sm border border-gray-100">
                        <span class="text-[10px] flex-1 font-bold">📦 ${item}</span>
                        <input type="number" class="item-price w-16 p-1 bg-blue-50 rounded text-xs text-center" placeholder="৳" data-item="${item}" value="${order.itemPrices?.[item] || ''}">
                    </div>
                `).join('');
            }
            if(order.orderType === 'parcel') return `<p class="text-xs font-bold text-orange-600 italic bg-orange-50 p-3 rounded-xl">📦 পার্সেল: ${order.parcelType}<br>বিবরণ: ${order.items[0]}<br>🔒 OTP: ${order.otp}</p>`;
            if(order.orderType === 'car_rent') return `<p class="text-xs font-bold text-blue-600 italic bg-blue-50 p-3 rounded-xl">🚗 গাড়ি: ${order.carType}<br>যাত্রাপথ: ${order.pickupLocation} > ${order.dropLocation}</p>`;
            return `<p class="text-xs font-bold text-gray-600 bg-gray-50 p-3 rounded-xl">বিবরণ: ${order.items ? order.items[0] : 'নাই'}</p>`;
        }

        function renderInvoiceInputs(order) {
            const id = order.id;
            if(order.orderType === 'shopping') {
                return `
                    <div class="grid grid-cols-3 gap-2 text-center">
                        <div><label class="text-[8px] font-bold block">ডেলিভারি</label><input type="number" id="del-${id}" class="w-full text-xs font-bold text-center bg-transparent" value="${order.deliveryCharge || 70}"></div>
                        <div><label class="text-[8px] font-bold block">প্ল্যাটফর্ম</label><input type="number" id="plat-${id}" class="w-full text-xs font-bold text-center bg-transparent" value="${order.platformFee || 20}"></div>
                        <div><label class="text-[8px] font-bold block">কুপন</label><input type="number" id="disc-${id}" class="w-full text-xs font-bold text-center bg-transparent text-red-500" value="${order.discount || 0}"></div>
                    </div>
                `;
            }
            if(order.orderType === 'car_rent') {
                return `
                    <div class="space-y-2">
                        <input type="text" id="driver-${id}" class="w-full p-2 rounded-xl text-[10px] bg-white border" placeholder="ড্রাইভারের নাম ও নাম্বার" value="${order.riderName || ''}">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="sub-${id}" class="p-2 rounded-xl text-xs bg-white border" placeholder="গাড়ি ভাড়া" value="${order.subTotal || ''}">
                            <input type="number" id="del-${id}" class="p-2 rounded-xl text-xs bg-white border" placeholder="সার্ভিস চার্জ" value="${order.deliveryCharge || 100}">
                        </div>
                    </div>
                `;
            }
            if(order.orderType === 'parcel') {
                return `
                    <input type="text" id="rider-${id}" class="w-full p-2 rounded-xl text-[10px] bg-white border mb-2" placeholder="রাইডারের নাম ও ফোন" value="${order.riderName || ''}">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="del-${id}" class="p-2 rounded-xl text-xs bg-white border" placeholder="ডেলিভারি চার্জ" value="${order.deliveryCharge || 60}">
                        <input type="number" id="plat-${id}" class="p-2 rounded-xl text-xs bg-white border" placeholder="প্যাকিং ফি" value="${order.platformFee || 10}">
                    </div>
                `;
            }
            return `<input type="number" id="sub-${id}" class="w-full p-3 rounded-2xl text-xs bg-white border" placeholder="মোট বিল/ভিজিট ফি" value="${order.subTotal || ''}">`;
        }

        function renderStatusButtons(order) {
            const id = order.id;
            const b = (s, txt, cls) => `<button onclick="updateStatus('${id}', '${s}')" class="p-2 rounded-xl font-bold text-[9px] ${cls}">${txt}</button>`;
            
            if(order.orderType === 'shopping') {
                return `
                    ${b('verifying', '১. যাচাই', 'bg-slate-200')} ${b('invoice_ready', '২. ইনভয়েস', 'bg-blue-100')}
                    ${b('finding_assistant', '৩. সহকারী', 'bg-indigo-100')} ${b('shopping', '৬. কেনাকাটা', 'bg-amber-100')}
                    ${b('delivery_started', '৮. রওয়ানা', 'bg-orange-100')} ${b('completed', '১০. সম্পন্ন', 'bg-green-600 text-white col-span-2 py-3 mt-2')}
                `;
            }
            if(order.orderType === 'parcel') {
                return `
                    ${b('rider_assigned', '১. রাইডার রেডি', 'bg-blue-100')} ${b('picked', '২. পার্সেল পিক', 'bg-orange-100')}
                    ${b('in_transit', '৩. পথে আছে', 'bg-amber-100')} <button onclick="verifyOtp('${id}', ${order.otp})" class="bg-green-600 text-white p-2 rounded-xl text-[9px] font-bold">৪. ডেলিভারি (OTP)</button>
                `;
            }
            if(order.orderType === 'car_rent') {
                return `${b('car_assigned', '১. গাড়ি রেডি', 'bg-blue-100')} ${b('on_way', '২. পথে আছে', 'bg-orange-100')} ${b('completed', '৩. ট্রিপ শেষ', 'bg-green-600 text-white col-span-2 py-3 mt-2')}`;
            }
            return b('completed', 'খিদমত সম্পন্ন করুন', 'bg-green-600 text-white col-span-2 py-3');
        }

        window.saveInvoice = async (id, type) => {
            const updateData = { status: "invoice_ready" };
            if(type === 'shopping') {
                const prices = {}; let sub = 0;
                document.querySelectorAll(`[data-item]`).forEach(inp => {
                    const p = parseFloat(inp.value) || 0;
                    prices[inp.dataset.item] = p; sub += p;
                });
                updateData.itemPrices = prices; updateData.subTotal = sub;
                updateData.deliveryCharge = parseFloat(document.getElementById(`del-${id}`).value);
                updateData.platformFee = parseFloat(document.getElementById(`plat-${id}`).value);
                updateData.discount = parseFloat(document.getElementById(`disc-${id}`).value);
            } else if(type === 'car_rent') {
                updateData.riderName = document.getElementById(`driver-${id}`).value;
                updateData.subTotal = parseFloat(document.getElementById(`sub-${id}`).value);
                updateData.deliveryCharge = parseFloat(document.getElementById(`del-${id}`).value);
            } else if(type === 'parcel') {
                updateData.riderName = document.getElementById(`rider-${id}`).value;
                updateData.deliveryCharge = parseFloat(document.getElementById(`del-${id}`).value);
                updateData.platformFee = parseFloat(document.getElementById(`plat-${id}`).value);
            } else {
                updateData.subTotal = parseFloat(document.getElementById(`sub-${id}`).value);
            }
            await updateDoc(doc(db, "orders", id), updateData);
            alert("ইনভয়েস সফল!");
        };

        window.updateStatus = async (id, s) => { await updateDoc(doc(db, "orders", id), { status: s }); };

        window.verifyOtp = async (id, otp) => {
            const input = prompt("OTP কোড দিন:");
            if(input == otp) { await updateDoc(doc(db, "orders", id), { status: "completed" }); alert("সফল!"); }
            else alert("ভুল ওটিপি!");
        };
    </script>
</body>
</html>
