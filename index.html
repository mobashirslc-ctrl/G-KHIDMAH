<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-KHIDMAH | Your Personal Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Hind Siliguri', sans-serif; } </style>
</head>
<body class="bg-slate-50">
    <div class="max-w-md mx-auto min-h-screen flex flex-col items-center pt-8 pb-10">
        
        <div class="text-center mb-6">
            <div class="bg-green-700 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-lg shadow-green-200">
                <span class="text-white font-black text-3xl italic">G</span>
            </div>
            <h1 class="text-2xl font-black italic text-gray-800 tracking-tighter uppercase">G KHIDMAH</h1>
            <p class="text-[9px] uppercase tracking-[0.3em] text-green-600 font-bold">Your Personal Assistant</p>
        </div>

        <div class="w-full px-6 mb-8">
            <div class="bg-white p-4 rounded-[2rem] shadow-sm border border-green-100 flex flex-col items-center">
                <label class="text-[10px] font-black text-gray-400 uppercase mb-1 tracking-widest">বর্তমান সার্ভিস এরিয়া</label>
                <div id="displayAreaName" class="font-bold text-gray-700 text-center italic">লোকেশন সিলেক্ট করা নেই</div>
                <button onclick="showLocationModal()" class="mt-2 text-[10px] text-green-600 font-bold underline">পরিবর্তন করুন</button>
            </div>
        </div>

        <div class="w-full px-6 space-y-4">
            <a href="#" onclick="handleServiceClick(event, 'shopping.html')" class="flex items-center p-5 bg-white rounded-[2rem] shadow-sm border border-gray-100 active:scale-95 transition-all">
                <div class="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center text-3xl mr-4">🛒</div>
                <div class="flex-1 text-sm"><h3 class="font-bold text-gray-800">বাজার সদাই</h3><p class="text-[10px] text-gray-400">সরাসরি বাজার থেকে আপনার দুয়ারে</p></div>
                <span class="text-gray-300">→</span>
            </a>
            </div>
    </div>

    <div id="locationModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h2 class="text-xl font-bold text-gray-800 mb-2 text-center">সার্ভিস এরিয়া</h2>
            
            <button id="autoLocateBtn" onclick="autoDetectLocation()" class="w-full py-3 mb-4 bg-blue-50 text-blue-700 rounded-2xl font-bold text-sm border border-blue-100 flex items-center justify-center gap-2">
                📍 জিপিএস দিয়ে অটো সেট করুন
            </button>

            <div class="relative flex items-center mb-4">
                <div class="flex-grow border-t border-gray-100"></div>
                <span class="flex-shrink mx-4 text-gray-300 text-[10px] font-bold uppercase">অথবা ম্যানুয়ালি</span>
                <div class="flex-grow border-t border-gray-100"></div>
            </div>

            <div class="space-y-4">
                <select id="district" onchange="updateThanas()" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm text-gray-700">
                    <option value="">জেলা নির্বাচন করুন</option>
                </select>
                <select id="thana" onchange="updatePartnerAreas()" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm text-gray-700">
                    <option value="">আগে জেলা সিলেক্ট করুন</option>
                </select>
                <select id="partnerArea" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm text-gray-700">
                    <option value="">আগে থানা সিলেক্ট করুন</option>
                </select>
                <button onclick="confirmLocation()" class="w-full py-4 bg-green-700 text-white rounded-2xl font-bold shadow-lg shadow-green-200 mt-4">নিশ্চিত করুন</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase Import (এখানে আপনার মেইন Firebase Config এবং Logic থাকবে)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { /* আপনার কনফিগ এখানে বসান */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- আপনার ডাটা এবং ফাংশনগুলো ---
        const districtThanaData = { "Dhaka": ["Uttara", "Mirpur"], /* আপনার বাকি ডাটা... */ };
        const partnerData = { "Uttara": ["Sector 7", "Sector 10"], /* আপনার বাকি ডাটা... */ };
        let targetUrl = '';

        // ১. দূরত্ব মাপার লজিক
        window.calculateDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        };

        // ২. অটোমেটিক লোকেশন এবং পার্টনার খোঁজার ফাংশন
        window.autoDetectLocation = async () => {
            const btn = document.getElementById('autoLocateBtn');
            btn.innerText = "খুঁজছি...";
            
            if (!navigator.geolocation) {
                alert("জিপিএস সাপোর্ট করে না।");
                return;
            }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const uLat = pos.coords.latitude;
                const uLng = pos.coords.longitude;

                try {
                    const partnersSnap = await getDocs(collection(db, "partners"));
                    let nearestPartnerId = null;
                    let shortestDistance = 5; 

                    partnersSnap.forEach((doc) => {
                        const p = doc.data();
                        if(p.lat && p.lng) {
                            const dist = calculateDistance(uLat, uLng, p.lat, p.lng);
                            if(dist < shortestDistance) {
                                shortestDistance = dist;
                                nearestPartnerId = doc.id;
                            }
                        }
                    });

                    if(nearestPartnerId) {
                        const locInfo = `GPS: Near ${nearestPartnerId}`;
                        localStorage.setItem('userLocation', locInfo);
                        localStorage.setItem('assignedPartnerId', nearestPartnerId);
                        document.getElementById('locationModal').classList.add('hidden');
                        updateUI();
                        if (targetUrl) window.location.href = targetUrl + "?partner=" + nearestPartnerId;
                    } else {
                        alert("৫ কিমি এর মধ্যে কোনো পার্টনার নেই। দয়া করে ম্যানুয়ালি সিলেক্ট করুন।");
                        btn.innerText = "📍 জিপিএস দিয়ে অটো সেট করুন";
                    }
                } catch (error) {
                    alert("সার্ভার সমস্যা। আবার চেষ্টা করুন।");
                    btn.innerText = "📍 জিপিএস দিয়ে অটো সেট করুন";
                }
            }, () => {
                alert("লোকেশন পারমিশন প্রয়োজন।");
                btn.innerText = "📍 জিপিএস দিয়ে অটো সেট করুন";
            });
        };

        // --- মডাল ও ম্যানুয়াল সিলেকশন লজিক ---
        window.showLocationModal = () => document.getElementById('locationModal').classList.remove('hidden');
        
        window.updateUI = () => {
            const loc = localStorage.getItem('userLocation');
            if (loc) {
                document.getElementById('displayAreaName').innerText = loc;
                document.getElementById('displayAreaName').classList.remove('italic');
            }
        };

        window.confirmLocation = () => {
            const d = document.getElementById('district').value;
            const t = document.getElementById('thana').value;
            const p = document.getElementById('partnerArea').value;
            if (!d || !t || !p || p.includes("পার্টনার নেই")) return alert("সঠিক লোকেশন দিন");

            const fullLoc = `${d}, ${t}, ${p}`;
            localStorage.setItem('userLocation', fullLoc);
            document.getElementById('locationModal').classList.add('hidden');
            updateUI();
            if (targetUrl) window.location.href = targetUrl + "?area=" + encodeURIComponent(fullLoc);
        };

        // Initialize Page
        window.onload = () => {
            const districtSelect = document.getElementById('district');
            Object.keys(districtThanaData).sort().forEach(d => {
                let opt = document.createElement('option');
                opt.value = d; opt.innerText = d;
                districtSelect.appendChild(opt);
            });
            updateUI();
        };
        
        // ফাংশনগুলো গ্লোবালি অ্যাক্সেসযোগ্য করার জন্য উইন্ডোতে রাখা হয়েছে
        window.updateThanas = updateThanas;
        window.updatePartnerAreas = updatePartnerAreas;
        window.handleServiceClick = handleServiceClick;
    </script>
</body>
</html>
